<p><strong>UI Библиотека</strong> — каталог интерактивных React-компонентов для Opensophy Hub. Анимированные тексты, декоративные фоны, визуальные эффекты — каждый компонент представлен с живым превью и интерактивным настройщиком прямо в документации.</p>
<hr>
<h2>Два направления</h2>
<p>Библиотека развивается в двух направлениях — они отличаются не качеством, а происхождением.</p>
<div class="custom-cardgrid" data-cols="2"><div class="custom-card" data-color="" data-title="Community компоненты" data-icon="users" data-image=""><p>Подборка на основе открытых UI-паттернов и популярных решений сообщества. Готовы к использованию уже сейчас: эффекты для текста, WebGL-фоны, Canvas-анимации. Быстро пополняются.</p>
</div><div class="custom-card" data-color="" data-title="Opensophy компоненты" data-icon="sparkles" data-image=""><p>Авторские компоненты с визуальным языком Opensophy. Разрабатываются под конкретные задачи экосистемы — Hub, документация, лендинги. Появятся позже.</p>
</div></div>

<hr>
<h2>Community компоненты</h2>
<p>Это основа текущей библиотеки. Компоненты вдохновлены открытыми источниками и адаптированы под Hub: переработаны под TypeScript, получили универсальные пропсы для управления масштабом, цветом, анимацией и другими параметрами через интерактивный viewer.</p>
<p>Сейчас доступны две категории:</p>

<h2>Opensophy компоненты</h2>
<p>Вторая линейка сейчас в разработке. В отличие от community-компонентов, Opensophy-компоненты будут создаваться под конкретные задачи экосистемы: элементы навигации, блоки документации, промо-секции, UI-паттерны лендинга Opensophy.</p>
<p>Их отличие — не в визуальных эффектах, а в <strong>функциональной интеграции</strong> с Hub: они будут знать о структуре документации, теме, навигации и других деталях платформы.</p>
<hr>
<h2>Как добавить компонент</h2>
<div class="custom-steps"><div class="custom-step" data-status="done" data-title="Создайте папку" data-color=""><p>Разместите компонент в <code>src/features/ui-components/my-component/</code>.</p>
</div><div class="custom-step" data-status="done" data-title="Добавьте config.json" data-color=""><p>Опишите <code>id</code>, <code>name</code>, <code>category</code>, <code>props</code> и <code>specificProps</code>. Registry найдёт компонент автоматически.</p>
</div><div class="custom-step" data-status="done" data-title="Запустите проект" data-color=""><p><code>npm run dev</code> — компонент появится в UI библиотеке с живым превью и настройщиком.</p>
</div></div>

<p>Подробнее о добавлении компонентов — в <a href="https://opensophy.com/hub/component-guide/">руководстве по компонентам</a>.</p>
</article> </main> </noscript> <astro-island uid="VAYwT" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;ui/general&quot;],&quot;title&quot;:[0,&quot;UI Библиотека&quot;],&quot;slug&quot;:[0,&quot;ui/general&quot;],&quot;description&quot;:[0,&quot;Обзор UI библиотеки Opensophy Hub — community-компоненты, будущие Opensophy-компоненты и как всё это устроено.&quot;],&quot;content&quot;:[0,&quot;&lt;h1&gt;UI Библиотека&lt;/h1&gt;\n&lt;p&gt;&lt;strong&gt;UI Библиотека&lt;/strong&gt; — каталог интерактивных React-компонентов для Opensophy Hub. Анимированные тексты, декоративные фоны, визуальные эффекты — каждый компонент представлен с живым превью и интерактивным настройщиком прямо в документации.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Два направления&lt;/h2&gt;\n&lt;p&gt;Библиотека развивается в двух направлениях — они отличаются не качеством, а происхождением.&lt;/p&gt;\n&lt;div class=\&quot;custom-cardgrid\&quot; data-cols=\&quot;2\&quot;&gt;&lt;div class=\&quot;custom-card\&quot; data-color=\&quot;\&quot; data-title=\&quot;Community компоненты\&quot; data-icon=\&quot;users\&quot; data-image=\&quot;\&quot;&gt;&lt;p&gt;Подборка на основе открытых UI-паттернов и популярных решений сообщества. Готовы к использованию уже сейчас: эффекты для текста, WebGL-фоны, Canvas-анимации. Быстро пополняются.&lt;/p&gt;\n&lt;/div&gt;&lt;div class=\&quot;custom-card\&quot; data-color=\&quot;\&quot; data-title=\&quot;Opensophy компоненты\&quot; data-icon=\&quot;sparkles\&quot; data-image=\&quot;\&quot;&gt;&lt;p&gt;Авторские компоненты с визуальным языком Opensophy. Разрабатываются под конкретные задачи экосистемы — Hub, документация, лендинги. Появятся позже.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;\n\n&lt;hr&gt;\n&lt;h2&gt;Community компоненты&lt;/h2&gt;\n&lt;p&gt;Это основа текущей библиотеки. Компоненты вдохновлены открытыми источниками и адаптированы под Hub: переработаны под TypeScript, получили универсальные пропсы для управления масштабом, цветом, анимацией и другими параметрами через интерактивный viewer.&lt;/p&gt;\n&lt;p&gt;Сейчас доступны две категории:&lt;/p&gt;\n&lt;h3&gt;Типографика&lt;/h3&gt;\n&lt;p&gt;Компоненты для выразительной работы с текстом.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Компонент&lt;/th&gt;\n&lt;th&gt;Описание&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Блюрный текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Появление по словам или буквам с эффектом размытия&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Размытый текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Случайный фаззинг строк через Canvas, глитч-режим&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Морфинг текста&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Плавный переход между словами через SVG blur-фильтр&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Дешифрованный текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Эффект дешифровки — символы раскрываются из шума&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Градиентный текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Анимированный градиент с yoyo, горизонт., верт., диагональю&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Сияющий текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Световой блик скользит по тексту&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Линейная тень текста&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Анимированная диагональная штриховка как тень&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Волновой текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Буквы покачиваются волной в бесконечном цикле&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Перекатывающийся текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Буквы «перекатываются» через 3D-вращение по оси X&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Чередующийся текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Автосмена строк с stagger и spring-переходами&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Круговой текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Текст по кругу с реакцией на ховер&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Зацикленный изогнутый текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Marquee по SVG-кривой, управляется перетаскиванием&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Разбиение текста&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;GSAP-анимация по символам, словам или строкам при скролле&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Раскрытие при скролле&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Слова появляются с opacity и blur при прокрутке&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Всплывающий текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Буквы всплывают снизу при скролле через GSAP ScrollTrigger&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Скорость скролла&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Бегущая строка, скорость которой зависит от прокрутки&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Вариативная близость&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Буквы меняют параметры вариативного шрифта рядом с курсором&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Скрытый текст&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Текст скрыт частицами, проявляется при наведении&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Счётчик&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Анимированный числовой счётчик с пружинной анимацией&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Печатание текста&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Эффект печатающей машинки с удалением и курсором&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;h3&gt;Фон&lt;/h3&gt;\n&lt;p&gt;Декоративные и интерактивные фоны на WebGL, Canvas и CSS.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Компонент&lt;/th&gt;\n&lt;th&gt;Технология&lt;/th&gt;\n&lt;th&gt;Особенности&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Аурора&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Шумовой шейдер с настраиваемыми цветовыми стопами&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Мягкая аурора&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Перлин-шум, реакция на мышь&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Шелк&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js&lt;/td&gt;\n&lt;td&gt;Волновой паттерн, вращение, шум&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Иридесценция&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Переливающиеся цвета, реакция на мышь&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Плазма&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Объёмная анимация, режимы forward / reverse / pingpong&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Плазменная волна&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Ray-marching в 3D, двухцветный градиент&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Грейниент&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Анимированный градиент с зерном, варп, ротация&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Цветовые изгибы&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js&lt;/td&gt;\n&lt;td&gt;Искажения цветовых полос, интерактив с мышью&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Темная вуаль&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Генеративный CPPN-шейдер, сканлайны, деформация&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Столп света&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js&lt;/td&gt;\n&lt;td&gt;Ray marching, интерактивный, настройка качества&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Световые лучи&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Лучи из заданной точки, анимация за мышью&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Лучи&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js&lt;/td&gt;\n&lt;td&gt;Анимированные объёмные лучи, модифицированный MeshStandard&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Молния&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;WebGL&lt;/td&gt;\n&lt;td&gt;Турбулентные молнии, настройка цвета через HSV&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Плавающие линии&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js&lt;/td&gt;\n&lt;td&gt;Волновые линии с реакцией на мышь и параллакс&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Поле точек&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Canvas 2D&lt;/td&gt;\n&lt;td&gt;Интерактивная сетка точек, bulge-эффект&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Призма&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;3D-призма с вращением, свечением, шейдерным цветом&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Пиксельный взрыв&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js + postprocessing&lt;/td&gt;\n&lt;td&gt;Пикселизация с рябью по клику, liquid distortion&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Призматический всплеск&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Спектральные лучи из центра, несколько режимов анимации&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Градиентные жалюзи&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Полосатый градиент с spotlight и distort&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Плазма (волны)&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Цветовые волны-«жгуты» с 3D-деформацией&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Грейниент&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Шумный градиент с полным контролем цвета и варпа&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Цветовые изгибы&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Three.js&lt;/td&gt;\n&lt;td&gt;Анимированные полосы с warp-деформацией&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Мягкая аурора&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Перлин-шум, слоистая аурора&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Око Саурона&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;OGL / WebGL&lt;/td&gt;\n&lt;td&gt;Анимированное «Око Саурона», следит за мышью&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;hr&gt;\n&lt;h2&gt;Opensophy компоненты&lt;/h2&gt;\n&lt;p&gt;Вторая линейка сейчас в разработке. В отличие от community-компонентов, Opensophy-компоненты будут создаваться под конкретные задачи экосистемы: элементы навигации, блоки документации, промо-секции, UI-паттерны лендинга Opensophy.&lt;/p&gt;\n&lt;p&gt;Их отличие — не в визуальных эффектах, а в &lt;strong&gt;функциональной интеграции&lt;/strong&gt; с Hub: они будут знать о структуре документации, теме, навигации и других деталях платформы.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Как добавить компонент&lt;/h2&gt;\n&lt;div class=\&quot;custom-steps\&quot;&gt;&lt;div class=\&quot;custom-step\&quot; data-status=\&quot;done\&quot; data-title=\&quot;Создайте папку\&quot; data-color=\&quot;\&quot;&gt;&lt;p&gt;Разместите компонент в &lt;code&gt;src/features/ui-components/my-component/&lt;/code&gt;.&lt;/p&gt;\n&lt;/div&gt;&lt;div class=\&quot;custom-step\&quot; data-status=\&quot;done\&quot; data-title=\&quot;Добавьте config.json\&quot; data-color=\&quot;\&quot;&gt;&lt;p&gt;Опишите &lt;code&gt;id&lt;/code&gt;, &lt;code&gt;name&lt;/code&gt;, &lt;code&gt;category&lt;/code&gt;, &lt;code&gt;props&lt;/code&gt; и &lt;code&gt;specificProps&lt;/code&gt;. Registry найдёт компонент автоматически.&lt;/p&gt;\n&lt;/div&gt;&lt;div class=\&quot;custom-step\&quot; data-status=\&quot;done\&quot; data-title=\&quot;Запустите проект\&quot; data-color=\&quot;\&quot;&gt;&lt;p&gt;&lt;code&gt;npm run dev&lt;/code&gt; — компонент появится в UI библиотеке с живым превью и настройщиком.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;\n\n&lt;p&gt;Подробнее о добавлении компонентов — в &lt;a href=\&quot;https://opensophy.com/hub/component-guide/\&quot;&gt;руководстве по компонентам&lt;/a&gt;.&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;&quot;],&quot;categoryPath&quot;:[1,[]],&quot;navSlug&quot;:[0,&quot;ui&quot;],&quot;navTitle&quot;:[0,&quot;UI Библиотека&quot;],&quot;navIcon&quot;:[0,&quot;component&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-06-03&quot;],&quot;updated&quot;:[0,&quot;2026-06-03&quot;],&quot;tags&quot;:[1,[[0,&quot;ui&quot;],[0,&quot;ui-компоненты&quot;],[0,&quot;community&quot;],[0,&quot;opensophy&quot;],[0,&quot;библиотека&quot;],[0,&quot;react&quot;],[0,&quot;анимация&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;component&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;UI Библиотека&quot;],&quot;description&quot;:[0,&quot;Обзор UI библиотеки Opensophy Hub — community-компоненты, будущие Opensophy-компоненты и как всё это устроено.&quot;],&quot;date&quot;:[0,&quot;2026-06-03&quot;],&quot;updated&quot;:[0,&quot;2026-06-03&quot;],&quot;tags&quot;:[0,&quot;ui, ui-компоненты, community, opensophy, библиотека, react, анимация&quot;],&quot;icon&quot;:[0,&quot;component&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&
