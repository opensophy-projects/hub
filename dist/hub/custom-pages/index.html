<p>Кастомные страницы — это отдельные React-страницы, которые не пишутся в Markdown.<br>Они подходят для лендингов, промо-страниц, интерактивных страниц и любых экранов,<br>которые удобнее полностью собрать кодом.</p>
<h2>Где лежат страницы</h2>
<p>Все кастомные страницы находятся в папке:</p>
<pre><code class="language-txt">src/custom/
</code></pre>
<p>Каждая страница — это отдельная папка. Slug задаётся так же, как в Markdown-системе:<br>через фигурные скобки в имени папки.</p>
<pre><code class="language-txt">src/custom/
└── Название страницы{page-slug}/
    └── Page.tsx
</code></pre>
<p>Папка <code>Название страницы{page-slug}</code> создаст страницу по адресу:</p>
<pre><code class="language-txt">/page-slug/
</code></pre>
<p>Если фигурные скобки не указаны, slug будет сгенерирован из имени папки.</p>
<h2>Структура Page.tsx</h2>
<p>Минимальный пример <code>Page.tsx</code>:</p>
<pre><code class="language-tsx">export default function MyCustomPage() {
  return &lt;main&gt;Привет из кастомной страницы&lt;/main&gt;;
}
</code></pre>
<p>SEO-метаданные можно вынести в соседний <code>metadata.ts</code>:</p>
<pre><code class="language-ts">import type { CustomPageMetadata } from &#39;../types&#39;;

const metadata: CustomPageMetadata = {
  title: &#39;Моя кастомная страница&#39;,
  description: &#39;Описание страницы для SEO.&#39;,
  robots: &#39;index, follow&#39;,
  lang: &#39;ru&#39;,
  type: &#39;website&#39;,
};

export default metadata;
</code></pre>
<p><code>metadata</code> используется в общем <code>Layout</code>: title, description, keywords, robots,<br>lang, image и другие SEO-поля можно указать прямо рядом с компонентом страницы.</p>
<h2>General как первая кастомная страница</h2>
<p>Лендинг General перенесён в новую систему:</p>
<pre><code class="language-txt">src/custom/general{general}/
├── Page.tsx
├── metadata.ts
└── components/
    ├── GeneralPage.tsx
    └── SingularityShaders.tsx
</code></pre>
<p>Slug берётся из имени папки <code>general{general}</code>, поэтому страница доступна по адресу:</p>
<pre><code class="language-txt">/general/
</code></pre>
<p>Главная страница <code>/</code> в режиме <code>useLanding: true</code> также использует эту же кастомную<br>страницу <code>general</code>.</p>
<h2>Как добавить новую страницу</h2>
<div class="custom-steps"><div class="custom-step" data-status="done" data-title="Создайте папку" data-color=""><p>Например: <code>src/custom/Промо продукта{product}/</code>.</p>
</div><div class="custom-step" data-status="done" data-title="Добавьте Page.tsx" data-color=""><p>Экспортируйте React-компонент по умолчанию, а SEO-данные при необходимости положите в <code>metadata.ts</code>.</p>
</div><div class="custom-step" data-status="done" data-title="Откройте slug" data-color=""><p>Страница будет доступна по адресу <code>/product/</code>.</p>
</div></div>

<h2>Конфликты slug</h2>
<p>Если slug кастомной страницы совпадёт со slug Markdown-документа или категории,<br>приоритет останется у Markdown-страницы, а кастомная страница будет пропущена при<br>генерации статических путей. Поэтому лучше задавать уникальные slug.</p>
