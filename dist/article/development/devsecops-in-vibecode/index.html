<h1>Введение</h1>
<p>Начнем из далека чтобы была понятна суть, в июле 2025 года инженер из команды Claude Code в Anthropic – <strong>Brian Cherny</strong> – написал в X следующее:</p>
<blockquote>
<p>«Практически 100% нашего кода написано Claude Code + Opus 4.5. Лично для меня это уже 100% на протяжении двух с лишним месяцев – я даже не делаю правок вручную. Вчера я закрыл 22 пулл-реквеста, позавчера – 27, и каждый из них написан Claude полностью.»<br>– <a href="https://x.com/bcherny/status/2015979257038831967">Brian Cherny, @bcherny</a></p>
</blockquote>
<p>Дальше он добавил: большинство индустрии придёт к похожей статистике в ближайшие месяцы. И что они уже используют <code>claude -p</code> на каждом PR для code review в свежем контексте итд итп что там крч Claude может полноценно работать автономно. Но и сравнительно недавно в марте 2026 года компания DryRun Security опубликовала <a href="https://t.me/devsecops_weekly/1453"><strong>«The Agentic Coding Security Report»</strong></a> – небольшой, но очень показательный документ. Они взяли трёх кодинг-агентов – <strong>Claude</strong> (Sonnet 4.6), <strong>Codex</strong> (GPT 5.2) и <strong>Gemini</strong> (2.5 Pro) – и дали каждому одно и то же задание: написать два приложения с нуля, добавляя фичи через pull request&#39;ы, как это делает реальная команда разработчиков. После каждого PR прогонялся сканер безопасности. Результаты оказались, мягко говоря, интересными. Вкратце LLM пишут плохо код и согласно отчету <strong>87% pull request&#39;ов</strong> содержали хотя бы одну уязвимость и <strong>143 проблемы безопасности</strong> суммарно из 38 сканов идр проблемы безопастностей. Выделили вот такой небольшой топик в таблицу повторяющихся проблем.</p>

<p>Что меня удивило: Лучшие результаты показал Codex(я очень надеялся на Claude) – но и у него остались незакрытые JWT-проблемы и отсутствие ревокации токенов.</p>
<p><strong>Вывод из отчёта:</strong> LLM пишут неплохо код но все же стоит проверять на безопасность и качество. Поэтому в этой статье мы  поговорим о вайбкоде и его безопасности, как довести проект/код, сгенерированный моделью до состояния где он станет более качественным и безопасным чем вообще без проверок :)</p>
<h1>Приступим!</h1>
<p>Чтобы прочувствовать тот &quot;вайб&quot; вайбкодера, нужно стать им. Но поскольку еще и параллельно нужно решать проблемы я эти <a href="https://habr.com/ru/news/1013212/">проблемы объединил</a> и так получилась идея создания <a href="https://hub.opensophy.com">Opensophy Hub</a>, статическая платформа для документации с набором Markdown blocks, dev-панель, интерактивными таблицами, UI-компонентами и live-редактором.</p>
<h2>Небольшая теория</h2>
<p>Просвятимся немного в терминологию devsecops процесса. Что такое Quality Gate и зачем он нужен, если очень просто то это набор правил, где код обязан пройти, прежде чем идти дальше по цепочке пайплайна. </p>
<p>Туда входит следующие:</p>
<ol>
<li>покрытие тестами не ниже N%</li>
<li>отсутствие новых уязвимостей</li>
<li>никаких критичных code smell&#39;ов</li>
<li>приемлемая оценка надёжности (например, не ниже B)</li>
</ol>
<p>В процессе разработки поскольку проект open-source и хочеться бесплатной проверки качества, выбираем SAST инструмент: SonarQube Cloud который проверяет код на каждый push. Если Quality Gate не пройден — GitHub Actions останавливает процесс, и деплой просто не происходит, пока проблемы не исправлены. </p>
<h2>Методы ии-интеграции в этом кейсе</h2>
<p>Поскольку мы говорим о проекте, который в основном пишет LLM, мы должны избежать эффект когда одинаковая модель &quot;пишет код = делает оценку&quot; иначе услышите от модели &quot;ОЙ. А ОКАЗЫВАЕТСЯ ТЫ ТУТ ПРАВ И ТУТ РЕАЛЬНО УЯЗВИМОСТЬ. СОРЕ&quot; поэтому можно пойти по такому подходу: Claude Sonnet 4.5 пишет код а Claude Sonnet 4.6 исправляет уязвимость. Щас может появиться вопрос &quot;Так это же одинаковые модели. не?&quot; Не совсем. Хоть и по отчету от DryRun Security Claude не в &quot;лучших&quot;(а лучший там Codex) я предпочитаю все же Claude и ее свежие модели(в нашем случае Sonnet 4.5 и Sonnet 4.6 это разные модели по качеству) и наверное личная неприязнь к Codex это то что она делает много лишнего в процессе либо не слушает. Как пример: во время исправлений она зачем-то исправляет код там где вообще не должна трогать! (она мне так темную тему сделала почти синего цвета.) и еще не любит писать код полностью хотя она получила полный доступ к информации о проекте итд итп. у Claude таких проблем нет.</p>
<p>Важно: Модель здесь не заменяет сами инструменты анализа такие как SonarQube Cloud, они остаются основной. Потому что инструмент даёт конкретику — где проблема, в какой строке, какого она типа и насколько критична. Модель уже работает поверх этого списка, а не пытается “на глаз” оценить код целиком. В этом и есть ключевой момент всего подхода.</p>
<h1>Часть 2 – подключение SonarQube Cloud и настройка Quality Gate</h1>
<p>Наверное избыточно рассказывать про &quot;как проходить регистрации в SonarQube Cloud&quot; мы перейдем сразу к делу. После регистрации проекта в SonarQube Cloud и первичного сканирования переходим в <strong>Administration -&gt; Analysis method</strong> – там будут перечислены все доступные варианты интеграции: <strong>Automatic analysis</strong>, <strong>GitHub Actions</strong>, <strong>CircleCI</strong>, <strong>Manual</strong>.</p>
<blockquote>
<p>Для каждого из этих вариантов SonarQube Cloud предоставляет готовые инструкции прямо в интерфейсе – <strong>Administration -&gt; Analysis method</strong>. После выбора нужного метода там будет пошаговый гайд с конкретными командами и конфигурационными файлами под ваш стек.</p>
</blockquote>
<p><img src="/assets/vibecode6.png" alt="Текст" title="Вот тут настройки выбора анализа."></p>
<p>Для проекта я выбрал Автоматический анализ. На первый взгляд может показаться, что GitHub Actions – очевидный выбор: больше контроля, явная интеграция в пайплайн. Но для большинства проектов, особенно на старте, <strong>автоматический анализ предпочтительнее</strong> и все дело в простой настройке. &quot;Нажал и все готово&quot;. Прям vibestyle! </p>
<p>GitHub Actions имеет смысл, если вам нужно <strong>жёстко заблокировать деплой</strong> при непрохождении Quality Gate. Automatic analysis работает асинхронно: SonarQube Cloud анализирует код и сообщает результат, но не может остановить уже запущенный деплой. Если между пушем и завершением анализа проходит хотя бы минута – деплой уйдёт вперёд. А с GitHub Actions можно выстроить цепочку которая блокирует деплой: push -&gt; sonarqube job -&gt; build -&gt; deploy, где <code>build</code> не запустится, пока <code>sonarqube</code> не завершится с успехом.</p>
<p>Если Quality Gate не прошёл, в логах GitHub Actions появится примерно следующее:</p>
<pre><code>ERROR QUALITY GATE STATUS: FAILED
Error: Action failed: The process &#39;...sonar-scanner&#39; failed with exit code 3
</code></pre>
<p>И ссылка на дашборд SonarQube Cloud с конкретными проблемами.</p>
<p><img src="/assets/vibecode1.png" alt="Текст" title="Демонстрация работы Quality Gate(не прошел качество кода)"></p>
<h2>Настройка Quality Gate в SonarQube Cloud</h2>
<p>По умолчанию SonarQube Cloud применяет <strong>Sonar way</strong> – стандартный Quality Gate. Для большинства проектов он вполне адекватен. Посмотреть и скастомизировать его можно в <strong>Policies -&gt; Quality Gates</strong>.</p>
<p>Стандартные условия Sonar way для нового кода:</p>
<table>
<thead>
<tr>
<th>Метрика</th>
<th>Порог</th>
</tr>
</thead>
<tbody><tr>
<td>Security Rating</td>
<td>A</td>
</tr>
<tr>
<td>Reliability Rating</td>
<td>A</td>
</tr>
<tr>
<td>Maintainability Rating</td>
<td>A</td>
</tr>
<tr>
<td>Coverage</td>
<td>≥ 80%</td>
</tr>
<tr>
<td>Duplicated Lines</td>
<td>≤ 3%</td>
</tr>
</tbody></table>
<p>Для вайбкод проекта первичная проверка может может показать от 50 до 200+ проблем. Поэтому готовьтесь к марафону на пару часов где например Coverage сразу убьёт Quality Gate. Его конечно на первое время можно убрать и оставить Security и Reliability Rating на уровне A – это разумная планка для любого проекта. Затем можно уже подключать условие по Coverage но это по вашему усмотрению как вы хотите. </p>
<p>В дальнейшем мы расширим sast инструменты, показав проблему такого процесса когда полностью LLM работает с отчетами, в рекомендации еще для полноценной проверки можно добавить SCA(Snyk или GitHub Dependabot) и DAST(HostedScan) инструменты, примеры в скобках имеют бесплатный тариф. </p>
<h1>Часть 3 – реальная проверка кода Hub, отчёты, исправления через Claude 4.6</h1>
<p>Итак. Допустим, ваш проект уже готов к релизу, SonarQube Cloud подключён, и вы только что посмотрели на результаты первого анализа:</p>
<p><img src="/assets/vibecode7.png" alt="Текст" title="234 проблем в коде!!"></p>
<p>Жёсткий stonks, да? Это результат для проекта с когда впервые запускаешь анализ после долгой разработки(это прям база базовая поэтому не страшитесь) если смотреть на факты: большинство из этих 234 проблем – code smell&#39;ы. Явные баги в проекте сравнительно редкие, но качество кода страдает именно из-за них и возможных мест где требуется рефакторинг по мнению анализа, поэтому нужно знать что здесь написано в файле иначе если понимаем не до конца, что именно модель сгенерировала в конкретном месте, можем задеть важную часть системы/функции итп.</p>
<h2>Пример как можно устранить проблем.</h2>
<p>Работать с проблеами и их устранять можно через любой интерфейс – IDE, API, CLI. Лично мне удобнее <strong>веб-версия Claude</strong>: можно одновременно видеть ход рассуждений модели, прикладывать скриншоты и сразу получать готовый файл. К тому же базовый план бесплатный.</p>
<h3>Шаг 1. Пишем промпт</h3>
<pre><code class="language-markdown">SonarQube Cloud сообщает о проблемах в коде. Проверь и полностью исправь файл. Твоя задача – сделать код максимально простым, читаемым и оптимизированным. При этом учитывай, что необходимо проверять предупреждения на ложные срабатывания (false positive).
Примечание: все комментарии должны быть на русском языке. Не добавляй лишние комментарии – только по функционалу. Никаких комментариев об исправлениях.
</code></pre>
<p>Почему такие требования к комментариям: если не указать явно, модель склонна добавлять пометки вида <code>// FIX: исправлен nested ternary</code> или <code>// SONAR: S3358</code>. Это мусор в коде – он иногда не несёт функциональной ценности и захламляет историю. К примеру модель исправила код но не до конца или сделала другие ошибки при изменении файла, из-за чего в нашем случае код будет еще больше из-за комментариев = больше затрат токенов. Поэтому в идеале нужно давать файл/код с минимальными комментариями которые прям нужны. Также можно добавить что LLM при исправлении может добавить NOSONAR комментарий, из-за чего вероятно реальная проблема, например XSS может оставаться в проекте.</p>
<h3>Шаг 2. Код</h3>
<p>Копируем содержимое файла/код либо если у вас Claude подключен к гитхабу вставляем код с проблемами в чат через репозиторий. В моем случае файл был большой он Claude автоматически переключается его в режим <code>pasted</code> – это нормально, контекст сохраняется.</p>
<h3>Шаг 3. Скриншоты проблем</h3>
<p>Переходим в SonarQube Cloud -&gt; <strong>Issues</strong> или в <strong>Security Hotspots</strong> (если говорить по приоритету то лучше решить сразу Security Hotspots), делаем скриншоты нужных проблем и прикладываем к сообщению:</p>
<p><img src="/assets/videcode10.png" alt="Текст" title="Примерно получается так по шагам."></p>
<p>Важный момент: одна и та же проблема может встречаться в файле несколько раз. Например, <code>Prefer globalThis over window</code> у меня было 9 вхождений. Если все они видны на скриншоте – отлично. Если нет – возможно стоит явно указать в промпте: «исправь все вхождения этой проблемы по всему файлу».</p>
<p>По этой же схеме проходим через Security Hotspots и остальные категории issues – делаем до тех пор, пока список не опустеет.</p>
<p><img src="/assets/vibecode8.png" alt="Текст" title="Спустя пару часов исправлений"></p>
<p>В результате получаем код, который прошёл статический анализ и соответствует заданному Quality Gate. Это не значит, что он идеален – но это значит, что он объективно лучше, чем до проверки.</p>
<h1>Часть 4 – Внедряем дополнительные инструменты и разбираем их подводные камни.</h1>
<p>Допустим, предыдущие части пройдены: SonarQube Cloud подключён, CI/CD настроен, проблемы исправлены. Теперь усилим покрытие и добавим ещё один SAST-инструмент – <strong>Semgrep</strong>. </p>
<p>SonarQube Cloud хоть и покрывает многие проблемы но все же он ориентирован прежде всего на <strong>качество кода</strong>, тогда как для  проверки безопасности предпочитают комбо инструментов и 2ой инструмент для этого будет Semgrep,  он сфокусирован на поиске уязвимостей и больше на безопасность. При этом, как и SonarQube Cloud, он предоставляет бесплатный облачный тариф.</p>
<h2>Регистрация и настройка Semgrep</h2>
<p>Регистрация аналогична SonarQube Cloud. Подмечу тока по интерфейсу: найденные проблемы отображаются в разделе <strong>Code</strong>, тогда как управление проектами и повторный запуск сканирований – в разделе <strong>Projects</strong>.</p>
<h2>Запуск сканирований</h2>
<p>В Semgrep доступно два режима анализа: стандартный (на основе правил) и &quot;ИИ-режим&quot;. Поэтому в идеале запускаем оба режима – они могут выявить пересекающиеся, но не идентичные наборы проблем.</p>
<p><img src="/assets/videcode11.png" alt="Текст" title="2 варианта скана"></p>
<h2>Сюрприз!</h2>
<p><strong>Здесь начинается главная проблема подхода.</strong> После того как SonarQube Cloud показал чистый результат, Semgrep обнаружил <strong>25 проблем</strong> в тех же файлах.</p>
<p>Это  демонстрирует, почему несколько сканеров дополняют: каждый инструмент работает по своему набору правил и эвристик, и зоны покрытия у них пересекаются лишь частично.</p>
<p><img src="/assets/videcode12.png" alt="Текст" title="SonarQube Cloud чистый"><br><img src="/assets/videcode13.png" alt="Текст" title="Semgrep показывает 24 проблемы в проекте"></p>
<p>Задача усложняется: нужно исправить то, что нашёл Semgrep, не сломав при этом то, что уже устроило SonarQube Cloud. Это принципиальный момент при работе с несколькими сканерами – исправление под один инструмент может вызвать новые предупреждения в другом.</p>
<p>Попытаемся дать эту таску Claude</p>
<p><img src="/assets/videcode14.png" alt="Текст" title="Выдаем задачу LLMке"></p>
<p>Итог: Модель возвращает исправленный файл. Коммитим, запускаем повторное сканирование и... ничего. Проблемы никуда не делись.</p>
<p>Это не редкая ситуация: Semgrep работает по строгим паттернам, и если исправление семантически корректно, но не соответствует ожидаемому паттерну правила – сканер по-прежнему будет его отмечать. В таких случаях стоит попробовать использовать встроенный <strong>ИИ-автофикс самого Semgrep</strong> который сделает пулл реквест нам в репо. и проблема снимется.</p>
<h2>Автофикс через Semgrep</h2>
<p>Чтобы Semgrep мог делать правки напрямую в репозиторий, нужно выдать ему права на <strong>read and write</strong> Content доступ к содержимому репозитория. После этого инструмент сам создаёт pull request с исправлениями – остаётся только проверить и смержить.</p>
<p><img src="/assets/videcode15.png" alt="Текст" title="Автофикс с помощью ИИ-Режима."></p>
<p>Подмечу как пример: В ходе работы через pull request была обнаружена одна некритичная проблема, которая при ближайшем рассмотрении оказалась <strong>false positive</strong> / (<a href="https://github.com/opensophy-projects/hub/commit/3fe7f983ce9e9c99696ecdc9379bfce1f8438d4a">коммит</a>). Это тоже часть процесса: ни один сканер(пока что) не даёт нулевого уровня ложных срабатываний, и умение их идентифицировать – такой же навык, как и исправление реальных уязвимостей.</p>
<p>Это небольшое напоминание что стоит следить за результатами сканов после каждого коммита от Semgrep и других инструментов. Во время которых может сломаться функциональность или сделать ещё хуже.</p>
<h1>Итоги</h1>
<p>Мы смогли сделать вайб-проект намного чище и безопаснее чем до его проверки, прошли путь от «llm написал код и задеплоил» до воспроизводимого пайплайна, где каждый коммит проходит через несколько слоёв проверки. Это </p>
<ul>
<li>снижает количество уязвимостей и code smell&#39;ов</li>
<li>даёт структурированный отчёт вместо абстрактного «код плохой»</li>
<li>встраивается в пайплайн и работает автоматически на каждый коммит</li>
</ul>
<p>Но нет гарантий что SAST-анализ ловит всё. Архитектурные проблемы вроде WebSocket Auth Bypass остаются за его пределами. И текущая схема где <code>агент генерирует -&gt; инструмент анализирует -&gt; агент исправляет</code> не замена code review а лишь бафф для проекта где код пишет в основном LLM. И лучше иметь её, чем не иметь ничего.</p>
<p><strong>Про проблемы:</strong> </p>
<ol>
<li><p><strong>Галлюцинации при повторных исправлениях.</strong> В этом процессе мы редко прибегали к Codex — и не случайно. После 3–4 итераций исправлений он начинает выдумывать: формально закрывает уязвимость, но попутно меняет то, что трогать не просил.  Пример: исправил уязвимость, но заодно изменил цвет тёмной темы с чёрного на синий. Чем длиннее сессия и сложнее задача — тем выше риск таких побочных эффектов у Codex.(кстати у Claude могут быть такого же уровня проблемы а-ля &quot;я забыл код. скинь мне его иначе буду писать кашу на основе диалога в чате&quot;) </p>
</li>
<li><p><strong>«Докажи мне».</strong> Когда специалист по пентесту находит уязвимость, а LLM объявляет это false positive, возникает конфликт, который требует времени на разрешение. Практичное решение — попросить пентестера показать воспроизводимый сценарий эксплуатации: после этого вопрос, как правило, снимается сам собой. А вот если пентестера нету и вы соло-разработчик то стоит напрягать LLM чтобы она показала хотя бы командами как активировать такую уязвимость.</p>
</li>
<li><p><strong>Роль человека в процессе.</strong> LLM не может заменить специалиста до тех пор, пока не способна самостоятельно доказать реальность уязвимости, а не просто её задекларировать. Если вы соло-разработчик без глубоких знаний в области безопасности — это повод разобраться в теме, чтобы уметь критически оценивать то, что говорит модель, а не принимать её вывод на веру.</p>
</li>
</ol>
<p><strong>Что ещё для идеала и возможные вопросы:</strong></p>
<p>Если в проекте есть подозрения на архитектурные проблемы — стоит дать модели полный доступ к кодовой базе и попросить провести жёсткий security review без привязки к конкретным файлам. Но важно помнить: по результатам такого анализа неизбежно начнётся очередной цикл правок, а значит, потребуется и очередной прогон инструментов.</p>
<p>Из дополнительных связок стоит упомянуть <strong>CodeFactor + SonarQube Cloud</strong>: инструменты покрывают частично разные классы проблем. CodeFactor иногда даёт больше false positive, но и находит то, что SonarQube Cloud пропускает.</p>
<p>Почему в статье рассматриваются только облачные решения, а не локальные? Хотелось показать, что даже без мощного оборудования можно условно бесплатно провести полноценный анализ — если проект подходит под бесплатные тарифы облачных SAST.</p>
</article> </main> </noscript> <astro-island uid="1uCVlP" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/development/devsecops-in-vibecode&quot;],&quot;title&quot;:[0,&quot;Вайбкод и безопасность: как не задеплоить уязвимости вместе с фичами&quot;],&quot;slug&quot;:[0,&quot;article/development/devsecops-in-vibecode&quot;],&quot;description&quot;:[0,&quot;Безопасность AI-кода: как проверять и улучшать код, сгенерированный ИИ. Интеграция SonarCloud, настройка Quality Gate и DevSecOps-пайплайн с автоматическим анализом и исправлением уязвимостей.&quot;],&quot;content&quot;:[0,&quot;&lt;h1&gt;Часть 1 – С чего все началось(и немного теории)&lt;/h1&gt;\n&lt;h1&gt;Введение&lt;/h1&gt;\n&lt;p&gt;Начнем из далека чтобы была понятна суть, в июле 2025 года инженер из команды Claude Code в Anthropic – &lt;strong&gt;Brian Cherny&lt;/strong&gt; – написал в X следующее:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;«Практически 100% нашего кода написано Claude Code + Opus 4.5. Лично для меня это уже 100% на протяжении двух с лишним месяцев – я даже не делаю правок вручную. Вчера я закрыл 22 пулл-реквеста, позавчера – 27, и каждый из них написан Claude полностью.»&lt;br&gt;– &lt;a href=\&quot;https://x.com/bcherny/status/2015979257038831967\&quot;&gt;Brian Cherny, @bcherny&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Дальше он добавил: большинство индустрии придёт к похожей статистике в ближайшие месяцы. И что они уже используют &lt;code&gt;claude -p&lt;/code&gt; на каждом PR для code review в свежем контексте итд итп что там крч Claude может полноценно работать автономно. Но и сравнительно недавно в марте 2026 года компания DryRun Security опубликовала &lt;a href=\&quot;https://t.me/devsecops_weekly/1453\&quot;&gt;&lt;strong&gt;«The Agentic Coding Security Report»&lt;/strong&gt;&lt;/a&gt; – небольшой, но очень показательный документ. Они взяли трёх кодинг-агентов – &lt;strong&gt;Claude&lt;/strong&gt; (Sonnet 4.6), &lt;strong&gt;Codex&lt;/strong&gt; (GPT 5.2) и &lt;strong&gt;Gemini&lt;/strong&gt; (2.5 Pro) – и дали каждому одно и то же задание: написать два приложения с нуля, добавляя фичи через pull request&amp;#39;ы, как это делает реальная команда разработчиков. После каждого PR прогонялся сканер безопасности. Результаты оказались, мягко говоря, интересными. Вкратце LLM пишут плохо код и согласно отчету &lt;strong&gt;87% pull request&amp;#39;ов&lt;/strong&gt; содержали хотя бы одну уязвимость и &lt;strong&gt;143 проблемы безопасности&lt;/strong&gt; суммарно из 38 сканов идр проблемы безопастностей. Выделили вот такой небольшой топик в таблицу повторяющихся проблем.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Класс уязвимости&lt;/th&gt;\n&lt;th&gt;Уровень&lt;/th&gt;\n&lt;th&gt;Кто допустил&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;Broken Access Control&lt;/td&gt;\n&lt;td&gt;Высокий&lt;/td&gt;\n&lt;td&gt;Все три агента&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Hardcoded JWT secrets&lt;/td&gt;\n&lt;td&gt;Высокий&lt;/td&gt;\n&lt;td&gt;Все три агента&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;WebSocket Auth Bypass&lt;/td&gt;\n&lt;td&gt;Высокий&lt;/td&gt;\n&lt;td&gt;Все три агента&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;IDOR&lt;/td&gt;\n&lt;td&gt;Высокий&lt;/td&gt;\n&lt;td&gt;Все три агента&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;User Enumeration&lt;/td&gt;\n&lt;td&gt;Средний&lt;/td&gt;\n&lt;td&gt;Все три агента&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;XSS&lt;/td&gt;\n&lt;td&gt;Средний&lt;/td&gt;\n&lt;td&gt;Gemini + все в отдельных случаях&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Race Conditions (TOCTOU)&lt;/td&gt;\n&lt;td&gt;Средний&lt;/td&gt;\n&lt;td&gt;Преимущественно Gemini&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;Что меня удивило: Лучшие результаты показал Codex(я очень надеялся на Claude) – но и у него остались незакрытые JWT-проблемы и отсутствие ревокации токенов.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Вывод из отчёта:&lt;/strong&gt; LLM пишут неплохо код но все же стоит проверять на безопасность и качество. Поэтому в этой статье мы  поговорим о вайбкоде и его безопасности, как довести проект/код, сгенерированный моделью до состояния где он станет более качественным и безопасным чем вообще без проверок :)&lt;/p&gt;\n&lt;h1&gt;Приступим!&lt;/h1&gt;\n&lt;p&gt;Чтобы прочувствовать тот &amp;quot;вайб&amp;quot; вайбкодера, нужно стать им. Но поскольку еще и параллельно нужно решать проблемы я эти &lt;a href=\&quot;https://habr.com/ru/news/1013212/\&quot;&gt;проблемы объединил&lt;/a&gt; и так получилась идея создания &lt;a href=\&quot;https://hub.opensophy.com\&quot;&gt;Opensophy Hub&lt;/a&gt;, статическая платформа для документации с набором Markdown blocks, dev-панель, интерактивными таблицами, UI-компонентами и live-редактором.&lt;/p&gt;\n&lt;h2&gt;Небольшая теория&lt;/h2&gt;\n&lt;p&gt;Просвятимся немного в терминологию devsecops процесса. Что такое Quality Gate и зачем он нужен, если очень просто то это набор правил, где код обязан пройти, прежде чем идти дальше по цепочке пайплайна. &lt;/p&gt;\n&lt;p&gt;Туда входит следующие:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;покрытие тестами не ниже N%&lt;/li&gt;\n&lt;li&gt;отсутствие новых уязвимостей&lt;/li&gt;\n&lt;li&gt;никаких критичных code smell&amp;#39;ов&lt;/li&gt;\n&lt;li&gt;приемлемая оценка надёжности (например, не ниже B)&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;В процессе разработки поскольку проект open-source и хочеться бесплатной проверки качества, выбираем SAST инструмент: SonarQube Cloud который проверяет код на каждый push. Если Quality Gate не пройден — GitHub Actions останавливает процесс, и деплой просто не происходит, пока проблемы не исправлены. &lt;/p&gt;\n&lt;h2&gt;Методы ии-интеграции в этом кейсе&lt;/h2&gt;\n&lt;p&gt;Поскольку мы говорим о проекте, который в основном пишет LLM, мы должны избежать эффект когда одинаковая модель &amp;quot;пишет код = делает оценку&amp;quot; иначе услышите от модели &amp;quot;ОЙ. А ОКАЗЫВАЕТСЯ ТЫ ТУТ ПРАВ И ТУТ РЕАЛЬНО УЯЗВИМОСТЬ. СОРЕ&amp;quot; поэтому можно пойти по такому подходу: Claude Sonnet 4.5 пишет код а Claude Sonnet 4.6 исправляет уязвимость. Щас может появиться вопрос &amp;quot;Так это же одинаковые модели. не?&amp;quot; Не совсем. Хоть и по отчету от DryRun Security Claude не в &amp;quot;лучших&amp;quot;(а лучший там Codex) я предпочитаю все же Claude и ее свежие модели(в нашем случае Sonnet 4.5 и Sonnet 4.6 это разные модели по качеству) и наверное личная неприязнь к Codex это то что она делает много лишнего в процессе либо не слушает. Как пример: во время исправлений она зачем-то исправляет код там где вообще не должна трогать! (она мне так темную тему сделала почти синего цвета.) и еще не любит писать код полностью хотя она получила полный доступ к информации о проекте итд итп. у Claude таких проблем нет.&lt;/p&gt;\n&lt;p&gt;Важно: Модель здесь не заменяет сами инструменты анализа такие как SonarQube Cloud, они остаются основной. Потому что инструмент даёт конкретику — где проблема, в какой строке, какого она типа и насколько критична. Модель уже работает поверх этого списка, а не пытается “на глаз” оценить код целиком. В этом и есть ключевой момент всего подхода.&lt;/p&gt;\n&lt;h1&gt;Часть 2 – подключение SonarQube Cloud и настройка Quality Gate&lt;/h1&gt;\n&lt;p&gt;Наверное избыточно рассказывать про &amp;quot;как проходить регистрации в SonarQube Cloud&amp;quot; мы перейдем сразу к делу. После регистрации проекта в SonarQube Cloud и первичного сканирования переходим в &lt;strong&gt;Administration -&amp;gt; Analysis method&lt;/strong&gt; – там будут перечислены все доступные варианты интеграции: &lt;strong&gt;Automatic analysis&lt;/strong&gt;, &lt;strong&gt;GitHub Actions&lt;/strong&gt;, &lt;strong&gt;CircleCI&lt;/strong&gt;, &lt;strong&gt;Manual&lt;/strong&gt;.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Для каждого из этих вариантов SonarQube Cloud предоставляет готовые инструкции прямо в интерфейсе – &lt;strong&gt;Administration -&amp;gt; Analysis method&lt;/strong&gt;. После выбора нужного метода там будет пошаговый гайд с конкретными командами и конфигурационными файлами под ваш стек.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/vibecode6.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Вот тут настройки выбора анализа.\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Для проекта я выбрал Автоматический анализ. На первый взгляд может показаться, что GitHub Actions – очевидный выбор: больше контроля, явная интеграция в пайплайн. Но для большинства проектов, особенно на старте, &lt;strong&gt;автоматический анализ предпочтительнее&lt;/strong&gt; и все дело в простой настройке. &amp;quot;Нажал и все готово&amp;quot;. Прям vibestyle! &lt;/p&gt;\n&lt;p&gt;GitHub Actions имеет смысл, если вам нужно &lt;strong&gt;жёстко заблокировать деплой&lt;/strong&gt; при непрохождении Quality Gate. Automatic analysis работает асинхронно: SonarQube Cloud анализирует код и сообщает результат, но не может остановить уже запущенный деплой. Если между пушем и завершением анализа проходит хотя бы минута – деплой уйдёт вперёд. А с GitHub Actions можно выстроить цепочку которая блокирует деплой: push -&amp;gt; sonarqube job -&amp;gt; build -&amp;gt; deploy, где &lt;code&gt;build&lt;/code&gt; не запустится, пока &lt;code&gt;sonarqube&lt;/code&gt; не завершится с успехом.&lt;/p&gt;\n&lt;p&gt;Если Quality Gate не прошёл, в логах GitHub Actions появится примерно следующее:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;ERROR QUALITY GATE STATUS: FAILED\nError: Action failed: The process &amp;#39;...sonar-scanner&amp;#39; failed with exit code 3\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;И ссылка на дашборд SonarQube Cloud с конкретными проблемами.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/vibecode1.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Демонстрация работы Quality Gate(не прошел качество кода)\&quot;&gt;&lt;/p&gt;\n&lt;h2&gt;Настройка Quality Gate в SonarQube Cloud&lt;/h2&gt;\n&lt;p&gt;По умолчанию SonarQube Cloud применяет &lt;strong&gt;Sonar way&lt;/strong&gt; – стандартный Quality Gate. Для большинства проектов он вполне адекватен. Посмотреть и скастомизировать его можно в &lt;strong&gt;Policies -&amp;gt; Quality Gates&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;Стандартные условия Sonar way для нового кода:&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Метрика&lt;/th&gt;\n&lt;th&gt;Порог&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;Security Rating&lt;/td&gt;\n&lt;td&gt;A&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Reliability Rating&lt;/td&gt;\n&lt;td&gt;A&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Maintainability Rating&lt;/td&gt;\n&lt;td&gt;A&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Coverage&lt;/td&gt;\n&lt;td&gt;≥ 80%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Duplicated Lines&lt;/td&gt;\n&lt;td&gt;≤ 3%&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;Для вайбкод проекта первичная проверка может может показать от 50 до 200+ проблем. Поэтому готовьтесь к марафону на пару часов где например Coverage сразу убьёт Quality Gate. Его конечно на первое время можно убрать и оставить Security и Reliability Rating на уровне A – это разумная планка для любого проекта. Затем можно уже подключать условие по Coverage но это по вашему усмотрению как вы хотите. &lt;/p&gt;\n&lt;p&gt;В дальнейшем мы расширим sast инструменты, показав проблему такого процесса когда полностью LLM работает с отчетами, в рекомендации еще для полноценной проверки можно добавить SCA(Snyk или GitHub Dependabot) и DAST(HostedScan) инструменты, примеры в скобках имеют бесплатный тариф. &lt;/p&gt;\n&lt;h1&gt;Часть 3 – реальная проверка кода Hub, отчёты, исправления через Claude 4.6&lt;/h1&gt;\n&lt;p&gt;Итак. Допустим, ваш проект уже готов к релизу, SonarQube Cloud подключён, и вы только что посмотрели на результаты первого анализа:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/vibecode7.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;234 проблем в коде!!\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Жёсткий stonks, да? Это результат для проекта с когда впервые запускаешь анализ после долгой разработки(это прям база базовая поэтому не страшитесь) если смотреть на факты: большинство из этих 234 проблем – code smell&amp;#39;ы. Явные баги в проекте сравнительно редкие, но качество кода страдает именно из-за них и возможных мест где требуется рефакторинг по мнению анализа, поэтому нужно знать что здесь написано в файле иначе если понимаем не до конца, что именно модель сгенерировала в конкретном месте, можем задеть важную часть системы/функции итп.&lt;/p&gt;\n&lt;h2&gt;Пример как можно устранить проблем.&lt;/h2&gt;\n&lt;p&gt;Работать с проблеами и их устранять можно через любой интерфейс – IDE, API, CLI. Лично мне удобнее &lt;strong&gt;веб-версия Claude&lt;/strong&gt;: можно одновременно видеть ход рассуждений модели, прикладывать скриншоты и сразу получать готовый файл. К тому же базовый план бесплатный.&lt;/p&gt;\n&lt;h3&gt;Шаг 1. Пишем промпт&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-markdown\&quot;&gt;SonarQube Cloud сообщает о проблемах в коде. Проверь и полностью исправь файл. Твоя задача – сделать код максимально простым, читаемым и оптимизированным. При этом учитывай, что необходимо проверять предупреждения на ложные срабатывания (false positive).\nПримечание: все комментарии должны быть на русском языке. Не добавляй лишние комментарии – только по функционалу. Никаких комментариев об исправлениях.\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Почему такие требования к комментариям: если не указать явно, модель склонна добавлять пометки вида &lt;code&gt;// FIX: исправлен nested ternary&lt;/code&gt; или &lt;code&gt;// SONAR: S3358&lt;/code&gt;. Это мусор в коде – он иногда не несёт функциональной ценности и захламляет историю. К примеру модель исправила код но не до конца или сделала другие ошибки при изменении файла, из-за чего в нашем случае код будет еще больше из-за комментариев = больше затрат токенов. Поэтому в идеале нужно давать файл/код с минимальными комментариями которые прям нужны. Также можно добавить что LLM при исправлении может добавить NOSONAR комментарий, из-за чего вероятно реальная проблема, например XSS может оставаться в проекте.&lt;/p&gt;\n&lt;h3&gt;Шаг 2. Код&lt;/h3&gt;\n&lt;p&gt;Копируем содержимое файла/код либо если у вас Claude подключен к гитхабу вставляем код с проблемами в чат через репозиторий. В моем случае файл был большой он Claude автоматически переключается его в режим &lt;code&gt;pasted&lt;/code&gt; – это нормально, контекст сохраняется.&lt;/p&gt;\n&lt;h3&gt;Шаг 3. Скриншоты проблем&lt;/h3&gt;\n&lt;p&gt;Переходим в SonarQube Cloud -&amp;gt; &lt;strong&gt;Issues&lt;/strong&gt; или в &lt;strong&gt;Security Hotspots&lt;/strong&gt; (если говорить по приоритету то лучше решить сразу Security Hotspots), делаем скриншоты нужных проблем и прикладываем к сообщению:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/videcode10.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Примерно получается так по шагам.\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Важный момент: одна и та же проблема может встречаться в файле несколько раз. Например, &lt;code&gt;Prefer globalThis over window&lt;/code&gt; у меня было 9 вхождений. Если все они видны на скриншоте – отлично. Если нет – возможно стоит явно указать в промпте: «исправь все вхождения этой проблемы по всему файлу».&lt;/p&gt;\n&lt;p&gt;По этой же схеме проходим через Security Hotspots и остальные категории issues – делаем до тех пор, пока список не опустеет.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/vibecode8.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Спустя пару часов исправлений\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;В результате получаем код, который прошёл статический анализ и соответствует заданному Quality Gate. Это не значит, что он идеален – но это значит, что он объективно лучше, чем до проверки.&lt;/p&gt;\n&lt;h1&gt;Часть 4 – Внедряем дополнительные инструменты и разбираем их подводные камни.&lt;/h1&gt;\n&lt;p&gt;Допустим, предыдущие части пройдены: SonarQube Cloud подключён, CI/CD настроен, проблемы исправлены. Теперь усилим покрытие и добавим ещё один SAST-инструмент – &lt;strong&gt;Semgrep&lt;/strong&gt;. &lt;/p&gt;\n&lt;p&gt;SonarQube Cloud хоть и покрывает многие проблемы но все же он ориентирован прежде всего на &lt;strong&gt;качество кода&lt;/strong&gt;, тогда как для  проверки безопасности предпочитают комбо инструментов и 2ой инструмент для этого будет Semgrep,  он сфокусирован на поиске уязвимостей и больше на безопасность. При этом, как и SonarQube Cloud, он предоставляет бесплатный облачный тариф.&lt;/p&gt;\n&lt;h2&gt;Регистрация и настройка Semgrep&lt;/h2&gt;\n&lt;p&gt;Регистрация аналогична SonarQube Cloud. Подмечу тока по интерфейсу: найденные проблемы отображаются в разделе &lt;strong&gt;Code&lt;/strong&gt;, тогда как управление проектами и повторный запуск сканирований – в разделе &lt;strong&gt;Projects&lt;/strong&gt;.&lt;/p&gt;\n&lt;h2&gt;Запуск сканирований&lt;/h2&gt;\n&lt;p&gt;В Semgrep доступно два режима анализа: стандартный (на основе правил) и &amp;quot;ИИ-режим&amp;quot;. Поэтому в идеале запускаем оба режима – они могут выявить пересекающиеся, но не идентичные наборы проблем.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/videcode11.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;2 варианта скана\&quot;&gt;&lt;/p&gt;\n&lt;h2&gt;Сюрприз!&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Здесь начинается главная проблема подхода.&lt;/strong&gt; После того как SonarQube Cloud показал чистый результат, Semgrep обнаружил &lt;strong&gt;25 проблем&lt;/strong&gt; в тех же файлах.&lt;/p&gt;\n&lt;p&gt;Это  демонстрирует, почему несколько сканеров дополняют: каждый инструмент работает по своему набору правил и эвристик, и зоны покрытия у них пересекаются лишь частично.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/videcode12.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;SonarQube Cloud чистый\&quot;&gt;&lt;br&gt;&lt;img src=\&quot;/assets/videcode13.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Semgrep показывает 24 проблемы в проекте\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Задача усложняется: нужно исправить то, что нашёл Semgrep, не сломав при этом то, что уже устроило SonarQube Cloud. Это принципиальный момент при работе с несколькими сканерами – исправление под один инструмент может вызвать новые предупреждения в другом.&lt;/p&gt;\n&lt;p&gt;Попытаемся дать эту таску Claude&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/videcode14.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Выдаем задачу LLMке\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Итог: Модель возвращает исправленный файл. Коммитим, запускаем повторное сканирование и... ничего. Проблемы никуда не делись.&lt;/p&gt;\n&lt;p&gt;Это не редкая ситуация: Semgrep работает по строгим паттернам, и если исправление семантически корректно, но не соответствует ожидаемому паттерну правила – сканер по-прежнему будет его отмечать. В таких случаях стоит попробовать использовать встроенный &lt;strong&gt;ИИ-автофикс самого Semgrep&lt;/strong&gt; который сделает пулл реквест нам в репо. и проблема снимется.&lt;/p&gt;\n&lt;h2&gt;Автофикс через Semgrep&lt;/h2&gt;\n&lt;p&gt;Чтобы Semgrep мог делать правки напрямую в репозиторий, нужно выдать ему права на &lt;strong&gt;read and write&lt;/strong&gt; Content доступ к содержимому репозитория. После этого инструмент сам создаёт pull request с исправлениями – остаётся только проверить и смержить.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/videcode15.png\&quot; alt=\&quot;Текст\&quot; title=\&quot;Автофикс с помощью ИИ-Режима.\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Подмечу как пример: В ходе работы через pull request была обнаружена одна некритичная проблема, которая при ближайшем рассмотрении оказалась &lt;strong&gt;false positive&lt;/strong&gt; / (&lt;a href=\&quot;https://github.com/opensophy-projects/hub/commit/3fe7f983ce9e9c99696ecdc9379bfce1f8438d4a\&quot;&gt;коммит&lt;/a&gt;). Это тоже часть процесса: ни один сканер(пока что) не даёт нулевого уровня ложных срабатываний, и умение их идентифицировать – такой же навык, как и исправление реальных уязвимостей.&lt;/p&gt;\n&lt;p&gt;Это небольшое напоминание что стоит следить за результатами сканов после каждого коммита от Semgrep и других инструментов. Во время которых может сломаться функциональность или сделать ещё хуже.&lt;/p&gt;\n&lt;h1&gt;Итоги&lt;/h1&gt;\n&lt;p&gt;Мы смогли сделать вайб-проект намного чище и безопаснее чем до его проверки, прошли путь от «llm написал код и задеплоил» до воспроизводимого пайплайна, где каждый коммит проходит через несколько слоёв проверки. Это &lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;снижает количество уязвимостей и code smell&amp;#39;ов&lt;/li&gt;\n&lt;li&gt;даёт структурированный отчёт вместо абстрактного «код плохой»&lt;/li&gt;\n&lt;li&gt;встраивается в пайплайн и работает автоматически на каждый коммит&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Но нет гарантий что SAST-анализ ловит всё. Архитектурные проблемы вроде WebSocket Auth Bypass остаются за его пределами. И текущая схема где &lt;code&gt;агент генерирует -&amp;gt; инструмент анализирует -&amp;gt; агент исправляет&lt;/code&gt; не замена code review а лишь бафф для проекта где код пишет в основном LLM. И лучше иметь её, чем не иметь ничего.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Про проблемы:&lt;/strong&gt; &lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;Галлюцинации при повторных исправлениях.&lt;/strong&gt; В этом процессе мы редко прибегали к Codex — и не случайно. После 3–4 итераций исправлений он начинает выдумывать: формально закрывает уязвимость, но попутно меняет то, что трогать не просил.  Пример: исправил уязвимость, но заодно изменил цвет тёмной темы с чёрного на синий. Чем длиннее сессия и сложнее задача — тем выше риск таких побочных эффектов у Codex.(кстати у Claude могут быть такого же уровня проблемы а-ля &amp;quot;я забыл код. скинь мне его иначе буду писать кашу на основе диалога в чате&amp;quot;) &lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;«Докажи мне».&lt;/strong&gt; Когда специалист по пентесту находит уязвимость, а LLM объявляет это false positive, возникает конфликт, который требует времени на разрешение. Практичное решение — попросить пентестера показать воспроизводимый сценарий эксплуатации: после этого вопрос, как правило, снимается сам собой. А вот если пентестера нету и вы соло-разработчик то стоит напрягать LLM чтобы она показала хотя бы командами как активировать такую уязвимость.&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;Роль человека в процессе.&lt;/strong&gt; LLM не может заменить специалиста до тех пор, пока не способна самостоятельно доказать реальность уязвимости, а не просто её задекларировать. Если вы соло-разработчик без глубоких знаний в области безопасности — это повод разобраться в теме, чтобы уметь критически оценивать то, что говорит модель, а не принимать её вывод на веру.&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;strong&gt;Что ещё для идеала и возможные вопросы:&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Если в проекте есть подозрения на архитектурные проблемы — стоит дать модели полный доступ к кодовой базе и попросить провести жёсткий security review без привязки к конкретным файлам. Но важно помнить: по результатам такого анализа неизбежно начнётся очередной цикл правок, а значит, потребуется и очередной прогон инструментов.&lt;/p&gt;\n&lt;p&gt;Из дополнительных связок стоит упомянуть &lt;strong&gt;CodeFactor + SonarQube Cloud&lt;/strong&gt;: инструменты покрывают частично разные классы проблем. CodeFactor иногда даёт больше false positive, но и находит то, что SonarQube Cloud пропускает.&lt;/p&gt;\n&lt;p&gt;Почему в статье рассматриваются только облачные решения, а не локальные? Хотелось показать, что даже без мощного оборудования можно условно бесплатно провести полноценный анализ — если проект подходит под бесплатные тарифы облачных SAST.&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Разработка&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;development&quot;],&quot;title&quot;:[0,&quot;Разработка&quot;],&quot;icon&quot;:[0,&quot;folder-code&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-05-01&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;безопасность&quot;],[0,&quot;вайбкод&quot;],[0,&quot;разработка&quot;],[0,&quot;devsecops&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;безопасность, вайбкод, уязвимости, devsecops, llm, sast, owasp&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;shield-alert&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Вайбкод и безопасность: как не задеплоить уязвимости вместе с фичами&quot;],&quot;description&quot;:[0,&quot;Безопасность AI-кода: как проверять и улучшать код, сгенерированный ИИ. Интеграция SonarCloud, настройка Quality Gate и DevSecOps-пайплайн с автоматическим анализом и исправлением уязвимостей.&quot;],&quot;date&quot;:[0,&quot;2026-05-01&quot;],&quot;tags&quot;:[0,&quot;безопасность, вайбкод, разработка, devsecops&quot;],&quot;keywords&quot;:[0,&quot;безопасность, вайбкод, уязвимости, devsecops, llm, sast, owasp&quot;],&quot;icon&quot;:[0,&quot;shield-alert&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-is
