em;"> <article><h2>Введение</h2>
<blockquote>
<p><strong>Важный контекст перед чтением.</strong> Большинство исследований, на которые мы опираемся, проводились на рынках США и Западной Европы — там, где ATS-системы внедрены максимально широко. По российскому рынку открытых академических данных практически нет. Тем не менее базовая механика работает одинаково везде, где применяются автоматические фильтры резюме — и российские крупные компании не исключение.</p>
</blockquote>
<p>Тема найма через автоматизированные системы сейчас довольно актуальна. Проблем с трудоустройством много — конкуренция, неправильно составленное резюме, неудачное собеседование. Но сегодня мы сосредоточимся на одной конкретной: <strong>ATS-фильтры</strong>. Именно они становятся первым и зачастую единственным барьером между кандидатом и живым человеком на другом конце.</p>
<p>Статья подготовлена на основе исследований, дополнительных источников и опыта авторов. Она будет полезна всем, кто сейчас ищет работу — неважно, джун вы или опытный специалист.</p>
<p><strong>Авторы:</strong> opensophy, глава проекта Opensophy, и <a href="https://t.me/anosof_roman">Аносов Роман</a>, директор по маркетингу.</p>
<hr>
<h2>Что такое ATS и как это вообще появилось</h2>
<p>ATS — Applicant Tracking System, система отслеживания кандидатов. Появились они в 1990-х как инструмент хранения резюме: компании получали сотни бумажных заявок, нужна была база данных. Со временем системы обросли функциями: парсинг резюме, ранжирование кандидатов, автоматическая фильтрация по ключевым словам.</p>
<p>Логика была понятна. Крупная компания получает тысячи заявок на одну позицию — некоторые вакансии собирают больше 1 000 откликов за 10 минут. Ни один HR физически не способен прочитать их все. Нужен фильтр.</p>
<p>Сегодня ATS используют большинство <strong>крупных</strong> компаний. Система стала стандартом индустрии раньше, чем кто-либо успел по-настоящему проверить, хорошо ли она работает.</p>
<hr>
<h2>Что говорят исследования</h2>
<h3>Проблема 1. ATS физически не умеет читать резюме</h3>
<p>В июне 2025 года Forbes опубликовал материал Джейкоба Жаке — основателя <a href="https://rezi.ai">Rezi</a>, сервиса с более чем 3 миллионами пользователей. Его команда провела эксперимент: взяли одно качественное резюме, пересобрали его в девяти форматах и загрузили каждую версию в реально используемую ATS-платформу.</p>
<p>Результат: <strong>даже лучший из форматов был распознан системой лишь на 58%.</strong> Контактные данные импортировались некорректно. Даты работы отображались иначе, чем в оригинале. Образование в большинстве случаев не распознавалось вообще.</p>
<blockquote>
<p><em>«Даже в лучшем случае почти половина ваших навыков, опыта и квалификаций просто исчезла. ATS может запнуться на чём угодно: от сложного форматирования до обычного расположения текста.»</em></p>
<p>— Jacob Jacquet, CEO Rezi, <a href="https://www.forbes.com/councils/forbeshumanresourcescouncil/2025/06/25/the-unfortunate-reality-for-job-seekers-rsum-scanners-dont-work/">Forbes, июнь 2025</a></p>
</blockquote>
<hr>
<h3>Проблема 2. Алгоритм ищет точные слова, а не смысл</h3>
<p>Большинство ATS-систем работают на <strong>точном совпадении ключевых слов</strong> — и это создаёт абсурдные ситуации.</p>
<p>Согласно разбору <a href="https://scale.jobs/blog/real-problem-automated-job-applications">scale.jobs (январь 2026)</a>:</p>
<ul>
<li>Вакансия требует «Adobe Creative Suite» — кандидат написал «Photoshop». Отказ, хотя Photoshop входит в Creative Suite.</li>
<li>«Online marketing specialist» и «digital marketing professional» — одна роль, система не видит связи.</li>
<li>Контакты в хедере или футере — ATS их не находит, рекрутер физически не может связаться с кандидатом.</li>
<li><strong>43% резюме отклоняются из-за несовместимого формата файла</strong> — до содержания никто не добирается.</li>
</ul>
<p>При этом <strong>88% работодателей признают</strong>, что их ATS-системы отсеивают сильных кандидатов только потому, что те не подали резюме в «правильном» формате. Система знает о своей проблеме. Система продолжает работать.</p>
<blockquote>
<p><em>«ИИ не понимает контекст. Он не знает, как вы достигли результатов и что сделало ваш вклад уникальным. Без этого ваше резюме может пройти все фильтры по ключевым словам, но не установит связь с живым человеком.»</em></p>
<p>— Adam Karpiak, Co-founder, Karpiak Consulting; цит. по scale.jobs, 2026</p>
</blockquote>
<hr>
<h2>Взгляд со стороны компании: почему фильтры всё-таки работают — и где они ломаются</h2>
<p>ATS внедряют не потому, что HR хочет отсеять хороших кандидатов. Причина другая — <strong>поток заявок</strong>.</p>
<p>Представьте: вакансия на разработчика, и за первые 10 минут — 300 откликов. Среди них: маляр, который «прошёл курс по коду за день», студент без единого проекта, специалист из совершенно другой области. HR физически не может прочитать всё это вручную. Фильтр решает конкретную операционную задачу — сократить очередь до тех, кто хотя бы формально подходит.</p>
<p><strong>Проблема не в самой идее фильтрации. Проблема в том, как она реализована.</strong></p>
<p>Хороший фильтр: «у кандидата нет ни одного из требуемых навыков — он не проходит». Это разумно. Плохой фильтр: «кандидат написал &quot;container orchestration&quot; вместо &quot;Kubernetes&quot; — он не проходит». Это уже потеря.</p>
<p>Вот как выглядит резюме глазами одной из ATS-систем:</p>
<p><img src="/assets/hr2.png" alt=""></p>
<p>Протестировав несколько ATS-инструментов, мы обнаружили характерную закономерность: значительная часть контекста отбрасывается, система извлекает только ключевые слова — и именно по ним принимает решение.</p>
<hr>
<h2>Что делать прямо сейчас</h2>
<h3>Уровень 1. Играть по правилам — оптимизация под ATS</h3>
<p>Если подаёшься через форму, делай это правильно:</p>
<ul>
<li><strong>Используй точные формулировки из вакансии</strong> — буквально копируй ключевые слова. Написано «JavaScript» — пиши «JavaScript», не «JS».</li>
<li><strong>Никаких таблиц, колонок, иконок, хедеров</strong> — ATS их не читает или читает криво. Один столбец, стандартные заголовки: «Опыт», «Образование», «Навыки».</li>
<li><strong>Пиши результаты, а не обязанности.</strong> Не «занимался аналитикой» — а «вырастил конверсию на 23% за квартал». ATS пропускает, человек читает.</li>
<li><strong>Резюме джуна и резюме мидла — разные документы.</strong> Алгоритм не угадывает потенциал — он сопоставляет паттерны.</li>
</ul>
<p>Простая проверка перед отправкой: открой описание вакансии и своё резюме рядом. Все ли ключевые требования из вакансии присутствуют в твоём тексте — именно теми словами?</p>
<p><a href="https://anosovroman.ru/blog/kak-napisat-luchshee-rezyume-dlya-ustroystva-na-rabotu-i-byt-samym-zhelannym-kandidatom-oboydya-ii-i-ats-v-2026">Подробнее как оптимизировать резюме под ATS рассказал Роман в своём блоге!</a></p>
<hr>
<h3>Уровень 2. Обойти систему — прямой контакт</h3>
<p>ATS существует потому, что HR завален заявками через форму. Но есть каналы, где формы нет вообще:</p>
<p><strong>Telegram-каналы с вакансиями</strong> — в IT, маркетинге, дизайне сотни каналов, где вакансии появляются напрямую и контакт HR открыт. Пишешь человеку — он читает человека, не алгоритм.</p>
<p><strong>Сайты самих компаний</strong> — не только агрегаторы вроде HH. Компании нередко публикуют вакансии на своих карьерных страницах раньше, чем на агрегаторах, и требования там порой мягче. Там же часто есть прямой контакт нанимающего менеджера или HR.</p>
<p><strong>Реферальные программы</strong> — попасть через знакомого внутри компании значит обойти ATS полностью (не всегда, но часто). Резюме сразу идёт с доверием, а не через очередь из тысячи заявок.</p>
<p><strong>Профильные сообщества</strong> — Telegram, Discord, тематические форумы. Вакансии появляются там раньше, чем на агрегаторах. Главное преимущество — возможность поговорить напрямую с HR или руководителем ещё до подачи заявки.</p>
<hr>
<h3>Уровень 3. Выбирай работодателей с человеческим процессом</h3>
<p>Не каждая компания прячется за формами. Есть работодатели, у которых живой контакт с HR доступен уже на старте. Это не случайность — это выбор культуры найма.</p>
<p>На практике это значит: отдавать предпочтение компаниям, где HR отвечает в Telegram или пишет публично в профильных каналах; искать вакансии, где указан конкретный человек, а не просто «HR-отдел»; строить репутацию в профессиональном сообществе — рекомендации работают там, где фильтр бессилен.</p>
<hr>
<h2>О «лжи» — честно</h2>
<p>Индустрия сама создала этот стимул. Когда система требует 5 лет опыта на позицию, где реально достаточно 4.5 — люди округляют. Когда алгоритм отсеивает по ключевым словам — люди вписывают их любыми способами. Когда форма не оставляет места для контекста — люди упрощают до неузнаваемости.</p>
<p><strong>Система поощряет адаптацию под фильтр. Это проблема системы, не кандидата.</strong></p>
<p>Но есть разница между адаптацией и выдумкой. Переформулировать реальный опыт в слова, которые понимает алгоритм, — это навык. Написать навык, которого нет, — это риск, который вскроется на практике. Первое работает. Второе нет.</p>
<hr>
<h2>Вывод</h2>
<p>ATS решает операционную проблему работодателя — слишком много заявок. Но создаёт структурную проблему рынка — невидимость реальных людей.</p>
<p>Пока индустрия не переосмыслит процесс, ответ практический: адаптируй резюме под язык конкретной вакансии, ищи прямой контакт с живым человеком, выбирай работодателей с человеческим процессом найма.</p>
<p>Лучшие возможности никогда не были за формой на сайте.</p>
</article> </main> </noscript> <astro-island uid="Z2qUyWb" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/career/ats-hr&quot;],&quot;title&quot;:[0,&quot;ATS в HR: почему люди получают автоотказы&quot;],&quot;slug&quot;:[0,&quot;article/career/ats-hr&quot;],&quot;description&quot;:[0,&quot;Разбор того, как работают ATS-фильтры, почему они ломают найм — и что с этим делать. На основе исследований и отраслевых разборов 2025–2026 года.&quot;],&quot;content&quot;:[0,&quot;&lt;h2&gt;Введение&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Важный контекст перед чтением.&lt;/strong&gt; Большинство исследований, на которые мы опираемся, проводились на рынках США и Западной Европы — там, где ATS-системы внедрены максимально широко. По российскому рынку открытых академических данных практически нет. Тем не менее базовая механика работает одинаково везде, где применяются автоматические фильтры резюме — и российские крупные компании не исключение.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Тема найма через автоматизированные системы сейчас довольно актуальна. Проблем с трудоустройством много — конкуренция, неправильно составленное резюме, неудачное собеседование. Но сегодня мы сосредоточимся на одной конкретной: &lt;strong&gt;ATS-фильтры&lt;/strong&gt;. Именно они становятся первым и зачастую единственным барьером между кандидатом и живым человеком на другом конце.&lt;/p&gt;\n&lt;p&gt;Статья подготовлена на основе исследований, дополнительных источников и опыта авторов. Она будет полезна всем, кто сейчас ищет работу — неважно, джун вы или опытный специалист.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Авторы:&lt;/strong&gt; opensophy, глава проекта Opensophy, и &lt;a href=\&quot;https://t.me/anosof_roman\&quot;&gt;Аносов Роман&lt;/a&gt;, директор по маркетингу.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Что такое ATS и как это вообще появилось&lt;/h2&gt;\n&lt;p&gt;ATS — Applicant Tracking System, система отслеживания кандидатов. Появились они в 1990-х как инструмент хранения резюме: компании получали сотни бумажных заявок, нужна была база данных. Со временем системы обросли функциями: парсинг резюме, ранжирование кандидатов, автоматическая фильтрация по ключевым словам.&lt;/p&gt;\n&lt;p&gt;Логика была понятна. Крупная компания получает тысячи заявок на одну позицию — некоторые вакансии собирают больше 1 000 откликов за 10 минут. Ни один HR физически не способен прочитать их все. Нужен фильтр.&lt;/p&gt;\n&lt;p&gt;Сегодня ATS используют большинство &lt;strong&gt;крупных&lt;/strong&gt; компаний. Система стала стандартом индустрии раньше, чем кто-либо успел по-настоящему проверить, хорошо ли она работает.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Что говорят исследования&lt;/h2&gt;\n&lt;h3&gt;Проблема 1. ATS физически не умеет читать резюме&lt;/h3&gt;\n&lt;p&gt;В июне 2025 года Forbes опубликовал материал Джейкоба Жаке — основателя &lt;a href=\&quot;https://rezi.ai\&quot;&gt;Rezi&lt;/a&gt;, сервиса с более чем 3 миллионами пользователей. Его команда провела эксперимент: взяли одно качественное резюме, пересобрали его в девяти форматах и загрузили каждую версию в реально используемую ATS-платформу.&lt;/p&gt;\n&lt;p&gt;Результат: &lt;strong&gt;даже лучший из форматов был распознан системой лишь на 58%.&lt;/strong&gt; Контактные данные импортировались некорректно. Даты работы отображались иначе, чем в оригинале. Образование в большинстве случаев не распознавалось вообще.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;«Даже в лучшем случае почти половина ваших навыков, опыта и квалификаций просто исчезла. ATS может запнуться на чём угодно: от сложного форматирования до обычного расположения текста.»&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;— Jacob Jacquet, CEO Rezi, &lt;a href=\&quot;https://www.forbes.com/councils/forbeshumanresourcescouncil/2025/06/25/the-unfortunate-reality-for-job-seekers-rsum-scanners-dont-work/\&quot;&gt;Forbes, июнь 2025&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;h3&gt;Проблема 2. Алгоритм ищет точные слова, а не смысл&lt;/h3&gt;\n&lt;p&gt;Большинство ATS-систем работают на &lt;strong&gt;точном совпадении ключевых слов&lt;/strong&gt; — и это создаёт абсурдные ситуации.&lt;/p&gt;\n&lt;p&gt;Согласно разбору &lt;a href=\&quot;https://scale.jobs/blog/real-problem-automated-job-applications\&quot;&gt;scale.jobs (январь 2026)&lt;/a&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Вакансия требует «Adobe Creative Suite» — кандидат написал «Photoshop». Отказ, хотя Photoshop входит в Creative Suite.&lt;/li&gt;\n&lt;li&gt;«Online marketing specialist» и «digital marketing professional» — одна роль, система не видит связи.&lt;/li&gt;\n&lt;li&gt;Контакты в хедере или футере — ATS их не находит, рекрутер физически не может связаться с кандидатом.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;43% резюме отклоняются из-за несовместимого формата файла&lt;/strong&gt; — до содержания никто не добирается.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;При этом &lt;strong&gt;88% работодателей признают&lt;/strong&gt;, что их ATS-системы отсеивают сильных кандидатов только потому, что те не подали резюме в «правильном» формате. Система знает о своей проблеме. Система продолжает работать.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;«ИИ не понимает контекст. Он не знает, как вы достигли результатов и что сделало ваш вклад уникальным. Без этого ваше резюме может пройти все фильтры по ключевым словам, но не установит связь с живым человеком.»&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;— Adam Karpiak, Co-founder, Karpiak Consulting; цит. по scale.jobs, 2026&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;h2&gt;Взгляд со стороны компании: почему фильтры всё-таки работают — и где они ломаются&lt;/h2&gt;\n&lt;p&gt;ATS внедряют не потому, что HR хочет отсеять хороших кандидатов. Причина другая — &lt;strong&gt;поток заявок&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;Представьте: вакансия на разработчика, и за первые 10 минут — 300 откликов. Среди них: маляр, который «прошёл курс по коду за день», студент без единого проекта, специалист из совершенно другой области. HR физически не может прочитать всё это вручную. Фильтр решает конкретную операционную задачу — сократить очередь до тех, кто хотя бы формально подходит.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Проблема не в самой идее фильтрации. Проблема в том, как она реализована.&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Хороший фильтр: «у кандидата нет ни одного из требуемых навыков — он не проходит». Это разумно. Плохой фильтр: «кандидат написал &amp;quot;container orchestration&amp;quot; вместо &amp;quot;Kubernetes&amp;quot; — он не проходит». Это уже потеря.&lt;/p&gt;\n&lt;p&gt;Вот как выглядит резюме глазами одной из ATS-систем:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/hr2.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Протестировав несколько ATS-инструментов, мы обнаружили характерную закономерность: значительная часть контекста отбрасывается, система извлекает только ключевые слова — и именно по ним принимает решение.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Что делать прямо сейчас&lt;/h2&gt;\n&lt;h3&gt;Уровень 1. Играть по правилам — оптимизация под ATS&lt;/h3&gt;\n&lt;p&gt;Если подаёшься через форму, делай это правильно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Используй точные формулировки из вакансии&lt;/strong&gt; — буквально копируй ключевые слова. Написано «JavaScript» — пиши «JavaScript», не «JS».&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Никаких таблиц, колонок, иконок, хедеров&lt;/strong&gt; — ATS их не читает или читает криво. Один столбец, стандартные заголовки: «Опыт», «Образование», «Навыки».&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Пиши результаты, а не обязанности.&lt;/strong&gt; Не «занимался аналитикой» — а «вырастил конверсию на 23% за квартал». ATS пропускает, человек читает.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Резюме джуна и резюме мидла — разные документы.&lt;/strong&gt; Алгоритм не угадывает потенциал — он сопоставляет паттерны.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Простая проверка перед отправкой: открой описание вакансии и своё резюме рядом. Все ли ключевые требования из вакансии присутствуют в твоём тексте — именно теми словами?&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://anosovroman.ru/blog/kak-napisat-luchshee-rezyume-dlya-ustroystva-na-rabotu-i-byt-samym-zhelannym-kandidatom-oboydya-ii-i-ats-v-2026\&quot;&gt;Подробнее как оптимизировать резюме под ATS рассказал Роман в своём блоге!&lt;/a&gt;&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;Уровень 2. Обойти систему — прямой контакт&lt;/h3&gt;\n&lt;p&gt;ATS существует потому, что HR завален заявками через форму. Но есть каналы, где формы нет вообще:&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Telegram-каналы с вакансиями&lt;/strong&gt; — в IT, маркетинге, дизайне сотни каналов, где вакансии появляются напрямую и контакт HR открыт. Пишешь человеку — он читает человека, не алгоритм.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Сайты самих компаний&lt;/strong&gt; — не только агрегаторы вроде HH. Компании нередко публикуют вакансии на своих карьерных страницах раньше, чем на агрегаторах, и требования там порой мягче. Там же часто есть прямой контакт нанимающего менеджера или HR.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Реферальные программы&lt;/strong&gt; — попасть через знакомого внутри компании значит обойти ATS полностью (не всегда, но часто). Резюме сразу идёт с доверием, а не через очередь из тысячи заявок.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Профильные сообщества&lt;/strong&gt; — Telegram, Discord, тематические форумы. Вакансии появляются там раньше, чем на агрегаторах. Главное преимущество — возможность поговорить напрямую с HR или руководителем ещё до подачи заявки.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;Уровень 3. Выбирай работодателей с человеческим процессом&lt;/h3&gt;\n&lt;p&gt;Не каждая компания прячется за формами. Есть работодатели, у которых живой контакт с HR доступен уже на старте. Это не случайность — это выбор культуры найма.&lt;/p&gt;\n&lt;p&gt;На практике это значит: отдавать предпочтение компаниям, где HR отвечает в Telegram или пишет публично в профильных каналах; искать вакансии, где указан конкретный человек, а не просто «HR-отдел»; строить репутацию в профессиональном сообществе — рекомендации работают там, где фильтр бессилен.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;О «лжи» — честно&lt;/h2&gt;\n&lt;p&gt;Индустрия сама создала этот стимул. Когда система требует 5 лет опыта на позицию, где реально достаточно 4.5 — люди округляют. Когда алгоритм отсеивает по ключевым словам — люди вписывают их любыми способами. Когда форма не оставляет места для контекста — люди упрощают до неузнаваемости.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Система поощряет адаптацию под фильтр. Это проблема системы, не кандидата.&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Но есть разница между адаптацией и выдумкой. Переформулировать реальный опыт в слова, которые понимает алгоритм, — это навык. Написать навык, которого нет, — это риск, который вскроется на практике. Первое работает. Второе нет.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Вывод&lt;/h2&gt;\n&lt;p&gt;ATS решает операционную проблему работодателя — слишком много заявок. Но создаёт структурную проблему рынка — невидимость реальных людей.&lt;/p&gt;\n&lt;p&gt;Пока индустрия не переосмыслит процесс, ответ практический: адаптируй резюме под язык конкретной вакансии, ищи прямой контакт с живым человеком, выбирай работодателей с человеческим процессом найма.&lt;/p&gt;\n&lt;p&gt;Лучшие возможности никогда не были за формой на сайте.&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Карьера&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;career&quot;],&quot;title&quot;:[0,&quot;Карьера&quot;],&quot;icon&quot;:[0,&quot;briefcase-business&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;opensophy, Аносов Роман&quot;],&quot;date&quot;:[0,&quot;2026-03-01&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;карьера&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;ATS фильтры, автоотказ, найм, резюме, алгоритмический найм, bias в HR&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;circle-alert&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;ATS в HR: почему люди получают автоотказы&quot;],&quot;description&quot;:[0,&quot;Разбор того, как работают ATS-фильтры, почему они ломают найм — и что с этим делать. На основе исследований и отраслевых разборов 2025–2026 года.&quot;],&quot;author&quot;:[0,&quot;opensophy, Аносов Роман&quot;],&quot;date&quot;:[0,&quot;2026-03-01&quot;],&quot;tags&quot;:[0,&quot;карьера&quot;],&quot;keywords&quot;:[0,&quot;ATS фильтры, автоотказ, найм, резюме, алгоритмический найм, bias в HR&quot;],&quot;lang&quot;:[0,&quot;ru&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island> <!-- Re-apply theme after SPA navigation --> <script>
