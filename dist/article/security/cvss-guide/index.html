<h2>Что такое CVSS и зачем он нужен</h2>
<p><strong>CVSS (Common Vulnerability Scoring System)</strong> – открытый стандарт для оценки серьёзности уязвимостей в программном обеспечении. Он выдаёт числовой балл от 0 до 10: чем выше – тем хуже ситуация в теории.</p>
<p>CVSS оценивает <strong>свойства уязвимости</strong>, а не её реальную опасность для вашей конкретной инфраструктуры. Это разные вещи. Уязвимость с баллом 9.8 в компоненте, который у вас вообще не запущен – не ваша проблема. А дырка на 6.5 в сервисе, торчащем в открытый интернет с базой данных клиентов за ним – очень даже ваша.</p>
<p>Стандарт появился в 2005 году, разработан при участии Cisco, Microsoft и других крупных игроков. Сейчас его поддерживает организация <strong>FIRST</strong> (Forum of Incident Response and Security Teams). Последняя версия – <strong>CVSS v4.0</strong>, вышедшая в конце 2023 года. Основным источником оценок для публичных CVE остаётся американская <strong>NVD</strong> (National Vulnerability Database), а в России дополнительно используется <strong>БДУ ФСТЭК</strong>.</p>
<h2>Три группы метрик</h2>
<p>Итоговый балл формируется из трёх слоёв, каждый из которых отвечает на свой вопрос.</p>
<h3>1. Базовая группа (Base Metrics)</h3>
<p>Это характеристики самой уязвимости, не зависящие от времени и контекста. Именно базовый балл вы обычно видите в NVD и бюллетенях безопасности.</p>
<p><strong>Вектор атаки (Attack Vector)</strong> – откуда атакующий может воздействовать на систему:</p>
<ul>
<li><strong>Network (N)</strong> – через сеть, без физического присутствия. Самый опасный вариант.</li>
<li><strong>Adjacent (A)</strong> – нужен доступ к той же локальной сети.</li>
<li><strong>Local (L)</strong> – требуется локальный доступ к системе (терминал, SSH).</li>
<li><strong>Physical (P)</strong> – нужен физический доступ к железу.</li>
</ul>
<p><strong>Сложность атаки (Attack Complexity)</strong> – насколько легко её провести:</p>
<ul>
<li><strong>Low</strong> – никаких специальных условий, атакуй в лоб.</li>
<li><strong>High</strong> – нужны дополнительные факторы вне контроля атакующего (например, угадать токен сессии или провести MITM).</li>
</ul>
<p><strong>Требуемые привилегии (Privileges Required)</strong>:</p>
<ul>
<li><strong>None</strong> – любой неавторизованный пользователь.</li>
<li><strong>Low</strong> – базовые права обычного пользователя.</li>
<li><strong>High</strong> – права администратора.</li>
</ul>
<p><strong>Взаимодействие с пользователем (User Interaction)</strong>:</p>
<ul>
<li><strong>None</strong> – жертва ничего не делает, атака полностью автоматизирована.</li>
<li><strong>Required</strong> – жертва должна совершить действие: кликнуть ссылку, открыть файл.</li>
</ul>
<p><strong>Метрики влияния (Impact Metrics)</strong> – что происходит с тремя столпами ИБ при успешной атаке:</p>
<ul>
<li><strong>Confidentiality (C)</strong> – утечка данных.</li>
<li><strong>Integrity (I)</strong> – модификация данных.</li>
<li><strong>Availability (A)</strong> – отказ в обслуживании.</li>
</ul>
<p>Каждая из трёх оценивается как None / Low / High.</p>
<p>Уязвимость, которая даёт удалённое выполнение кода без авторизации и без взаимодействия с пользователем, с полным влиянием на все три метрики – получает 9.8–10.0. Как пример так выглядит <strong>Log4Shell (CVE-2021-44228, CVSS 10.0)</strong>.</p>
<h3>2. Временная группа (Temporal Metrics)</h3>
<p>Базовая оценка статична. Но мир меняется: появляются рабочие эксплойты, выходят патчи, уточняется информация. Временные метрики корректируют балл с учётом актуального состояния дел.</p>
<p><strong>Доступность эксплойта (Exploit Code Maturity)</strong>:</p>
<ul>
<li>Эксплойта нет – оценка не меняется.</li>
<li>Есть PoC (proof of concept) – риск вырастает.</li>
<li>Есть готовый автоматизированный инструмент – риск максимальный.</li>
</ul>
<p>Именно здесь кроется разница между <strong>EternalBlue (CVE-2017-0144, базовый CVSS 8.1)</strong> в день обнаружения и тем же EternalBlue после появления WannaCry. Цифра формально та же, а реальная угроза – совершенно другая.</p>
<p><strong>Уровень исправления (Remediation Level)</strong>:</p>
<ul>
<li>Патча нет.</li>
<li>Есть временное обходное решение (workaround).</li>
<li>Есть официальный патч от вендора.</li>
</ul>
<p>Наличие патча снижает итоговую временную оценку, его отсутствие – поднимает.</p>
<p><strong>Достоверность информации (Report Confidence)</strong>:</p>
<ul>
<li>Неподтверждённые слухи – оценка снижается.(вот тут спорно и я поясню это ниже.)</li>
<li>Вендор подтвердил наличие уязвимости – максимальная достоверность.</li>
</ul>
<h3>3. Контекстная группа (Environmental Metrics)</h3>
<p>Самая важная группа для практического применения. Здесь вы берёте базовую оценку и адаптируете её к своей инфраструктуре.</p>
<p>Можно переопределить любую базовую метрику с приставкой Modified. Например, уязвимость имеет вектор <strong>Network</strong>, но уязвимый сервер стоит в изолированном сегменте без выхода наружу. Вы меняете <strong>Modified Attack Vector</strong> на <strong>Local</strong> – и итоговая оценка падает на несколько пунктов.</p>
<p>Также задаются требования к безопасности конкретных активов:</p>
<ul>
<li><strong>CR (Confidentiality Requirement)</strong> – насколько критична конфиденциальность данного актива.</li>
<li><strong>IR (Integrity Requirement)</strong> – насколько важна его целостность.</li>
<li><strong>AR (Availability Requirement)</strong> – насколько критична доступность.</li>
</ul>
<p>Одна и та же уязвимость в статическом маркетинговом лендинге и в сервере с платёжными данными – это две абсолютно разные ситуации.</p>
<h2>Шкала и что с ней делать</h2>
<table>
<thead>
<tr>
<th align="center">Диапазон</th>
<th align="center">Уровень</th>
<th align="left">Что это значит на практике</th>
</tr>
</thead>
<tbody><tr>
<td align="center">0</td>
<td align="center">Нет риска</td>
<td align="left">Уязвимость формально есть, реального вреда нет</td>
</tr>
<tr>
<td align="center">0.1–3.9</td>
<td align="center">Низкий</td>
<td align="left">Эксплуатация маловероятна или эффект минимальный</td>
</tr>
<tr>
<td align="center">4.0–6.9</td>

</tr>
<tr>

</tr>

<td align="center">Критический</td>

</tr>
</tbody></table>
<p>Несколько ориентиров для работы:</p>
<ul>
<li><strong>CVSS 7.0+</strong> – откладывать патч без весомой причины не стоит.</li>
<li><strong>CVSS 9.0+ с доступным эксплойтом</strong> – это уже не вопрос «когда», а вопрос «насколько быстро».</li>
<li><strong>CVSS любой + компонент не используется</strong> – сначала проверьте, точно ли он не используется.</li>
</ul>
<p>Хакеры тоже читают NVD. Уязвимости с высоким CVSS и публичным PoC попадают в автоматизированные инструменты взлома быстрее, чем выходит патч.</p>
<h2>Реальные примеры</h2>
<p><strong>Log4Shell (CVE-2021-44228)</strong> – CVSS 10.0. Уязвимость в библиотеке Log4j позволяла выполнить произвольный код через обычный лог-запрос. Сетевой вектор, нулевая сложность, никаких привилегий, никакого взаимодействия с пользователем. Когда вышел PoC, весь мир в буквальном смысле бросился патчить всё, что могло иметь отношение к Java.</p>
<p><strong>EternalBlue (CVE-2017-0144)</strong> – базовый CVSS 8.1. Сам по себе уже серьёзно, но когда NSA-инструмент утёк, а на его базе написали WannaCry – реальный риск вышел далеко за пределы любых числовых оценок.</p>
<p><strong>Follina (CVE-2022-30190)</strong> – CVSS 7.8. Уязвимость в Windows/MS Office, связанная с MSDT. На момент обнаружения – средне-высокий балл. Позднее активно эксплуатировалась APT-группами. Хороший пример того, почему временные метрики важны.</p>
<p><strong>CVE-2024-40711 (Veeam Backup &amp; Replication)</strong> – позволяет неавторизованным пользователям удалённо выполнять произвольный код. Для организаций, которые используют Veeam для резервного копирования – прямой путь к компрометации всей инфраструктуры через бэкап-сервер.</p>
<h2>Где изучать уязвимости и искать информацию</h2>
<p>Сказав про фейковые CVE – Поясню. Интернет любит хайп и даже сюда вайбовые ребята могут написать что угодно а потом ИИ будет это писать что это реальная уязвимость. О чем это я? Достаточно много экспериментов проводилось где пользователь пишет фейковую информацию и так называемые &quot;агрегаторы ии детекторы на уязвимости&quot; думали что это реальная уязвимость! Поэтому если где и искать информацию(по моему мнению) так это в этих источниках:</p>
<h3>CVE Program – <a href="https://www.cve.org/">cve.org</a></h3>
<p>Официальный реестр публично известных уязвимостей. Каждой присваивается уникальный идентификатор в формате <strong>CVE-YYYY-NNNNN</strong>. Здесь можно найти описание уязвимости, ссылки на патчи и связанные ресурсы. Это первое место, куда стоит идти, когда видишь незнакомый CVE-номер.</p>
<h3>NVD – <a href="https://nvd.nist.gov/">nvd.nist.gov</a></h3>
<p><strong>National Vulnerability Database</strong> от американского NIST – основная база, где к CVE добавляются CVSS-оценки, векторные строки, ссылки на CWE (Common Weakness Enumeration) и конфигурации CPE. Здесь удобно смотреть полную карточку уязвимости с разбивкой по версиям CVSS.</p>
<h3>OWASP – <a href="https://owasp.org/">owasp.org</a></h3>
<p><strong>Open Web Application Security Project</strong> – некоммерческая организация, которая занимается безопасностью веб-приложений. Ключевые ресурсы:</p>
<ul>
<li><strong>OWASP Top 10</strong> – список десяти наиболее критичных классов уязвимостей веб-приложений. Обновляется раз в несколько лет, служит основой для большинства чеклистов и аудитов.</li>
<li><strong>OWASP Testing Guide</strong> – методология тестирования безопасности веб-приложений.</li>
<li><strong>OWASP WSTG</strong> (Web Security Testing Guide) – детальный справочник по каждому классу атак с примерами.</li>
<li><strong>WebGoat и DVWA</strong> – намеренно уязвимые приложения для практики.</li>
</ul>
<p>Если вы занимаетесь безопасностью веб-приложений или разрабатываете их – OWASP обязателен к изучению.</p>
<h3>PortSwigger Web Security Academy –<a href="https://portswigger.net/web-security">portswigger.net/web-security</a></h3>
<p>Бесплатная обучающая платформа от создателей Burp Suite. Один из лучших ресурсов для практического изучения веб-уязвимостей: SQL-инъекции, XSS, CSRF, SSRF, XXE, десериализация, OAuth-уязвимости и многое другое.</p>
<p>Каждая тема структурирована: теория, лабораторные работы разной сложности, решения. Лабы запускаются прямо в браузере – никаких VM не нужно. Есть бесплатный и платный уровень, но базовый контент закрывает большинство практических нужд.</p>
<p>Если хотите реально понять, как работают атаки, а не просто читать про них – сюда.</p>
<h3>Exploit Database – <a href="https://www.exploit-db.com/">exploit-db.com</a></h3>
<p>База публичных эксплойтов и уязвимостей, которую ведёт Offensive Security (они же создатели Kali Linux). Здесь хранятся реальные PoC-коды и рабочие эксплойты. Используется для:</p>
<ul>
<li>Проверки, существует ли публичный эксплойт для конкретного CVE.</li>
<li>Изучения техник эксплуатации.</li>
<li>Пентеста (в легальных условиях).</li>
</ul>
<p>Также содержит <strong>Google Hacking Database (GHDB)</strong> – сборник поисковых запросов для нахождения уязвимых систем через Google (Dorks). Полезно для понимания, что именно индексируют поисковики из вашей инфраструктуры.</p>
<p>Опционально еще <strong>БДУ ФСТЭК</strong> – российская база данных угроз безопасности информации. Для организаций, работающих под требованиями российского законодательства (КИИ, персональные данные) – но там почему-то нет https и весьма сомнительно показалось от этого, поэтому поискать думаю сами можете :_)</p>
</article> </main> </noscript> <astro-island uid="ZtLVat" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/security/cvss-guide&quot;],&quot;title&quot;:[0,&quot;Кратко о CVSS: как оценивать критичность уязвимостей&quot;],&quot;slug&quot;:[0,&quot;article/security/cvss-guide&quot;],&quot;description&quot;:[0,&quot;Разбираем Common Vulnerability Scoring System – что скрывается за цифрой от 0 до 10, как читать базовые, временные и контекстные метрики, и где искать актуальную информацию об уязвимостях.&quot;],&quot;content&quot;:[0,&quot;&lt;p&gt;Каждый день в мире появляются десятки новых CVE, некоторые могут быть &amp;quot;фейковые&amp;quot; CVEшки а есть и настоящие. Кто-то смотрит на них мельком, закрывает таб и идёт пить чай. Кто-то начинает паниковать при виде любой цифры выше шести. Ни то, ни другое – не лучший подход. В этой статье мы рассмотрим терминологию CVSS, метрики итп включая источники. Приступим.&lt;/p&gt;\n&lt;h2&gt;Что такое CVSS и зачем он нужен&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;CVSS (Common Vulnerability Scoring System)&lt;/strong&gt; – открытый стандарт для оценки серьёзности уязвимостей в программном обеспечении. Он выдаёт числовой балл от 0 до 10: чем выше – тем хуже ситуация в теории.&lt;/p&gt;\n&lt;p&gt;CVSS оценивает &lt;strong&gt;свойства уязвимости&lt;/strong&gt;, а не её реальную опасность для вашей конкретной инфраструктуры. Это разные вещи. Уязвимость с баллом 9.8 в компоненте, который у вас вообще не запущен – не ваша проблема. А дырка на 6.5 в сервисе, торчащем в открытый интернет с базой данных клиентов за ним – очень даже ваша.&lt;/p&gt;\n&lt;p&gt;Стандарт появился в 2005 году, разработан при участии Cisco, Microsoft и других крупных игроков. Сейчас его поддерживает организация &lt;strong&gt;FIRST&lt;/strong&gt; (Forum of Incident Response and Security Teams). Последняя версия – &lt;strong&gt;CVSS v4.0&lt;/strong&gt;, вышедшая в конце 2023 года. Основным источником оценок для публичных CVE остаётся американская &lt;strong&gt;NVD&lt;/strong&gt; (National Vulnerability Database), а в России дополнительно используется &lt;strong&gt;БДУ ФСТЭК&lt;/strong&gt;.&lt;/p&gt;\n&lt;h2&gt;Три группы метрик&lt;/h2&gt;\n&lt;p&gt;Итоговый балл формируется из трёх слоёв, каждый из которых отвечает на свой вопрос.&lt;/p&gt;\n&lt;h3&gt;1. Базовая группа (Base Metrics)&lt;/h3&gt;\n&lt;p&gt;Это характеристики самой уязвимости, не зависящие от времени и контекста. Именно базовый балл вы обычно видите в NVD и бюллетенях безопасности.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Вектор атаки (Attack Vector)&lt;/strong&gt; – откуда атакующий может воздействовать на систему:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Network (N)&lt;/strong&gt; – через сеть, без физического присутствия. Самый опасный вариант.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Adjacent (A)&lt;/strong&gt; – нужен доступ к той же локальной сети.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Local (L)&lt;/strong&gt; – требуется локальный доступ к системе (терминал, SSH).&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Physical (P)&lt;/strong&gt; – нужен физический доступ к железу.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Сложность атаки (Attack Complexity)&lt;/strong&gt; – насколько легко её провести:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Low&lt;/strong&gt; – никаких специальных условий, атакуй в лоб.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;High&lt;/strong&gt; – нужны дополнительные факторы вне контроля атакующего (например, угадать токен сессии или провести MITM).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Требуемые привилегии (Privileges Required)&lt;/strong&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;None&lt;/strong&gt; – любой неавторизованный пользователь.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Low&lt;/strong&gt; – базовые права обычного пользователя.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;High&lt;/strong&gt; – права администратора.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Взаимодействие с пользователем (User Interaction)&lt;/strong&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;None&lt;/strong&gt; – жертва ничего не делает, атака полностью автоматизирована.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Required&lt;/strong&gt; – жертва должна совершить действие: кликнуть ссылку, открыть файл.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Метрики влияния (Impact Metrics)&lt;/strong&gt; – что происходит с тремя столпами ИБ при успешной атаке:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Confidentiality (C)&lt;/strong&gt; – утечка данных.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Integrity (I)&lt;/strong&gt; – модификация данных.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Availability (A)&lt;/strong&gt; – отказ в обслуживании.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Каждая из трёх оценивается как None / Low / High.&lt;/p&gt;\n&lt;p&gt;Уязвимость, которая даёт удалённое выполнение кода без авторизации и без взаимодействия с пользователем, с полным влиянием на все три метрики – получает 9.8–10.0. Как пример так выглядит &lt;strong&gt;Log4Shell (CVE-2021-44228, CVSS 10.0)&lt;/strong&gt;.&lt;/p&gt;\n&lt;h3&gt;2. Временная группа (Temporal Metrics)&lt;/h3&gt;\n&lt;p&gt;Базовая оценка статична. Но мир меняется: появляются рабочие эксплойты, выходят патчи, уточняется информация. Временные метрики корректируют балл с учётом актуального состояния дел.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Доступность эксплойта (Exploit Code Maturity)&lt;/strong&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Эксплойта нет – оценка не меняется.&lt;/li&gt;\n&lt;li&gt;Есть PoC (proof of concept) – риск вырастает.&lt;/li&gt;\n&lt;li&gt;Есть готовый автоматизированный инструмент – риск максимальный.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Именно здесь кроется разница между &lt;strong&gt;EternalBlue (CVE-2017-0144, базовый CVSS 8.1)&lt;/strong&gt; в день обнаружения и тем же EternalBlue после появления WannaCry. Цифра формально та же, а реальная угроза – совершенно другая.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Уровень исправления (Remediation Level)&lt;/strong&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Патча нет.&lt;/li&gt;\n&lt;li&gt;Есть временное обходное решение (workaround).&lt;/li&gt;\n&lt;li&gt;Есть официальный патч от вендора.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Наличие патча снижает итоговую временную оценку, его отсутствие – поднимает.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Достоверность информации (Report Confidence)&lt;/strong&gt;:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Неподтверждённые слухи – оценка снижается.(вот тут спорно и я поясню это ниже.)&lt;/li&gt;\n&lt;li&gt;Вендор подтвердил наличие уязвимости – максимальная достоверность.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;3. Контекстная группа (Environmental Metrics)&lt;/h3&gt;\n&lt;p&gt;Самая важная группа для практического применения. Здесь вы берёте базовую оценку и адаптируете её к своей инфраструктуре.&lt;/p&gt;\n&lt;p&gt;Можно переопределить любую базовую метрику с приставкой Modified. Например, уязвимость имеет вектор &lt;strong&gt;Network&lt;/strong&gt;, но уязвимый сервер стоит в изолированном сегменте без выхода наружу. Вы меняете &lt;strong&gt;Modified Attack Vector&lt;/strong&gt; на &lt;strong&gt;Local&lt;/strong&gt; – и итоговая оценка падает на несколько пунктов.&lt;/p&gt;\n&lt;p&gt;Также задаются требования к безопасности конкретных активов:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;CR (Confidentiality Requirement)&lt;/strong&gt; – насколько критична конфиденциальность данного актива.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;IR (Integrity Requirement)&lt;/strong&gt; – насколько важна его целостность.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;AR (Availability Requirement)&lt;/strong&gt; – насколько критична доступность.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Одна и та же уязвимость в статическом маркетинговом лендинге и в сервере с платёжными данными – это две абсолютно разные ситуации.&lt;/p&gt;\n&lt;h2&gt;Шкала и что с ней делать&lt;/h2&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th align=\&quot;center\&quot;&gt;Диапазон&lt;/th&gt;\n&lt;th align=\&quot;center\&quot;&gt;Уровень&lt;/th&gt;\n&lt;th align=\&quot;left\&quot;&gt;Что это значит на практике&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td align=\&quot;center\&quot;&gt;0&lt;/td&gt;\n&lt;td align=\&quot;center\&quot;&gt;Нет риска&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Уязвимость формально есть, реального вреда нет&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;center\&quot;&gt;0.1–3.9&lt;/td&gt;\n&lt;td align=\&quot;center\&quot;&gt;Низкий&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Эксплуатация маловероятна или эффект минимальный&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;center\&quot;&gt;4.0–6.9&lt;/td&gt;\n&lt;td align=\&quot;center\&quot;&gt;Средний&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Может быть использована, требует оценки контекста&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;center\&quot;&gt;7.0–8.9&lt;/td&gt;\n&lt;td align=\&quot;center\&quot;&gt;Высокий&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Возможна удалённая атака, данные могут быть скомпрометированы&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;center\&quot;&gt;9.0–10.0&lt;/td&gt;\n&lt;td align=\&quot;center\&quot;&gt;Критический&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Простая эксплуатация + серьёзный ущерб, часто RCE без авторизации&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;Несколько ориентиров для работы:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;CVSS 7.0+&lt;/strong&gt; – откладывать патч без весомой причины не стоит.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CVSS 9.0+ с доступным эксплойтом&lt;/strong&gt; – это уже не вопрос «когда», а вопрос «насколько быстро».&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;CVSS любой + компонент не используется&lt;/strong&gt; – сначала проверьте, точно ли он не используется.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Хакеры тоже читают NVD. Уязвимости с высоким CVSS и публичным PoC попадают в автоматизированные инструменты взлома быстрее, чем выходит патч.&lt;/p&gt;\n&lt;h2&gt;Реальные примеры&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Log4Shell (CVE-2021-44228)&lt;/strong&gt; – CVSS 10.0. Уязвимость в библиотеке Log4j позволяла выполнить произвольный код через обычный лог-запрос. Сетевой вектор, нулевая сложность, никаких привилегий, никакого взаимодействия с пользователем. Когда вышел PoC, весь мир в буквальном смысле бросился патчить всё, что могло иметь отношение к Java.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;EternalBlue (CVE-2017-0144)&lt;/strong&gt; – базовый CVSS 8.1. Сам по себе уже серьёзно, но когда NSA-инструмент утёк, а на его базе написали WannaCry – реальный риск вышел далеко за пределы любых числовых оценок.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Follina (CVE-2022-30190)&lt;/strong&gt; – CVSS 7.8. Уязвимость в Windows/MS Office, связанная с MSDT. На момент обнаружения – средне-высокий балл. Позднее активно эксплуатировалась APT-группами. Хороший пример того, почему временные метрики важны.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CVE-2024-40711 (Veeam Backup &amp;amp; Replication)&lt;/strong&gt; – позволяет неавторизованным пользователям удалённо выполнять произвольный код. Для организаций, которые используют Veeam для резервного копирования – прямой путь к компрометации всей инфраструктуры через бэкап-сервер.&lt;/p&gt;\n&lt;h2&gt;Где изучать уязвимости и искать информацию&lt;/h2&gt;\n&lt;p&gt;Сказав про фейковые CVE – Поясню. Интернет любит хайп и даже сюда вайбовые ребята могут написать что угодно а потом ИИ будет это писать что это реальная уязвимость. О чем это я? Достаточно много экспериментов проводилось где пользователь пишет фейковую информацию и так называемые &amp;quot;агрегаторы ии детекторы на уязвимости&amp;quot; думали что это реальная уязвимость! Поэтому если где и искать информацию(по моему мнению) так это в этих источниках:&lt;/p&gt;\n&lt;h3&gt;CVE Program – &lt;a href=\&quot;https://www.cve.org/\&quot;&gt;cve.org&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Официальный реестр публично известных уязвимостей. Каждой присваивается уникальный идентификатор в формате &lt;strong&gt;CVE-YYYY-NNNNN&lt;/strong&gt;. Здесь можно найти описание уязвимости, ссылки на патчи и связанные ресурсы. Это первое место, куда стоит идти, когда видишь незнакомый CVE-номер.&lt;/p&gt;\n&lt;h3&gt;NVD – &lt;a href=\&quot;https://nvd.nist.gov/\&quot;&gt;nvd.nist.gov&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;National Vulnerability Database&lt;/strong&gt; от американского NIST – основная база, где к CVE добавляются CVSS-оценки, векторные строки, ссылки на CWE (Common Weakness Enumeration) и конфигурации CPE. Здесь удобно смотреть полную карточку уязвимости с разбивкой по версиям CVSS.&lt;/p&gt;\n&lt;h3&gt;OWASP – &lt;a href=\&quot;https://owasp.org/\&quot;&gt;owasp.org&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Open Web Application Security Project&lt;/strong&gt; – некоммерческая организация, которая занимается безопасностью веб-приложений. Ключевые ресурсы:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;OWASP Top 10&lt;/strong&gt; – список десяти наиболее критичных классов уязвимостей веб-приложений. Обновляется раз в несколько лет, служит основой для большинства чеклистов и аудитов.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;OWASP Testing Guide&lt;/strong&gt; – методология тестирования безопасности веб-приложений.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;OWASP WSTG&lt;/strong&gt; (Web Security Testing Guide) – детальный справочник по каждому классу атак с примерами.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;WebGoat и DVWA&lt;/strong&gt; – намеренно уязвимые приложения для практики.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Если вы занимаетесь безопасностью веб-приложений или разрабатываете их – OWASP обязателен к изучению.&lt;/p&gt;\n&lt;h3&gt;PortSwigger Web Security Academy –&lt;a href=\&quot;https://portswigger.net/web-security\&quot;&gt;portswigger.net/web-security&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;Бесплатная обучающая платформа от создателей Burp Suite. Один из лучших ресурсов для практического изучения веб-уязвимостей: SQL-инъекции, XSS, CSRF, SSRF, XXE, десериализация, OAuth-уязвимости и многое другое.&lt;/p&gt;\n&lt;p&gt;Каждая тема структурирована: теория, лабораторные работы разной сложности, решения. Лабы запускаются прямо в браузере – никаких VM не нужно. Есть бесплатный и платный уровень, но базовый контент закрывает большинство практических нужд.&lt;/p&gt;\n&lt;p&gt;Если хотите реально понять, как работают атаки, а не просто читать про них – сюда.&lt;/p&gt;\n&lt;h3&gt;Exploit Database – &lt;a href=\&quot;https://www.exploit-db.com/\&quot;&gt;exploit-db.com&lt;/a&gt;&lt;/h3&gt;\n&lt;p&gt;База публичных эксплойтов и уязвимостей, которую ведёт Offensive Security (они же создатели Kali Linux). Здесь хранятся реальные PoC-коды и рабочие эксплойты. Используется для:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Проверки, существует ли публичный эксплойт для конкретного CVE.&lt;/li&gt;\n&lt;li&gt;Изучения техник эксплуатации.&lt;/li&gt;\n&lt;li&gt;Пентеста (в легальных условиях).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Также содержит &lt;strong&gt;Google Hacking Database (GHDB)&lt;/strong&gt; – сборник поисковых запросов для нахождения уязвимых систем через Google (Dorks). Полезно для понимания, что именно индексируют поисковики из вашей инфраструктуры.&lt;/p&gt;\n&lt;p&gt;Опционально еще &lt;strong&gt;БДУ ФСТЭК&lt;/strong&gt; – российская база данных угроз безопасности информации. Для организаций, работающих под требованиями российского законодательства (КИИ, персональные данные) – но там почему-то нет https и весьма сомнительно показалось от этого, поэтому поискать думаю сами можете :_)&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Кибербезопасность&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;security&quot;],&quot;title&quot;:[0,&quot;Кибербезопасность&quot;],&quot;icon&quot;:[0,&quot;shield&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-04-07&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;безопасность&quot;],[0,&quot;devsecops&quot;],[0,&quot;сети&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;siren&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Кратко о CVSS: как оценивать критичность уязвимостей&quot;],&quot;description&quot;:[0,&quot;Разбираем Common Vulnerability Scoring System – что скрывается за цифрой от 0 до 10, как читать базовые, временные и контекстные метрики, и где искать актуальную информацию об уязвимостях.&quot;],&quot;date&quot;:[0,&quot;2026-04-07&quot;],&quot;tags&quot;:[0,&quot;безопасность, devsecops, сети&quot;],&quot;icon&quot;:[0,&quot;siren&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island> <!-- Re-apply theme after SPA navigation --> <script>
