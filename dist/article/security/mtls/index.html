<p>В статье разберём: что такое mTLS и как работает рукопожатие, как это связано с Zero Trust, от каких атак защищает и где принципиально бессилен, какие риски несёт сама PKI-инфраструктура и где чаще всего ошибаются при реализации. В конце — практика: как мы в Opensophy сделали <code>mtls.sh</code>, bash-скрипт для управления mTLS-сертификатами под Traefik, и почему архитектура «промежуточный CA на каждого клиента» позволяет мгновенно отзывать доступ без CRL и OCSP в Traefik.</p>
<p>Статья будет полезна всем, кто хочет защитить свои сервисы — будь то домашняя лаборатория, панели управления вроде Proxmox или Portainer/Dokploy, внутренние API или любой сервис, который не должен быть доступен всем подряд. Если коротко: если вы выставляете что-то в интернет и не хотите, чтобы туда мог зайти кто угодно — mTLS для этого и существует.</p>
<hr>
<h2>Что такое mTLS</h2>
<p><strong>Mutual TLS (mTLS)</strong> — расширение стандартного протокола TLS, при котором <strong>обе стороны</strong> соединения предъявляют и проверяют криптографические сертификаты. В обычном HTTPS только клиент проверяет сервер; сервер не знает, кто к нему подключается, и полагается на прикладную аутентификацию (логин, пароль, токен). В mTLS сервер дополнительно требует клиентский сертификат, подписанный доверенным центром сертификации (CA).</p>
<p>Если клиент не предъявляет сертификат или предъявляет невалидный — соединение разрывается <strong>на транспортном уровне</strong>, до любого HTTP-взаимодействия. Именно поэтому пользователь видит:</p>
<pre><code>Доступ запрещён
Ваш сертификат отклонен сайтом или не был выдан.
ERR_BAD_SSL_CLIENT_AUTH
</code></pre>
<p>Это знак того, что mTLS отработал штатно.</p>
<p><strong>CA (Certificate Authority)</strong> — удостоверяющий центр. В случае mTLS организация выступает собственным CA: создаёт корневой сертификат и подписывает им клиентские сертификаты. В отличие от публичного TLS, где CA (Let&#39;s Encrypt, DigiCert) проверяет владение доменом, mTLS CA полностью под контролем администратора. (Вкратце это вы делаете сертификат и потом добавляете/делитесь с теми какое устройство должно получить доступ.)</p>
<p><strong>Клиентский сертификат</strong> — X.509-сертификат, установленный на конкретном устройстве или в браузере. Содержит публичный ключ и метаданные (CN, Organization, срок действия). Подписан CA.</p>
<p><strong>Приватный ключ</strong> — используется при TLS-рукопожатии для доказательства владения сертификатом. Никогда не передаётся серверу. На практике распространяется в составе <code>.p12</code>-файла (защищённый паролем контейнер, содержащий ключ + сертификат), который импортируется в браузер или на устройство — после чего ключ хранится в системном хранилище.</p>
<hr>
<h2>Как работает рукопожатие</h2>
<p><strong>Стандартный TLS (одностороннее доверие)</strong></p>
<ol>
<li>Клиент отправляет <code>ClientHello</code> — предлагает версии протокола и алгоритмы шифрования</li>
<li>Сервер отвечает <code>ServerHello</code> и отдаёт свой сертификат</li>
<li>Клиент проверяет сертификат сервера через доверенный CA</li>
<li>Стороны обмениваются <code>Finished</code> — канал установлен</li>
</ol>
<p>Сервер при этом не знает, кто подключился. Аутентификация пользователя — задача приложения (логин, пароль, токен).</p>
<p><strong>mTLS (взаимная аутентификация)</strong></p>
<ol>
<li>Клиент отправляет <code>ClientHello</code></li>
<li>Сервер отвечает <code>ServerHello</code>, отдаёт свой сертификат и добавляет <code>CertificateRequest</code> — требование предъявить клиентский сертификат</li>
<li>Клиент отправляет свой сертификат</li>
<li>Клиент отправляет <code>CertificateVerify</code> — подпись приватным ключом, доказывающую что ключ действительно принадлежит ему</li>
<li>Сервер проверяет три вещи:<ul>
<li>сертификат клиента подписан доверенным CA</li>
<li>клиент владеет соответствующим приватным ключом</li>
<li>сертификат не истёк и не отозван</li>
</ul>
</li>
<li>Только после успешной проверки сервер отправляет <code>Finished</code></li>
<li>Клиент отвечает <code>Finished</code> — шифрованный канал установлен</li>
</ol>
<p>Если на шаге 5 что-то не так — соединение разрывается. Клиент даже не увидит HTTP-ответа.</p>
<hr>
<h2>Что mTLS защищает — и что нет</h2>
<p>mTLS работает на <strong>транспортном уровне (L4/L5)</strong>. Всё, что происходит до установления зашифрованного канала, — в зоне его ответственности.</p>
<table>
<thead>
<tr>
<th>Тип атаки</th>
<th>Как mTLS блокирует</th>
<th>Эффективность</th>
</tr>
</thead>
<tbody><tr>
<td><strong>Man-in-the-Middle (MitM)</strong></td>
<td>Злоумышленник не владеет приватным ключом клиента и не может завершить TLS-рукопожатие</td>
<td>Высокая</td>
</tr>
<tr>
<td><strong>Credential Stuffing</strong></td>
<td>Без клиентского сертификата сервер не переходит к HTTP, форма авторизации недостижима</td>
<td>Полная</td>
</tr>
<tr>
<td><strong>Brute Force / перебор паролей</strong></td>
<td>Аналогично — нет доступа к HTTP без сертификата</td>
<td>Полная</td>
</tr>
<tr>
<td><strong>Phishing (кража пароля)</strong></td>
<td>Даже зная пароль, злоумышленник не может войти без сертификата жертвы</td>
<td>Высокая</td>
</tr>
<tr>
<td><strong>Spoofing / Impersonation</strong></td>
<td>Идентичность привязана к криптографическому сертификату, подделать который без CA невозможно</td>
<td>Высокая</td>
</tr>
<tr>
<td><strong>Session Hijacking</strong></td>
<td>Сессионный токен может быть привязан к mTLS-сертификату (certificate-bound tokens)</td>
<td>Средняя (зависит от реализации)</td>
</tr>
<tr>
<td><strong>L7 DDoS от ботов без сертификата</strong></td>
<td>Боты без сертификата отсекаются на уровне TLS-рукопожатия, не нагружая приложение</td>
<td>Высокая</td>
</tr>
<tr>
<td><strong>Обнаружение сервиса (Shodan, Censys)</strong></td>
<td>Сервер в режиме STRICT не возвращает баннеры неавторизованным клиентам; сканер видит ошибку TLS</td>
<td>Частичная</td>
</tr>
</tbody></table>
<blockquote>
<p><a href="https://www.cloudflare.com/learning/access-management/what-is-mutual-tls/">Cloudflare</a> описывает использование mTLS (через API Shield) для защиты от неавторизованных запросов. Это документально подтверждённый сценарий применения, но не специфичная защита от volumetric DDoS.</p>
</blockquote>
<p>После успешного TLS-рукопожатия mTLS передаёт управление прикладному уровню (L7). Всё, что происходит внутри установленного соединения — вне его ответственности. Согласно <a href="https://owasp.org/www-project-api-security/">OWASP Top 10</a> следующие атаки mTLS не блокирует:</p>
<p><strong>Cross-Site Scripting (XSS).</strong> Если приложение уязвимо к XSS, вредоносный скрипт выполняется в браузере легитимного пользователя (у которого есть сертификат). Запросы скрипта к серверу будут успешно аутентифицированы через mTLS — он исходит от доверенного клиента.</p>
<p><strong>SQL Injection.</strong> mTLS не анализирует содержимое передаваемых данных. Вредоносный SQL-запрос, отправленный авторизованным клиентом, будет доставлен до базы данных в полной сохранности.</p>
<p><strong>Cross-Site Request Forgery (CSRF).</strong> Браузер жертвы уже имеет mTLS-сертификат и установленную сессию. Поддельный запрос, инициированный вредоносной страницей, будет принят сервером как легитимный.</p>
<p><strong>Broken Access Control.</strong> mTLS аутентифицирует — подтверждает, <em>кто</em> подключился. Авторизация — <em>что ему разрешено</em> — остаётся задачей приложения. Если RBAC настроен некорректно, обычный пользователь с сертификатом может получить доступ к admin-интерфейсу.</p>
<p><strong>Уязвимые зависимости (Log4Shell и подобные).</strong> Уязвимости в серверных библиотеках эксплуатируются через легитимный mTLS-канал авторизованным клиентом.</p>
<p><strong>Инсайдерская угроза.</strong> Сотрудник с выданным корпоративным сертификатом имеет полный mTLS-доступ. Его вредоносные действия mTLS не ограничивает.</p>
<blockquote>
<p>Все эти типы атак доступны тогда, когда атакующий имеет уже mTLS-сертификат.</p>
</blockquote>
<hr>
<h2>Риски, ошибки реализации и инфраструктура</h2>
<p>mTLS создаёт <strong>асимметрию</strong> в контексте отказоустойчивости. Запросы от клиентов без сертификата не доходят до веб-сервера — ресурсы CPU не тратятся на парсинг HTTP, рендеринг страниц, запросы к БД. Но каждое mTLS-рукопожатие требует больше вычислительных ресурсов, чем обычный TLS (проверка двух сертификатов, дополнительные криптографические операции). Злоумышленник может инициировать тысячи незавершённых рукопожатий, исчерпывая CPU сервера — это классическая DoS-атака на уровне TLS. От SYN-флуда и UDP-амплификации mTLS не защищает вовсе — для этого нужны внешние средства.</p>
<p>При одновременной перезагрузке большого количества подов в K8s инфраструктуре (например, после обновления кластера) все они одновременно обращаются к CA за новыми сертификатами. При высокой нагрузке CA может не справиться с запросами, и сервисы в режиме STRICT не смогут подняться — возникает каскадный отказ. Меры профилактики: кэширование сертификатов, горизонтальное масштабирование CA, промежуточные центры выдачи, jitter при обновлении сертификатов.</p>
<p><strong>Компрометация приватного ключа клиента.</strong> Если злоумышленник похитит <code>.p12</code>-файл с устройства пользователя (вместе с паролем или без), он получит полноценный mTLS-доступ до момента отзыва сертификата. Меры защиты: хранение ключей в аппаратных токенах (YubiKey, TPM), защита устройств паролём/биометрией, мониторинг аномальных сессий. Для большинства одиночных homelab это вообще не требуется, нужно только если у вас доступ уже от 2-5 человек к сервисам.</p>
<p><strong>Компрометация корневого CA.</strong> Это самый опасный сценарий. Если приватный ключ корневого CA украден — злоумышленник может выпустить любой клиентский сертификат и получить доступ ко всему, что защищено mTLS. Вся инфраструктура доверия рушится. Рекомендуемые меры:</p>
<ul>
<li><strong>Держите CA-ключ offline.</strong> Идеально — на отдельной машине без доступа в сеть, которая включается только для выпуска новых сертификатов.</li>
<li><strong>HSM (Hardware Security Module)</strong> — специализированное железо для хранения криптографических ключей. Грубо говоря, это может быть флешка, из которой ключ невозможно вытащить — устройство только подписывает данные внутри себя, наружу ключ не отдаёт никогда. Для homelab это избыточно, но в продакшне где требуется максимум безопасности это стандарт. (Хотя в других случаях и предприятиях флешки запрещены.)</li>
<li><strong>Ограничьте доступ к файлу ключа</strong> — права 600, только root, никаких резервных копий в облаке.</li>
</ul>
<p><strong>Проблемы отзыва.</strong> Если говорим про K8S: в Service Mesh (к примеру Istio) проверка CRL и OCSP часто отключается из соображений производительности. Это означает, что скомпрометированный сертификат будет работать до истечения срока его действия. Отраслевая практика — использование <strong>короткоживущих сертификатов</strong> (от 2 до 24 часов) вместо классических механизмов отзыва. Istio по умолчанию выдаёт сертификаты сроком 24 часа. Если сервер настроен на обязательную проверку OCSP в режиме «fail-closed», атака на OCSP-сервер делает невозможным доступ для всех клиентов — даже легитимных.</p>
<p><strong>Ошибки реализации.</strong> Исследователь <a href="https://github.blog/security/vulnerability-research/mtls-when-certificate-authentication-is-done-wrong/">GitHub Security Lab</a> Майкл Степанкин представил на Black Hat USA 2023 и DEF CON 31 детальный разбор уязвимостей в реализациях mTLS. Ключевые выводы:</p>
<p>Распространённая архитектура: фронтенд-прокси (Nginx, HAProxy, Traefik) выполняет mTLS-аутентификацию и передаёт данные о клиентском сертификате бэкенду через HTTP-заголовки (например, <code>X-Client-Cert</code> или <code>X-SSL-Client-DN</code>). Если бэкенд не проверяет, что заголовки пришли именно от доверенного прокси, злоумышленник может отправить поддельные заголовки и выдать себя за другого пользователя.</p>
<p>Сертификат с <code>CA:TRUE</code> в Basic Constraints может быть использован для подписи других сертификатов. Если сервер не проверяет это поле, клиент с CA-сертификатом может выпустить произвольный клиентский сертификат и аутентифицироваться от имени любого пользователя. Степанкин обнаружил подобные CVE в нескольких open-source identity servers.</p>
<p>Если сервер выполняет проверку OCSP или CRL <strong>до</strong> верификации подписи сертификата, злоумышленник может использовать URL из расширения CRLDP для SSRF-атак или JNDI-инъекций (как в случае с Apereo CAS). <strong>Правило</strong>: отзыв проверяется <strong>после</strong> валидации подписи, не до.</p>
<blockquote>
<p><strong>Примечание если проверять источник</strong>: SAP-кейс описывался как «случай с Black Hat», однако в публичных материалах Black Hat USA 2023 (Степанкин) описаны уязвимости в open-source серверах (Apereo CAS и других), а не в SAP-продуктах. Реальные уязвимости Степанкина — в identity servers с неправильной обработкой цепочек сертификатов.</p>
</blockquote>
<hr>
<h2>Практика: mtls.sh</h2>
<p>Поскольку Istio заточен в основном под k8s, а другие решения для меня показались довольно «большими» — вплане того чтобы выпускать сертификаты приходиться писать много команд, поэтому представляю вам <a href="https://github.com/opensophy-projects/mtls">скрипт который упрощает выпуск сертификатов и делает управление намного легче</a>. Скрипт заточен в основном под docker/podman итп контейнеры где стоит <strong>Traefik</strong>.</p>
<p>Хотелось бы предложить it-сообществу решение проблемы в Traefik а именно то что Traefik не поддерживает CRL. Это означает что отзыв сертификата не работает, скрипт решает эту проблему следующим путём.</p>
<p>Ключевое решение в mtls.sh — создание <strong>отдельного промежуточного CA для каждого клиентского сертификата</strong>:</p>
<pre><code>Корневой CA
├── Int-CA (alice)  -&gt;  client.crt (alice)
├── Int-CA (bob)    -&gt;  client.crt (bob)
└── Int-CA (carol)  -&gt;  client.crt (carol)
</code></pre>
<p>Все промежуточные CA собираются в один файл <code>clients-bundle.crt</code>, который передаётся Traefik. При отзыве сертификата alice её промежуточный CA просто исключается из bundle. Bob и Carol не затронуты. Traefik подхватывает обновлённый bundle без перезагрузки (через file provider). Никакого CRL, никакого OCSP, никаких задержек. Этот подход позволяет реализовать отзыв без стандартных механизмов отзыва сертификатов — что особенно ценно в homelab-окружениях, где настраивать OCSP-ответчик может быть нецелесообразно.</p>
<p>Скрипт работает в двух режимах интеграции с Traefik. <strong>Режим <code>new</code></strong> создаёт новый домен и полностью управляет его конфигурацией:</p>
<pre><code>Домен: myapp.example.com
Target: http://localhost:3000
-&gt; Создаёт роутер, сервис и TLS-опции в mtls-manager.yml
</code></pre>
<p><strong>Режим <code>patch</code></strong> добавляет mTLS к существующему роутеру (например, созданному Dokploy) — минимально инвазивно:</p>
<pre><code>Существующий файл: /etc/dokploy/traefik/dynamic/dokploy.yml
Роутер: my-existing-app
-&gt; Добавляет строку options: mtls-my-existing-app
</code></pre>
<blockquote>
<p>Пресеты к путям также есть для Dokploy т.к это основная платформа для управления контейнерами и сайтами в opensophy проектах. <a href="https://github.com/opensophy-projects/mtls">Вы можете создать запрос в гитхабе</a> чтобы добавить новые пресеты или сделать самому их.</p>
</blockquote>
<p>Жизненный цикл сертификата в mtls.sh:</p>
<ol>
<li>Добавить сервис (new или patch)</li>
<li>Создать сертификат -&gt; получить client.p12</li>
<li>Импортировать .p12 на устройство</li>
<li>Доступ к сервису работает</li>
<li>При необходимости -&gt; Отозвать (почти мгновенная блокировка)</li>
<li>При необходимости -&gt; Удалить файлы</li>
</ol>
<p>mtls.sh — инструмент для homelab и небольших инфраструктур. Он <strong>не был создан</strong> для продакшн-кластеров с тысячами сервисов, ECDSA-сертификатов (только RSA) и полноценного PKI с CRL/OCSP.</p>
<h2>Возможные проблемы</h2>
<p><strong>Очистка браузерных хранилищ.</strong> При импорте <code>.p12</code> браузер сохраняет не только клиентский сертификат, но и промежуточный CA из цепочки. При перевыпуске сертификатов старые промежуточные CA накапливаются в хранилище. Примеры ниже помогут убрать «хлам» из настроек браузера.</p>
<p><em>Linux:</em></p>
<pre><code class="language-bash"># Найти базу сертификатов
find /home -name &quot;cert9.db&quot; 2&gt;/dev/null

# Установить certutil
apt install libnss3-tools -y

# Просмотр (Chrome или другого браузера)
certutil -L -d /home/&lt;user&gt;/.local/share/pki/nssdb/

# Удаление (по точному имени из колонки Certificate Nickname)
certutil -D -d /home/&lt;user&gt;/.local/share/pki/nssdb/ -n &quot;opensophy - mTLS-Manager&quot;
</code></pre>
<blockquote>
<p>Не удаляйте сертификаты с атрибутом <code>u,u,u</code> — это активные клиентские сертификаты. Промежуточные CA имеют пустой атрибут <code>,,</code>.</p>
</blockquote>
<p><em>Windows:</em></p>
<pre><code class="language-powershell"># Просмотр
Get-ChildItem -Path Cert:\CurrentUser\CA | Where-Object { $_.Subject -like &quot;*opensophy*&quot; }

# Удаление
Get-ChildItem -Path Cert:\CurrentUser\CA | Where-Object { $_.Subject -like &quot;*opensophy*&quot; } | Remove-Item
</code></pre>
<p>Firefox на Windows использует собственное хранилище: <code>about:preferences#privacy</code> -&gt; Просмотр сертификатов -&gt; Центры сертификации.</p>
<p><em>Android (в зависимости от ОС/версии/модели):</em> Настройки -&gt; Безопасность -&gt; Шифрование и учётные данные -&gt; Доверенные данные -&gt; вкладка Пользователь. Или: Настройки -&gt; в поиске вводим Сертификат и ищем подобные данные в устройстве.</p>
<p><em>iOS / iPadOS (в зависимости от ОС/версии/модели):</em> Если сертификат установлен через профиль: Настройки -&gt; Основные -&gt; VPN и управление устройством -&gt; найти профиль -&gt; Удалить.</p>
<hr>
<h2>Выводы и сравнение</h2>
<p>mTLS — это отличный инструмент для конкретной задачи: убедиться, что к вашему сервису подключается только то устройство, которому вы явно выдали сертификат. Для homelab это означает что Proxmox, Portainer, Home Assistant и прочие админки перестают быть видны для сканеров и ботов — они просто получают ошибку TLS ещё до того, как увидят страницу логина. Никакого брутфорса, никакого credential stuffing, никаких попыток эксплуатировать форму входа. При этом важно понимать границы: mTLS доверяет устройству, а не человеку за ним. Если устройство скомпрометировано — скомпрометирован и доступ. Если приложение уязвимо к XSS или SQL-инъекции — mTLS это не исправит. Он работает на транспортном уровне и выше не смотрит.</p>
<p><code>mtls.sh</code> мы написали потому что хотели простое решение без лишних зависимостей и написания огромного кол-во команд — только <code>openssl</code> и <code>python3</code>. Архитектура с промежуточным CA на каждого клиента решает главную проблему Traefik: отсутствие поддержки CRL. Отозвать доступ — значит просто убрать один сертификат из bundle. Никаких перезапусков, никаких сложных конфигураций.</p>
<p>Если вы только начинаете — попробуйте на одном сервисе. Защитите что-то одно, посмотрите как это работает, потом масштабируйте. mTLS проще в эксплуатации, чем кажется на первый взгляд.</p>

<p><strong>Когда я выбрал бы mTLS</strong>: нужен доступ только к конкретному сервису с устройства, где невозможно или нежелательно устанавливать VPN-клиент или VPN-протоколы/клиент попросту не работает; нужна защита API или автоматизации без UI-аутентификации.</p>
<p><strong>Когда я выбрал бы VPN</strong>: нужен полный доступ к инфраструктуре, удалённая работа.</p>
<p><strong>Когда я выбрал бы IAP</strong>: публичный сервис с множеством пользователей, SSO и 2FA обязательны, не нужно управлять сертификатами.</p>
</article> </main> </noscript> <astro-island uid="2ppIsr" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/security/mtls&quot;],&quot;title&quot;:[0,&quot;mTLS: руководство — от теории к практике с управлением сертификатами и защиты сервисов.&quot;],&quot;slug&quot;:[0,&quot;article/security/mtls&quot;],&quot;description&quot;:[0,&quot;Разбор mTLS — что это, как работает рукопожатие, от каких атак защищает и от каких нет, риски PKI и ошибки реализации. Плюс практика: управление сертификатами через mtls.sh от Opensophy под Traefik.&quot;],&quot;content&quot;:[0,&quot;&lt;p&gt;Если вы когда-либо выставляли сервис в интернет и смотрели на логи — вы знаете, что происходит в первые минуты. Сканеры, боты, перебор паролей. Firewall помогает, но не всегда. VPN — хорошо, но не всегда удобно и сами протоколы в России к примеру хорошо работают. А что если сервер будет просто отказывать в соединении всем, у кого нет нужного криптографического сертификата — ещё до того, как они увидят страницу логина? Это и есть mTLS.&lt;/p&gt;\n&lt;p&gt;В статье разберём: что такое mTLS и как работает рукопожатие, как это связано с Zero Trust, от каких атак защищает и где принципиально бессилен, какие риски несёт сама PKI-инфраструктура и где чаще всего ошибаются при реализации. В конце — практика: как мы в Opensophy сделали &lt;code&gt;mtls.sh&lt;/code&gt;, bash-скрипт для управления mTLS-сертификатами под Traefik, и почему архитектура «промежуточный CA на каждого клиента» позволяет мгновенно отзывать доступ без CRL и OCSP в Traefik.&lt;/p&gt;\n&lt;p&gt;Статья будет полезна всем, кто хочет защитить свои сервисы — будь то домашняя лаборатория, панели управления вроде Proxmox или Portainer/Dokploy, внутренние API или любой сервис, который не должен быть доступен всем подряд. Если коротко: если вы выставляете что-то в интернет и не хотите, чтобы туда мог зайти кто угодно — mTLS для этого и существует.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Что такое mTLS&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Mutual TLS (mTLS)&lt;/strong&gt; — расширение стандартного протокола TLS, при котором &lt;strong&gt;обе стороны&lt;/strong&gt; соединения предъявляют и проверяют криптографические сертификаты. В обычном HTTPS только клиент проверяет сервер; сервер не знает, кто к нему подключается, и полагается на прикладную аутентификацию (логин, пароль, токен). В mTLS сервер дополнительно требует клиентский сертификат, подписанный доверенным центром сертификации (CA).&lt;/p&gt;\n&lt;p&gt;Если клиент не предъявляет сертификат или предъявляет невалидный — соединение разрывается &lt;strong&gt;на транспортном уровне&lt;/strong&gt;, до любого HTTP-взаимодействия. Именно поэтому пользователь видит:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;Доступ запрещён\nВаш сертификат отклонен сайтом или не был выдан.\nERR_BAD_SSL_CLIENT_AUTH\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Это знак того, что mTLS отработал штатно.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;CA (Certificate Authority)&lt;/strong&gt; — удостоверяющий центр. В случае mTLS организация выступает собственным CA: создаёт корневой сертификат и подписывает им клиентские сертификаты. В отличие от публичного TLS, где CA (Let&amp;#39;s Encrypt, DigiCert) проверяет владение доменом, mTLS CA полностью под контролем администратора. (Вкратце это вы делаете сертификат и потом добавляете/делитесь с теми какое устройство должно получить доступ.)&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Клиентский сертификат&lt;/strong&gt; — X.509-сертификат, установленный на конкретном устройстве или в браузере. Содержит публичный ключ и метаданные (CN, Organization, срок действия). Подписан CA.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Приватный ключ&lt;/strong&gt; — используется при TLS-рукопожатии для доказательства владения сертификатом. Никогда не передаётся серверу. На практике распространяется в составе &lt;code&gt;.p12&lt;/code&gt;-файла (защищённый паролем контейнер, содержащий ключ + сертификат), который импортируется в браузер или на устройство — после чего ключ хранится в системном хранилище.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Как работает рукопожатие&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Стандартный TLS (одностороннее доверие)&lt;/strong&gt;&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Клиент отправляет &lt;code&gt;ClientHello&lt;/code&gt; — предлагает версии протокола и алгоритмы шифрования&lt;/li&gt;\n&lt;li&gt;Сервер отвечает &lt;code&gt;ServerHello&lt;/code&gt; и отдаёт свой сертификат&lt;/li&gt;\n&lt;li&gt;Клиент проверяет сертификат сервера через доверенный CA&lt;/li&gt;\n&lt;li&gt;Стороны обмениваются &lt;code&gt;Finished&lt;/code&gt; — канал установлен&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Сервер при этом не знает, кто подключился. Аутентификация пользователя — задача приложения (логин, пароль, токен).&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;mTLS (взаимная аутентификация)&lt;/strong&gt;&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Клиент отправляет &lt;code&gt;ClientHello&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Сервер отвечает &lt;code&gt;ServerHello&lt;/code&gt;, отдаёт свой сертификат и добавляет &lt;code&gt;CertificateRequest&lt;/code&gt; — требование предъявить клиентский сертификат&lt;/li&gt;\n&lt;li&gt;Клиент отправляет свой сертификат&lt;/li&gt;\n&lt;li&gt;Клиент отправляет &lt;code&gt;CertificateVerify&lt;/code&gt; — подпись приватным ключом, доказывающую что ключ действительно принадлежит ему&lt;/li&gt;\n&lt;li&gt;Сервер проверяет три вещи:&lt;ul&gt;\n&lt;li&gt;сертификат клиента подписан доверенным CA&lt;/li&gt;\n&lt;li&gt;клиент владеет соответствующим приватным ключом&lt;/li&gt;\n&lt;li&gt;сертификат не истёк и не отозван&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;Только после успешной проверки сервер отправляет &lt;code&gt;Finished&lt;/code&gt;&lt;/li&gt;\n&lt;li&gt;Клиент отвечает &lt;code&gt;Finished&lt;/code&gt; — шифрованный канал установлен&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Если на шаге 5 что-то не так — соединение разрывается. Клиент даже не увидит HTTP-ответа.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Что mTLS защищает — и что нет&lt;/h2&gt;\n&lt;p&gt;mTLS работает на &lt;strong&gt;транспортном уровне (L4/L5)&lt;/strong&gt;. Всё, что происходит до установления зашифрованного канала, — в зоне его ответственности.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Тип атаки&lt;/th&gt;\n&lt;th&gt;Как mTLS блокирует&lt;/th&gt;\n&lt;th&gt;Эффективность&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Man-in-the-Middle (MitM)&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Злоумышленник не владеет приватным ключом клиента и не может завершить TLS-рукопожатие&lt;/td&gt;\n&lt;td&gt;Высокая&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Credential Stuffing&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Без клиентского сертификата сервер не переходит к HTTP, форма авторизации недостижима&lt;/td&gt;\n&lt;td&gt;Полная&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Brute Force / перебор паролей&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Аналогично — нет доступа к HTTP без сертификата&lt;/td&gt;\n&lt;td&gt;Полная&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Phishing (кража пароля)&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Даже зная пароль, злоумышленник не может войти без сертификата жертвы&lt;/td&gt;\n&lt;td&gt;Высокая&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Spoofing / Impersonation&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Идентичность привязана к криптографическому сертификату, подделать который без CA невозможно&lt;/td&gt;\n&lt;td&gt;Высокая&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Session Hijacking&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Сессионный токен может быть привязан к mTLS-сертификату (certificate-bound tokens)&lt;/td&gt;\n&lt;td&gt;Средняя (зависит от реализации)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;L7 DDoS от ботов без сертификата&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Боты без сертификата отсекаются на уровне TLS-рукопожатия, не нагружая приложение&lt;/td&gt;\n&lt;td&gt;Высокая&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;&lt;strong&gt;Обнаружение сервиса (Shodan, Censys)&lt;/strong&gt;&lt;/td&gt;\n&lt;td&gt;Сервер в режиме STRICT не возвращает баннеры неавторизованным клиентам; сканер видит ошибку TLS&lt;/td&gt;\n&lt;td&gt;Частичная&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;a href=\&quot;https://www.cloudflare.com/learning/access-management/what-is-mutual-tls/\&quot;&gt;Cloudflare&lt;/a&gt; описывает использование mTLS (через API Shield) для защиты от неавторизованных запросов. Это документально подтверждённый сценарий применения, но не специфичная защита от volumetric DDoS.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;После успешного TLS-рукопожатия mTLS передаёт управление прикладному уровню (L7). Всё, что происходит внутри установленного соединения — вне его ответственности. Согласно &lt;a href=\&quot;https://owasp.org/www-project-api-security/\&quot;&gt;OWASP Top 10&lt;/a&gt; следующие атаки mTLS не блокирует:&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Cross-Site Scripting (XSS).&lt;/strong&gt; Если приложение уязвимо к XSS, вредоносный скрипт выполняется в браузере легитимного пользователя (у которого есть сертификат). Запросы скрипта к серверу будут успешно аутентифицированы через mTLS — он исходит от доверенного клиента.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;SQL Injection.&lt;/strong&gt; mTLS не анализирует содержимое передаваемых данных. Вредоносный SQL-запрос, отправленный авторизованным клиентом, будет доставлен до базы данных в полной сохранности.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Cross-Site Request Forgery (CSRF).&lt;/strong&gt; Браузер жертвы уже имеет mTLS-сертификат и установленную сессию. Поддельный запрос, инициированный вредоносной страницей, будет принят сервером как легитимный.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Broken Access Control.&lt;/strong&gt; mTLS аутентифицирует — подтверждает, &lt;em&gt;кто&lt;/em&gt; подключился. Авторизация — &lt;em&gt;что ему разрешено&lt;/em&gt; — остаётся задачей приложения. Если RBAC настроен некорректно, обычный пользователь с сертификатом может получить доступ к admin-интерфейсу.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Уязвимые зависимости (Log4Shell и подобные).&lt;/strong&gt; Уязвимости в серверных библиотеках эксплуатируются через легитимный mTLS-канал авторизованным клиентом.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Инсайдерская угроза.&lt;/strong&gt; Сотрудник с выданным корпоративным сертификатом имеет полный mTLS-доступ. Его вредоносные действия mTLS не ограничивает.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Все эти типы атак доступны тогда, когда атакующий имеет уже mTLS-сертификат.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;h2&gt;Риски, ошибки реализации и инфраструктура&lt;/h2&gt;\n&lt;p&gt;mTLS создаёт &lt;strong&gt;асимметрию&lt;/strong&gt; в контексте отказоустойчивости. Запросы от клиентов без сертификата не доходят до веб-сервера — ресурсы CPU не тратятся на парсинг HTTP, рендеринг страниц, запросы к БД. Но каждое mTLS-рукопожатие требует больше вычислительных ресурсов, чем обычный TLS (проверка двух сертификатов, дополнительные криптографические операции). Злоумышленник может инициировать тысячи незавершённых рукопожатий, исчерпывая CPU сервера — это классическая DoS-атака на уровне TLS. От SYN-флуда и UDP-амплификации mTLS не защищает вовсе — для этого нужны внешние средства.&lt;/p&gt;\n&lt;p&gt;При одновременной перезагрузке большого количества подов в K8s инфраструктуре (например, после обновления кластера) все они одновременно обращаются к CA за новыми сертификатами. При высокой нагрузке CA может не справиться с запросами, и сервисы в режиме STRICT не смогут подняться — возникает каскадный отказ. Меры профилактики: кэширование сертификатов, горизонтальное масштабирование CA, промежуточные центры выдачи, jitter при обновлении сертификатов.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Компрометация приватного ключа клиента.&lt;/strong&gt; Если злоумышленник похитит &lt;code&gt;.p12&lt;/code&gt;-файл с устройства пользователя (вместе с паролем или без), он получит полноценный mTLS-доступ до момента отзыва сертификата. Меры защиты: хранение ключей в аппаратных токенах (YubiKey, TPM), защита устройств паролём/биометрией, мониторинг аномальных сессий. Для большинства одиночных homelab это вообще не требуется, нужно только если у вас доступ уже от 2-5 человек к сервисам.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Компрометация корневого CA.&lt;/strong&gt; Это самый опасный сценарий. Если приватный ключ корневого CA украден — злоумышленник может выпустить любой клиентский сертификат и получить доступ ко всему, что защищено mTLS. Вся инфраструктура доверия рушится. Рекомендуемые меры:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Держите CA-ключ offline.&lt;/strong&gt; Идеально — на отдельной машине без доступа в сеть, которая включается только для выпуска новых сертификатов.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;HSM (Hardware Security Module)&lt;/strong&gt; — специализированное железо для хранения криптографических ключей. Грубо говоря, это может быть флешка, из которой ключ невозможно вытащить — устройство только подписывает данные внутри себя, наружу ключ не отдаёт никогда. Для homelab это избыточно, но в продакшне где требуется максимум безопасности это стандарт. (Хотя в других случаях и предприятиях флешки запрещены.)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Ограничьте доступ к файлу ключа&lt;/strong&gt; — права 600, только root, никаких резервных копий в облаке.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Проблемы отзыва.&lt;/strong&gt; Если говорим про K8S: в Service Mesh (к примеру Istio) проверка CRL и OCSP часто отключается из соображений производительности. Это означает, что скомпрометированный сертификат будет работать до истечения срока его действия. Отраслевая практика — использование &lt;strong&gt;короткоживущих сертификатов&lt;/strong&gt; (от 2 до 24 часов) вместо классических механизмов отзыва. Istio по умолчанию выдаёт сертификаты сроком 24 часа. Если сервер настроен на обязательную проверку OCSP в режиме «fail-closed», атака на OCSP-сервер делает невозможным доступ для всех клиентов — даже легитимных.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ошибки реализации.&lt;/strong&gt; Исследователь &lt;a href=\&quot;https://github.blog/security/vulnerability-research/mtls-when-certificate-authentication-is-done-wrong/\&quot;&gt;GitHub Security Lab&lt;/a&gt; Майкл Степанкин представил на Black Hat USA 2023 и DEF CON 31 детальный разбор уязвимостей в реализациях mTLS. Ключевые выводы:&lt;/p&gt;\n&lt;p&gt;Распространённая архитектура: фронтенд-прокси (Nginx, HAProxy, Traefik) выполняет mTLS-аутентификацию и передаёт данные о клиентском сертификате бэкенду через HTTP-заголовки (например, &lt;code&gt;X-Client-Cert&lt;/code&gt; или &lt;code&gt;X-SSL-Client-DN&lt;/code&gt;). Если бэкенд не проверяет, что заголовки пришли именно от доверенного прокси, злоумышленник может отправить поддельные заголовки и выдать себя за другого пользователя.&lt;/p&gt;\n&lt;p&gt;Сертификат с &lt;code&gt;CA:TRUE&lt;/code&gt; в Basic Constraints может быть использован для подписи других сертификатов. Если сервер не проверяет это поле, клиент с CA-сертификатом может выпустить произвольный клиентский сертификат и аутентифицироваться от имени любого пользователя. Степанкин обнаружил подобные CVE в нескольких open-source identity servers.&lt;/p&gt;\n&lt;p&gt;Если сервер выполняет проверку OCSP или CRL &lt;strong&gt;до&lt;/strong&gt; верификации подписи сертификата, злоумышленник может использовать URL из расширения CRLDP для SSRF-атак или JNDI-инъекций (как в случае с Apereo CAS). &lt;strong&gt;Правило&lt;/strong&gt;: отзыв проверяется &lt;strong&gt;после&lt;/strong&gt; валидации подписи, не до.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Примечание если проверять источник&lt;/strong&gt;: SAP-кейс описывался как «случай с Black Hat», однако в публичных материалах Black Hat USA 2023 (Степанкин) описаны уязвимости в open-source серверах (Apereo CAS и других), а не в SAP-продуктах. Реальные уязвимости Степанкина — в identity servers с неправильной обработкой цепочек сертификатов.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;h2&gt;Практика: mtls.sh&lt;/h2&gt;\n&lt;p&gt;Поскольку Istio заточен в основном под k8s, а другие решения для меня показались довольно «большими» — вплане того чтобы выпускать сертификаты приходиться писать много команд, поэтому представляю вам &lt;a href=\&quot;https://github.com/opensophy-projects/mtls\&quot;&gt;скрипт который упрощает выпуск сертификатов и делает управление намного легче&lt;/a&gt;. Скрипт заточен в основном под docker/podman итп контейнеры где стоит &lt;strong&gt;Traefik&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;Хотелось бы предложить it-сообществу решение проблемы в Traefik а именно то что Traefik не поддерживает CRL. Это означает что отзыв сертификата не работает, скрипт решает эту проблему следующим путём.&lt;/p&gt;\n&lt;p&gt;Ключевое решение в mtls.sh — создание &lt;strong&gt;отдельного промежуточного CA для каждого клиентского сертификата&lt;/strong&gt;:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;Корневой CA\n├── Int-CA (alice)  -&amp;gt;  client.crt (alice)\n├── Int-CA (bob)    -&amp;gt;  client.crt (bob)\n└── Int-CA (carol)  -&amp;gt;  client.crt (carol)\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Все промежуточные CA собираются в один файл &lt;code&gt;clients-bundle.crt&lt;/code&gt;, который передаётся Traefik. При отзыве сертификата alice её промежуточный CA просто исключается из bundle. Bob и Carol не затронуты. Traefik подхватывает обновлённый bundle без перезагрузки (через file provider). Никакого CRL, никакого OCSP, никаких задержек. Этот подход позволяет реализовать отзыв без стандартных механизмов отзыва сертификатов — что особенно ценно в homelab-окружениях, где настраивать OCSP-ответчик может быть нецелесообразно.&lt;/p&gt;\n&lt;p&gt;Скрипт работает в двух режимах интеграции с Traefik. &lt;strong&gt;Режим &lt;code&gt;new&lt;/code&gt;&lt;/strong&gt; создаёт новый домен и полностью управляет его конфигурацией:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;Домен: myapp.example.com\nTarget: http://localhost:3000\n-&amp;gt; Создаёт роутер, сервис и TLS-опции в mtls-manager.yml\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;Режим &lt;code&gt;patch&lt;/code&gt;&lt;/strong&gt; добавляет mTLS к существующему роутеру (например, созданному Dokploy) — минимально инвазивно:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;Существующий файл: /etc/dokploy/traefik/dynamic/dokploy.yml\nРоутер: my-existing-app\n-&amp;gt; Добавляет строку options: mtls-my-existing-app\n&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Пресеты к путям также есть для Dokploy т.к это основная платформа для управления контейнерами и сайтами в opensophy проектах. &lt;a href=\&quot;https://github.com/opensophy-projects/mtls\&quot;&gt;Вы можете создать запрос в гитхабе&lt;/a&gt; чтобы добавить новые пресеты или сделать самому их.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;Жизненный цикл сертификата в mtls.sh:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Добавить сервис (new или patch)&lt;/li&gt;\n&lt;li&gt;Создать сертификат -&amp;gt; получить client.p12&lt;/li&gt;\n&lt;li&gt;Импортировать .p12 на устройство&lt;/li&gt;\n&lt;li&gt;Доступ к сервису работает&lt;/li&gt;\n&lt;li&gt;При необходимости -&amp;gt; Отозвать (почти мгновенная блокировка)&lt;/li&gt;\n&lt;li&gt;При необходимости -&amp;gt; Удалить файлы&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;mtls.sh — инструмент для homelab и небольших инфраструктур. Он &lt;strong&gt;не был создан&lt;/strong&gt; для продакшн-кластеров с тысячами сервисов, ECDSA-сертификатов (только RSA) и полноценного PKI с CRL/OCSP.&lt;/p&gt;\n&lt;h2&gt;Возможные проблемы&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Очистка браузерных хранилищ.&lt;/strong&gt; При импорте &lt;code&gt;.p12&lt;/code&gt; браузер сохраняет не только клиентский сертификат, но и промежуточный CA из цепочки. При перевыпуске сертификатов старые промежуточные CA накапливаются в хранилище. Примеры ниже помогут убрать «хлам» из настроек браузера.&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Linux:&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# Найти базу сертификатов\nfind /home -name &amp;quot;cert9.db&amp;quot; 2&amp;gt;/dev/null\n\n# Установить certutil\napt install libnss3-tools -y\n\n# Просмотр (Chrome или другого браузера)\ncertutil -L -d /home/&amp;lt;user&amp;gt;/.local/share/pki/nssdb/\n\n# Удаление (по точному имени из колонки Certificate Nickname)\ncertutil -D -d /home/&amp;lt;user&amp;gt;/.local/share/pki/nssdb/ -n &amp;quot;opensophy - mTLS-Manager&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Не удаляйте сертификаты с атрибутом &lt;code&gt;u,u,u&lt;/code&gt; — это активные клиентские сертификаты. Промежуточные CA имеют пустой атрибут &lt;code&gt;,,&lt;/code&gt;.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;em&gt;Windows:&lt;/em&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-powershell\&quot;&gt;# Просмотр\nGet-ChildItem -Path Cert:\\CurrentUser\\CA | Where-Object { $_.Subject -like &amp;quot;*opensophy*&amp;quot; }\n\n# Удаление\nGet-ChildItem -Path Cert:\\CurrentUser\\CA | Where-Object { $_.Subject -like &amp;quot;*opensophy*&amp;quot; } | Remove-Item\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Firefox на Windows использует собственное хранилище: &lt;code&gt;about:preferences#privacy&lt;/code&gt; -&amp;gt; Просмотр сертификатов -&amp;gt; Центры сертификации.&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Android (в зависимости от ОС/версии/модели):&lt;/em&gt; Настройки -&amp;gt; Безопасность -&amp;gt; Шифрование и учётные данные -&amp;gt; Доверенные данные -&amp;gt; вкладка Пользователь. Или: Настройки -&amp;gt; в поиске вводим Сертификат и ищем подобные данные в устройстве.&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;iOS / iPadOS (в зависимости от ОС/версии/модели):&lt;/em&gt; Если сертификат установлен через профиль: Настройки -&amp;gt; Основные -&amp;gt; VPN и управление устройством -&amp;gt; найти профиль -&amp;gt; Удалить.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Выводы и сравнение&lt;/h2&gt;\n&lt;p&gt;mTLS — это отличный инструмент для конкретной задачи: убедиться, что к вашему сервису подключается только то устройство, которому вы явно выдали сертификат. Для homelab это означает что Proxmox, Portainer, Home Assistant и прочие админки перестают быть видны для сканеров и ботов — они просто получают ошибку TLS ещё до того, как увидят страницу логина. Никакого брутфорса, никакого credential stuffing, никаких попыток эксплуатировать форму входа. При этом важно понимать границы: mTLS доверяет устройству, а не человеку за ним. Если устройство скомпрометировано — скомпрометирован и доступ. Если приложение уязвимо к XSS или SQL-инъекции — mTLS это не исправит. Он работает на транспортном уровне и выше не смотрит.&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;mtls.sh&lt;/code&gt; мы написали потому что хотели простое решение без лишних зависимостей и написания огромного кол-во команд — только &lt;code&gt;openssl&lt;/code&gt; и &lt;code&gt;python3&lt;/code&gt;. Архитектура с промежуточным CA на каждого клиента решает главную проблему Traefik: отсутствие поддержки CRL. Отозвать доступ — значит просто убрать один сертификат из bundle. Никаких перезапусков, никаких сложных конфигураций.&lt;/p&gt;\n&lt;p&gt;Если вы только начинаете — попробуйте на одном сервисе. Защитите что-то одно, посмотрите как это работает, потом масштабируйте. mTLS проще в эксплуатации, чем кажется на первый взгляд.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Критерий&lt;/th&gt;\n&lt;th&gt;mTLS&lt;/th&gt;\n&lt;th&gt;VPN&lt;/th&gt;\n&lt;th&gt;IAP&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;Уровень OSI&lt;/td&gt;\n&lt;td&gt;L4 (транспортный)&lt;/td&gt;\n&lt;td&gt;L3 (сетевой)&lt;/td&gt;\n&lt;td&gt;L7 (прикладной)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Что защищает&lt;/td&gt;\n&lt;td&gt;Конкретный сервис/домен&lt;/td&gt;\n&lt;td&gt;Весь сетевой стек&lt;/td&gt;\n&lt;td&gt;Конкретное приложение&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Установка клиента&lt;/td&gt;\n&lt;td&gt;Импорт .p12 в браузер&lt;/td&gt;\n&lt;td&gt;VPN-клиент&lt;/td&gt;\n&lt;td&gt;Нет (браузер + SSO)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Удобство для пользователя&lt;/td&gt;\n&lt;td&gt;Прозрачно после импорта&lt;/td&gt;\n&lt;td&gt;Нужно включать VPN&lt;/td&gt;\n&lt;td&gt;Удобно (SSO/2FA)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Страница логина в интернете&lt;/td&gt;\n&lt;td&gt;Нет&lt;/td&gt;\n&lt;td&gt;Нет&lt;/td&gt;\n&lt;td&gt;Да&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Подходит для IoT/API&lt;/td&gt;\n&lt;td&gt;Отлично&lt;/td&gt;\n&lt;td&gt;Сложно&lt;/td&gt;\n&lt;td&gt;Не применимо&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Управление доступом&lt;/td&gt;\n&lt;td&gt;По устройству&lt;/td&gt;\n&lt;td&gt;По IP/пользователю&lt;/td&gt;\n&lt;td&gt;По идентификатору пользователя&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;&lt;strong&gt;Когда я выбрал бы mTLS&lt;/strong&gt;: нужен доступ только к конкретному сервису с устройства, где невозможно или нежелательно устанавливать VPN-клиент или VPN-протоколы/клиент попросту не работает; нужна защита API или автоматизации без UI-аутентификации.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Когда я выбрал бы VPN&lt;/strong&gt;: нужен полный доступ к инфраструктуре, удалённая работа.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Когда я выбрал бы IAP&lt;/strong&gt;: публичный сервис с множеством пользователей, SSO и 2FA обязательны, не нужно управлять сертификатами.&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Кибербезопасность&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;security&quot;],&quot;title&quot;:[0,&quot;Кибербезопасность&quot;],&quot;icon&quot;:[0,&quot;shield&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-04-21&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;безопасность&quot;],[0,&quot;devsecops&quot;],[0,&quot;сети&quot;],[0,&quot;инструменты&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;mTLS, mutual TLS, взаимная аутентификация, Zero Trust, NIST SP 800-207, управление сертификатами, Traefik, mtls.sh, opensophy, PKI, DevSecOps&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;brick-wall-shield&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;mTLS: руководство — от теории к практике с управлением сертификатами и защиты сервисов.&quot;],&quot;description&quot;:[0,&quot;Разбор mTLS — что это, как работает рукопожатие, от каких атак защищает и от каких нет, риски PKI и ошибки реализации. Плюс практика: управление сертификатами через mtls.sh от Opensophy под Traefik.&quot;],&quot;date&quot;:[0,&quot;2026-04-21&quot;],&quot;tags&quot;:[0,&quot;безопасность, devsecops, сети, инструменты&quot;],&quot;keywords&quot;:[0,&quot;mTLS, mutual TLS, взаимная аутентификация, Zero Trust, NIST SP 800-207, управление сертификатами, Traefik, mtls.sh, opensophy, PKI, DevSecOps&quot;],&quot;icon&quot;:[0,&quot;brick-wall-shield&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island> <!-- Re-apply theme after SPA navigation --> <script>
