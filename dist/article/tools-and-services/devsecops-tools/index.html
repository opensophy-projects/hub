efine("astro-island",f)}})();</script>   <noscript> <main style="max-width: 980px; margin: 0 auto; padding: 2rem 1rem;"> <article><h2>Введение</h2>
<p>Безопасность приложений — это не опция, а необходимость в современной разработке. С ростом числа кибератак и утечек данных разработчики и команды безопасности нуждаются в надежных инструментах для выявления уязвимостей на всех этапах жизненного цикла разработки программного обеспечения (SDLC). </p>
<p>В этой статье мы рассмотрим основные категории инструментов безопасности приложений: <strong>DAST</strong> (Dynamic Application Security Testing), <strong>SAST</strong> (Static Application Security Testing), <strong>SCA</strong> (Software Composition Analysis) и <strong>IAST/RASP</strong> (Interactive/Runtime Application Security Protection). Мы разберем их назначение, преимущества и недостатки, а также предоставим список бесплатных инструментов, которые можно интегрировать в вашу инфраструктуру разработки.</p>
<hr>
<h2>Терминология</h2>
<h3>SAST (Static Application Security Testing)</h3>
<p><strong>SAST</strong> — это статический анализ исходного кода приложения без его выполнения. Инструменты SAST сканируют код на этапе разработки, выявляя потенциальные уязвимости, такие как SQL-инъекции, XSS, небезопасные функции и другие проблемы безопасности.</p>
<blockquote>
<p><strong>Зачем нужен SAST?</strong> Раннее выявление уязвимостей в коде позволяет устранить их до развертывания приложения, что значительно снижает стоимость исправления и риски для безопасности.</p>
</blockquote>
<h3>DAST (Dynamic Application Security Testing)</h3>
<p><strong>DAST</strong> — это динамический анализ работающего приложения. В отличие от SAST, DAST тестирует приложение извне, имитируя атаки злоумышленников на развернутое приложение. Инструменты DAST не требуют доступа к исходному коду.</p>
<blockquote>
<p><strong>Зачем нужен DAST?</strong> DAST выявляет уязвимости времени выполнения, проблемы конфигурации и ошибки, которые проявляются только в работающем приложении, включая проблемы аутентификации, управления сеансами и обработки данных.</p>
</blockquote>
<h3>SCA (Software Composition Analysis)</h3>
<p><strong>SCA</strong> — это анализ сторонних компонентов и зависимостей, используемых в приложении. Современные приложения часто содержат десятки или сотни библиотек с открытым исходным кодом, каждая из которых может содержать известные уязвимости.</p>
<blockquote>
<p><strong>Зачем нужен SCA?</strong> SCA помогает отслеживать известные уязвимости в зависимостях (CVE), проверяет лицензии и обеспечивает безопасность цепочки поставок программного обеспечения.</p>
</blockquote>
<h3>IAST (Interactive Application Security Testing)</h3>
<p><strong>IAST</strong> — это гибридный подход, сочетающий элементы SAST и DAST. IAST-агенты встраиваются в приложение и анализируют его поведение во время выполнения, отслеживая потоки данных и выявляя уязвимости в реальном времени.</p>
<blockquote>
<p><strong>Зачем нужен IAST?</strong> IAST обеспечивает более точное обнаружение уязвимостей с меньшим количеством ложных срабатываний, анализируя приложение изнутри во время его работы.</p>
</blockquote>
<h3>RASP (Runtime Application Self-Protection)</h3>
<p><strong>RASP</strong> — это технология защиты приложения во время выполнения. RASP-агенты встраиваются в приложение и могут не только обнаруживать, но и блокировать атаки в реальном времени.</p>
<blockquote>
<p><strong>Зачем нужен RASP?</strong> RASP обеспечивает активную защиту работающего приложения, блокируя эксплойты и атаки без необходимости изменения кода или конфигурации.</p>
</blockquote>
<hr>
<h2>Плюсы и минусы инструментов безопасности</h2>
<table>
<thead>
<tr>
<th align="left">Тип инструмента</th>
<th align="left">Плюсы</th>
<th align="left">Минусы</th>
</tr>
</thead>
<tbody><tr>
<td align="left"><strong>SAST</strong></td>
<td align="left">Раннее обнаружение; точное указание строк кода; не требует запуска приложения.</td>
<td align="left">Высокий уровень ложных срабатываний; не видит проблем конфигурации среды.</td>
</tr>
<tr>
<td align="left"><strong>DAST</strong></td>
<td align="left">Находит реальные уязвимости в рантайме; не нужен доступ к коду; видит ошибки конфигурации.</td>
<td align="left">Позднее обнаружение в SDLC; сложность автоматизации (нужен стенд); не указывает строку кода.</td>
</tr>
<tr>
<td align="left"><strong>SCA</strong></td>
<td align="left">Быстрое нахождение известных CVE; проверка лицензий; легкая интеграция в CI/CD.</td>
<td align="left">Только известные уязвимости; много шума от транзитивных зависимостей.</td>
</tr>
<tr>
<td align="left"><strong>IAST / RASP</strong></td>
<td align="left">Высокая точность; контекст выполнения; RASP активно блокирует атаки.</td>
<td align="left">Влияние на производительность; сложность внедрения; мало бесплатных решений.</td>
</tr>
</tbody></table>
<hr>
<h2>DAST: примеры инструментов</h2>
<h3>Облачные решения</h3>
<h4>HostedScan</h4>
<ul>
<li><strong>Описание:</strong> Облачная платформа для сканирования веб-приложений и инфраструктуры.</li>
<li><strong>Бесплатный план:</strong> &quot;Free Forever&quot; план включает до 3-10 сканирований в месяц (ZAP, Nmap, OpenVAS).</li>
<li><strong>URL:</strong> <a href="https://hostedscan.com/">https://hostedscan.com/</a></li>
<li><strong>Особенности:</strong> Сканирование OWASP Top 10, SSL/TLS проверки, отчеты на почту.</li>
<li><strong>Мнение:</strong> Очень отличный сканер если &quot;лень&quot; ставить owasp zap и nmap(но не исключаем что мы можем лишиться часть функций), и выдача отчетов на почту очень хорошее.</li>
</ul>
<h3>Локальные / Open Source решения</h3>
<h4>OWASP ZAP (Zed Attack Proxy)</h4>
<ul>
<li><strong>Описание:</strong> Самый популярный в мире бесплатный DAST-инструмент.</li>
<li><strong>Лицензия:</strong> Apache 2.0.</li>
<li><strong>GitHub:</strong> <a href="https://github.com/zaproxy/zaproxy">https://github.com/zaproxy/zaproxy</a></li>
<li><strong>Особенности:</strong> Автоматическое сканирование, мощный API для CI/CD, поддержка Docker.</li>
</ul>
<h4>Nuclei</h4>
<ul>
<li><strong>Описание:</strong> Быстрый сканер на основе YAML-шаблонов от ProjectDiscovery.</li>
<li><strong>Лицензия:</strong> MIT.</li>
<li><strong>GitHub:</strong> <a href="https://github.com/projectdiscovery/nuclei">https://github.com/projectdiscovery/nuclei</a></li>
<li><strong>Особенности:</strong> Огромное комьюнити, готовые шаблоны под актуальные CVE.</li>
</ul>
<hr>
<h2>SAST: примеры инструментов</h2>
<h3>Облачные решения</h3>
<h4>SonarCloud</h4>
<ul>
<li><strong>Описание:</strong> Облачный сервис от создателей SonarQube.</li>
<li><strong>Бесплатный план:</strong> Бесплатно для публичных репозиториев. Для приватных — бесплатно до 50,000 строк кода (LoC).</li>
<li><strong>URL:</strong> <a href="https://sonarcloud.io/">https://sonarcloud.io/</a></li>
<li><strong>Мнение:</strong> Отличный вариант для публичных репозиториев, выводит много информации о потенциальных проблемах + большая библиотека правил. Не самый лучший для приватных тк мало в бесплатном тарифе для приват репозиториев возможностей + присутствует локальная версия и часто видел в вакансиях именно этот продукт на позициях AppSec / DevSecOps.</li>
</ul>
<h4>Semgrep Cloud</h4>
<ul>
<li><strong>Описание:</strong> Облачная панель управления для Semgrep.</li>
<li><strong>Бесплатный план:</strong> Бесплатно для команд до 10 человек (Team tier) с поддержкой приватных репозиториев.</li>
<li><strong>URL:</strong> <a href="https://semgrep.dev/">https://semgrep.dev/</a></li>
<li><strong>Мнение:</strong> +/- находит правильно но по сравнению с SonarCloud мало вывода информации. Безлимит для приватных/публичных репо гитхаб</li>
</ul>
<h4>CodeQL Github</h4>
<ul>
<li><strong>Описание:</strong> движок анализа кода, разработанный GitHub для автоматизации проверок безопасности GitHub. Основная особенность CodeQL в том, что он представляет код как данные, создавая базу данных CodeQL для представления кодовой базы, а затем запускает запросы CodeQL к этой базе данных для выявления проблем</li>
<li><strong>Бесплатный план:</strong> для публичных репозиториев гитхаб</li>
<li><strong>Где использовать:</strong> GitHub Code Scanning (публичный репозиторий / security / Code scanning ЛИБО Settings / Security / Code scanning)</li>
</ul>
<h3>Локальные / Open Source решения</h3>
<h4>SonarQube Community Edition</h4>
<ul>
<li><strong>Описание:</strong> Self-hosted платформа для анализа кода.</li>
<li><strong>Лицензия:</strong> LGPL v3.</li>
<li><strong>Установка:</strong> Docker-образ <code>sonarqube:community</code>. или на сайте sonarsource(<a href="https://www.sonarsource.com/open-source-editions/sonarqube-community-edition/">https://www.sonarsource.com/open-source-editions/sonarqube-community-edition/</a>)</li>
<li><strong>Особенности:</strong> Полный контроль над данными, поддержка 15+ языков в бесплатной версии.</li>
</ul>
<h4>Semgrep OSS</h4>
<ul>
<li><strong>Описание:</strong> CLI-инструмент для локального сканирования.</li>
<li><strong>Лицензия:</strong> LGPL 2.1.</li>
<li><strong>GitHub:</strong> <a href="https://github.com/semgrep/semgrep">https://github.com/semgrep/semgrep</a></li>
</ul>
<hr>
<h2>SCA: примеры инструментов</h2>
<h3>Облачные решения</h3>
<h4>Snyk</h4>
<ul>
<li><strong>Описание:</strong> Лидер рынка анализа зависимостей.</li>
<li><strong>Бесплатный план:</strong> Ограниченное количество сканирований в месяц для приватных проектов, безлимит для Open Source.</li>
<li><strong>URL:</strong> <a href="https://snyk.io/">https://snyk.io/</a></li>
<li><strong>Мнение:</strong> помимо анализа пакетов есть еще и анализ кода и удобные советы по исправлению (Remediation).</li>
</ul>
<h4>GitHub Dependabot</h4>
<ul>
<li><strong>Описание:</strong> Встроенный инструмент GitHub.</li>
<li><strong>Бесплатный план:</strong> Полностью бесплатно для всех репозиториев на GitHub.</li>
<li><strong>Особенности:</strong> Автоматически создает Pull Requests для обновления уязвимых библиотек.</li>
</ul>
<h3>Локальные / Open Source решения</h3>
<h4>Trivy</h4>
<ul>
<li><strong>Описание:</strong> Универсальный сканер от Aqua Security.</li>
<li><strong>Лицензия:</strong> Apache 2.0.</li>
<li><strong>GitHub:</strong> <a href="https://github.com/aquasecurity/trivy">https://github.com/aquasecurity/trivy</a></li>
<li><strong>Особенности:</strong> Сканирует не только зависимости, но и образы контейнеров, конфигурации Kubernetes и IaC (Terraform).</li>
</ul>
<h4>OSV-Scanner</h4>
<ul>
<li><strong>Описание:</strong> Сканер от Google, использующий базу OSV.dev.</li>
<li><strong>GitHub:</strong> <a href="https://github.com/google/osv-scanner">https://github.com/google/osv-scanner</a></li>
</ul>
<hr>
<h2>IAST / RASP: бесплатные примеры</h2>
<p>К сожалению, действительно бесплатных облачных IAST/RASP-решений практически не существует. Эта категория инструментов является преимущественно коммерческой из-за сложности технологии и необходимости поддержки множества языков и фреймворков. (Будет дополнено если найду инструменты под это)</p>
<hr>
<h2>Заключение</h2>
<p>Безопасность приложений требует многоуровневого подхода. Комбинация SAST, DAST и SCA закрывает до 90% типичных рисков. Начните с автоматизации простых проверок и постепенно внедряйте более глубокий анализ.</p>
</article> </main> </noscript> <astro-island uid="Z1RbDGM" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/tools-and-services/devsecops-tools&quot;],&quot;title&quot;:[0,&quot;Введение в DAST, SAST, SCA, IAST и RASP: Гид по инструментам безопасности&quot;],&quot;slug&quot;:[0,&quot;article/tools-and-services/devsecops-tools&quot;],&quot;description&quot;:[0,&quot;Разбор основных методологий тестирования безопасности приложений (AppSec) с примерами бесплатных инструментов для интеграции в SDLC.&quot;],&quot;content&quot;:[0,&quot;&lt;h2&gt;Введение&lt;/h2&gt;\n&lt;p&gt;Безопасность приложений — это не опция, а необходимость в современной разработке. С ростом числа кибератак и утечек данных разработчики и команды безопасности нуждаются в надежных инструментах для выявления уязвимостей на всех этапах жизненного цикла разработки программного обеспечения (SDLC). &lt;/p&gt;\n&lt;p&gt;В этой статье мы рассмотрим основные категории инструментов безопасности приложений: &lt;strong&gt;DAST&lt;/strong&gt; (Dynamic Application Security Testing), &lt;strong&gt;SAST&lt;/strong&gt; (Static Application Security Testing), &lt;strong&gt;SCA&lt;/strong&gt; (Software Composition Analysis) и &lt;strong&gt;IAST/RASP&lt;/strong&gt; (Interactive/Runtime Application Security Protection). Мы разберем их назначение, преимущества и недостатки, а также предоставим список бесплатных инструментов, которые можно интегрировать в вашу инфраструктуру разработки.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Терминология&lt;/h2&gt;\n&lt;h3&gt;SAST (Static Application Security Testing)&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;SAST&lt;/strong&gt; — это статический анализ исходного кода приложения без его выполнения. Инструменты SAST сканируют код на этапе разработки, выявляя потенциальные уязвимости, такие как SQL-инъекции, XSS, небезопасные функции и другие проблемы безопасности.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Зачем нужен SAST?&lt;/strong&gt; Раннее выявление уязвимостей в коде позволяет устранить их до развертывания приложения, что значительно снижает стоимость исправления и риски для безопасности.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3&gt;DAST (Dynamic Application Security Testing)&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;DAST&lt;/strong&gt; — это динамический анализ работающего приложения. В отличие от SAST, DAST тестирует приложение извне, имитируя атаки злоумышленников на развернутое приложение. Инструменты DAST не требуют доступа к исходному коду.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Зачем нужен DAST?&lt;/strong&gt; DAST выявляет уязвимости времени выполнения, проблемы конфигурации и ошибки, которые проявляются только в работающем приложении, включая проблемы аутентификации, управления сеансами и обработки данных.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3&gt;SCA (Software Composition Analysis)&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;SCA&lt;/strong&gt; — это анализ сторонних компонентов и зависимостей, используемых в приложении. Современные приложения часто содержат десятки или сотни библиотек с открытым исходным кодом, каждая из которых может содержать известные уязвимости.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Зачем нужен SCA?&lt;/strong&gt; SCA помогает отслеживать известные уязвимости в зависимостях (CVE), проверяет лицензии и обеспечивает безопасность цепочки поставок программного обеспечения.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3&gt;IAST (Interactive Application Security Testing)&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;IAST&lt;/strong&gt; — это гибридный подход, сочетающий элементы SAST и DAST. IAST-агенты встраиваются в приложение и анализируют его поведение во время выполнения, отслеживая потоки данных и выявляя уязвимости в реальном времени.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Зачем нужен IAST?&lt;/strong&gt; IAST обеспечивает более точное обнаружение уязвимостей с меньшим количеством ложных срабатываний, анализируя приложение изнутри во время его работы.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3&gt;RASP (Runtime Application Self-Protection)&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;RASP&lt;/strong&gt; — это технология защиты приложения во время выполнения. RASP-агенты встраиваются в приложение и могут не только обнаруживать, но и блокировать атаки в реальном времени.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Зачем нужен RASP?&lt;/strong&gt; RASP обеспечивает активную защиту работающего приложения, блокируя эксплойты и атаки без необходимости изменения кода или конфигурации.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr&gt;\n&lt;h2&gt;Плюсы и минусы инструментов безопасности&lt;/h2&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th align=\&quot;left\&quot;&gt;Тип инструмента&lt;/th&gt;\n&lt;th align=\&quot;left\&quot;&gt;Плюсы&lt;/th&gt;\n&lt;th align=\&quot;left\&quot;&gt;Минусы&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td align=\&quot;left\&quot;&gt;&lt;strong&gt;SAST&lt;/strong&gt;&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Раннее обнаружение; точное указание строк кода; не требует запуска приложения.&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Высокий уровень ложных срабатываний; не видит проблем конфигурации среды.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;left\&quot;&gt;&lt;strong&gt;DAST&lt;/strong&gt;&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Находит реальные уязвимости в рантайме; не нужен доступ к коду; видит ошибки конфигурации.&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Позднее обнаружение в SDLC; сложность автоматизации (нужен стенд); не указывает строку кода.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;left\&quot;&gt;&lt;strong&gt;SCA&lt;/strong&gt;&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Быстрое нахождение известных CVE; проверка лицензий; легкая интеграция в CI/CD.&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Только известные уязвимости; много шума от транзитивных зависимостей.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td align=\&quot;left\&quot;&gt;&lt;strong&gt;IAST / RASP&lt;/strong&gt;&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Высокая точность; контекст выполнения; RASP активно блокирует атаки.&lt;/td&gt;\n&lt;td align=\&quot;left\&quot;&gt;Влияние на производительность; сложность внедрения; мало бесплатных решений.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;hr&gt;\n&lt;h2&gt;DAST: примеры инструментов&lt;/h2&gt;\n&lt;h3&gt;Облачные решения&lt;/h3&gt;\n&lt;h4&gt;HostedScan&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Облачная платформа для сканирования веб-приложений и инфраструктуры.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный план:&lt;/strong&gt; &amp;quot;Free Forever&amp;quot; план включает до 3-10 сканирований в месяц (ZAP, Nmap, OpenVAS).&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;URL:&lt;/strong&gt; &lt;a href=\&quot;https://hostedscan.com/\&quot;&gt;https://hostedscan.com/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Особенности:&lt;/strong&gt; Сканирование OWASP Top 10, SSL/TLS проверки, отчеты на почту.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Мнение:&lt;/strong&gt; Очень отличный сканер если &amp;quot;лень&amp;quot; ставить owasp zap и nmap(но не исключаем что мы можем лишиться часть функций), и выдача отчетов на почту очень хорошее.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Локальные / Open Source решения&lt;/h3&gt;\n&lt;h4&gt;OWASP ZAP (Zed Attack Proxy)&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Самый популярный в мире бесплатный DAST-инструмент.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Лицензия:&lt;/strong&gt; Apache 2.0.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GitHub:&lt;/strong&gt; &lt;a href=\&quot;https://github.com/zaproxy/zaproxy\&quot;&gt;https://github.com/zaproxy/zaproxy&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Особенности:&lt;/strong&gt; Автоматическое сканирование, мощный API для CI/CD, поддержка Docker.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;Nuclei&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Быстрый сканер на основе YAML-шаблонов от ProjectDiscovery.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Лицензия:&lt;/strong&gt; MIT.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GitHub:&lt;/strong&gt; &lt;a href=\&quot;https://github.com/projectdiscovery/nuclei\&quot;&gt;https://github.com/projectdiscovery/nuclei&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Особенности:&lt;/strong&gt; Огромное комьюнити, готовые шаблоны под актуальные CVE.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;SAST: примеры инструментов&lt;/h2&gt;\n&lt;h3&gt;Облачные решения&lt;/h3&gt;\n&lt;h4&gt;SonarCloud&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Облачный сервис от создателей SonarQube.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный план:&lt;/strong&gt; Бесплатно для публичных репозиториев. Для приватных — бесплатно до 50,000 строк кода (LoC).&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;URL:&lt;/strong&gt; &lt;a href=\&quot;https://sonarcloud.io/\&quot;&gt;https://sonarcloud.io/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Мнение:&lt;/strong&gt; Отличный вариант для публичных репозиториев, выводит много информации о потенциальных проблемах + большая библиотека правил. Не самый лучший для приватных тк мало в бесплатном тарифе для приват репозиториев возможностей + присутствует локальная версия и часто видел в вакансиях именно этот продукт на позициях AppSec / DevSecOps.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;Semgrep Cloud&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Облачная панель управления для Semgrep.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный план:&lt;/strong&gt; Бесплатно для команд до 10 человек (Team tier) с поддержкой приватных репозиториев.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;URL:&lt;/strong&gt; &lt;a href=\&quot;https://semgrep.dev/\&quot;&gt;https://semgrep.dev/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Мнение:&lt;/strong&gt; +/- находит правильно но по сравнению с SonarCloud мало вывода информации. Безлимит для приватных/публичных репо гитхаб&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;CodeQL Github&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; движок анализа кода, разработанный GitHub для автоматизации проверок безопасности GitHub. Основная особенность CodeQL в том, что он представляет код как данные, создавая базу данных CodeQL для представления кодовой базы, а затем запускает запросы CodeQL к этой базе данных для выявления проблем&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный план:&lt;/strong&gt; для публичных репозиториев гитхаб&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Где использовать:&lt;/strong&gt; GitHub Code Scanning (публичный репозиторий / security / Code scanning ЛИБО Settings / Security / Code scanning)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Локальные / Open Source решения&lt;/h3&gt;\n&lt;h4&gt;SonarQube Community Edition&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Self-hosted платформа для анализа кода.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Лицензия:&lt;/strong&gt; LGPL v3.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Установка:&lt;/strong&gt; Docker-образ &lt;code&gt;sonarqube:community&lt;/code&gt;. или на сайте sonarsource(&lt;a href=\&quot;https://www.sonarsource.com/open-source-editions/sonarqube-community-edition/\&quot;&gt;https://www.sonarsource.com/open-source-editions/sonarqube-community-edition/&lt;/a&gt;)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Особенности:&lt;/strong&gt; Полный контроль над данными, поддержка 15+ языков в бесплатной версии.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;Semgrep OSS&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; CLI-инструмент для локального сканирования.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Лицензия:&lt;/strong&gt; LGPL 2.1.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GitHub:&lt;/strong&gt; &lt;a href=\&quot;https://github.com/semgrep/semgrep\&quot;&gt;https://github.com/semgrep/semgrep&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;SCA: примеры инструментов&lt;/h2&gt;\n&lt;h3&gt;Облачные решения&lt;/h3&gt;\n&lt;h4&gt;Snyk&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Лидер рынка анализа зависимостей.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный план:&lt;/strong&gt; Ограниченное количество сканирований в месяц для приватных проектов, безлимит для Open Source.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;URL:&lt;/strong&gt; &lt;a href=\&quot;https://snyk.io/\&quot;&gt;https://snyk.io/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Мнение:&lt;/strong&gt; помимо анализа пакетов есть еще и анализ кода и удобные советы по исправлению (Remediation).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;GitHub Dependabot&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Встроенный инструмент GitHub.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный план:&lt;/strong&gt; Полностью бесплатно для всех репозиториев на GitHub.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Особенности:&lt;/strong&gt; Автоматически создает Pull Requests для обновления уязвимых библиотек.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Локальные / Open Source решения&lt;/h3&gt;\n&lt;h4&gt;Trivy&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Универсальный сканер от Aqua Security.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Лицензия:&lt;/strong&gt; Apache 2.0.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GitHub:&lt;/strong&gt; &lt;a href=\&quot;https://github.com/aquasecurity/trivy\&quot;&gt;https://github.com/aquasecurity/trivy&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Особенности:&lt;/strong&gt; Сканирует не только зависимости, но и образы контейнеров, конфигурации Kubernetes и IaC (Terraform).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4&gt;OSV-Scanner&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Описание:&lt;/strong&gt; Сканер от Google, использующий базу OSV.dev.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GitHub:&lt;/strong&gt; &lt;a href=\&quot;https://github.com/google/osv-scanner\&quot;&gt;https://github.com/google/osv-scanner&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2&gt;IAST / RASP: бесплатные примеры&lt;/h2&gt;\n&lt;p&gt;К сожалению, действительно бесплатных облачных IAST/RASP-решений практически не существует. Эта категория инструментов является преимущественно коммерческой из-за сложности технологии и необходимости поддержки множества языков и фреймворков. (Будет дополнено если найду инструменты под это)&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Заключение&lt;/h2&gt;\n&lt;p&gt;Безопасность приложений требует многоуровневого подхода. Комбинация SAST, DAST и SCA закрывает до 90% типичных рисков. Начните с автоматизации простых проверок и постепенно внедряйте более глубокий анализ.&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Инструменты и Сервисы&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;tools-and-services&quot;],&quot;title&quot;:[0,&quot;Инструменты и Сервисы&quot;],&quot;icon&quot;:[0,&quot;signal&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-01-24&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;devsecops&quot;],[0,&quot;инструменты&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;безопасность приложений, сканирование уязвимостей, DevSecOps, бесплатные инструменты ИБ&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;shredder&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Введение в DAST, SAST, SCA, IAST и RASP: Гид по инструментам безопасности&quot;],&quot;description&quot;:[0,&quot;Разбор основных методологий тестирования безопасности приложений (AppSec) с примерами бесплатных инструментов для интеграции в SDLC.&quot;],&quot;date&quot;:[0,&quot;2026-01-24&quot;],&quot;tags&quot;:[0,&quot;devsecops,
