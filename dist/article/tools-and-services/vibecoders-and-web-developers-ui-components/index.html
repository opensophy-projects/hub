<p>В статье представлена подборка ресурсов с качественными и интересными UI-компонентами. Список будет дополняться по мере появления действительно хороших библиотек.</p>
<h2>Сначала — любимые</h2>
<h3>1. 21st.dev</h3>
<p><strong>Ссылка:</strong> <a href="https://21st.dev/">https://21st.dev/</a></p>
<p>Реестр классных и популярных UI-компонентов в основном React с Tailwind CSS. Большинство публикуемых компонентов являются open-source. Здесь выкладывают свои работы как авторы-энтузиасты, так и создатели собственных библиотек (например, Magic UI). Поэтому помимо самого реестра можно познакомиться и с большим количеством других UI-библиотек.</p>
<p><strong>Годно?</strong> Да. Лично я нашёл здесь действительно классные компоненты, повторяющие дизайн различных веб-сайтов (например, часто встречаются компоненты в стиле Vercel).</p>
<hr>
<h3>2. UIverse</h3>
<p><strong>Ссылка:</strong> <a href="https://uiverse.io/">https://uiverse.io/</a></p>
<p>Open-source библиотека готовых UI-элементов для веб-разработки и дизайна интерфейсов. На сайте собрана большая коллекция компонентов, созданных сообществом, которые можно копировать и использовать в проектах в виде HTML/CSS, Tailwind CSS или React, а также вставлять в Figma для проектирования.</p>
<p><strong>Годно?</strong> По ситуации. Несмотря на большое количество компонентов, действительно ценных я нашёл только у 3–4 авторов (например, <a href="https://uiverse.io/profile/SelfMadeSystem">SelfMadeSystem</a>, который хорошо повторил карточки с сайта Huly). Однако, если не учитывать мои достаточно жёсткие требования, библиотека действительно интересная, и, возможно, каждый найдёт для себя что-то полезное.</p>
<hr>
<h3>3. React Bits</h3>
<p><strong>Ссылка:</strong> <a href="https://reactbits.dev/">https://reactbits.dev/</a></p>
<p>Один из моих любимых open-source React-авторов в области анимаций и фонов. Помимо этого, у него есть готовые компоненты для карточек, текста и других элементов. Однако приоритет здесь всё же отдан анимациям и фонам.</p>
<p><strong>Годно?</strong> Очень. Кстати, автор недавно обновил сайт и добавил фичу, похожую на ту, что есть в моей UI-библиотеке — background studio. Также стоит отметить, что для тех, кто работает с Vue, автор делает компоненты не только на React: <a href="https://vue-bits.dev/">https://vue-bits.dev/</a></p>
<hr>
<h3>4. Magic UI</h3>
<p><strong>Ссылка:</strong> <a href="https://magicui.design/">https://magicui.design/</a></p>
<p>Open-source библиотека UI-компонентов, ориентированная на frontend-разработку интерфейсов для React с Tailwind CSS и Framer Motion.</p>
<p><strong>Годно?</strong> По ситуации. Лично мне здесь в основном понравился раздел Special Effects и несколько других компонентов, например Dot Map.</p>
<hr>
<h3>5. Spline</h3>
<p><strong>Ссылка:</strong>  <a href="https://spline.design/">spline.design</a> </p>
<p>это онлайн-платформа для создания интерактивного 3D-дизайна, которая позволяет дизайнерам (и не только) быстро и визуально создавать 3D-объекты, сцены, анимации и интерактивные элементы, а затем экспортировать их для использования в веб-проектах, мобильных приложениях и других продуктах.</p>
<p><strong>Годно?</strong> Очень. Не могу назвать сервис полностью бесплатным, но фишка в том, что там есть огромная библиотека уже готового бесплатного интерактивного 3D-дизайна от разных авторов, и их достаточно легко скопировать в проект. Единственный, пожалуй, недочёт — оптимизация: нужно постараться, чтобы компоненты (особенно 3D и тяжёлые сцены) корректно работали на мобильных устройствах, то есть чтобы при заходе пользователя с телефона сайт не зависал.</p>
<hr>
<h3>6. Shaders Paper Design</h3>
<p><strong>Ссылка:</strong> <a href="https://shaders.paper.design/">shaders.paper.design</a> </p>
<p>Open-source проект, представляющий легковесную библиотеку шейдеров для веба, которые можно использовать на сайтах и в интерфейсах для создания визуальных эффектов и динамичных фонов. Проект делает акцент на HTML Canvas / WebGL-шейдеры без зависимостей, которые можно установить через npm и использовать напрямую в коде.</p>
<p><strong>Годно?</strong> Да. Несмотря на то что шейдеров пока немного, очень порадовало, что они не имеют зависимостей и в первую очередь ориентированы на популярные визуальные эффекты.</p>
<hr>
<h2>Остальной список</h2>
<h3>Radix UI</h3>
<p><strong>Ссылка:</strong> <a href="https://www.radix-ui.com/">https://www.radix-ui.com/</a></p>
<p>Open-source библиотека UI-компонентов для веб-разработки, ориентированная прежде всего на React. Основная идея — предоставить базовые (примитивные) компоненты с полной логикой поведения.</p>
<hr>
<h3>shadcn/ui</h3>
<p><strong>Ссылки:</strong></p>
<ul>
<li><a href="https://ui.shadcn.com/">https://ui.shadcn.com/</a></li>
<li><a href="https://ui.shadcn.com/docs/directory">Registry Directory</a></li>
</ul>
<p>Open-source библиотека UI-компонентов и платформа для их распространения, ориентированная на React + Tailwind CSS и подход, при котором разработчик получает полный исходный код компонентов для гибкой интеграции и кастомизации.</p>
<p>В самом Registry Directory представлен огромный список других UI-библиотек, интегрированных в экосистему shadcn. Именно в этой экосистеме большая часть библиотек, на мой взгляд, действительно годная, особенно:</p>
<ul>
<li><strong>tailark.com</strong></li>
<li><strong>ui.paceui</strong></li>
<li><strong>skiper-ui</strong></li>
</ul>
<hr>
<p><a href="https://react-aria.adobe.com/">react-aria.adobe.com</a> — это <strong>библиотека компонентов и хуков от Adobe</strong>, ориентированная на <strong>доступность (accessibility)</strong> для React-приложений. React Aria предоставляет низкоуровневые, полностью управляемые и доступные API для создания собственных UI-компонентов, обеспечивая корректное поведение с клавиатуры, поддержку экранных читалок и другие ARIA-паттерны.</p>
<p><a href="https://ui.devsloka.in/">devsloka.in</a> — бесплатная библиотека UI-компонентов и блоков для веб-разработки, ориентированная в основном на React, Next.js, Remix и схожие фреймворки. В библиотеке представлены готовые секции и компоненты, особенно понравились карточки и фоны которых никогда не встречал(на заметку тем кто ищет новые компоненты)</p>
<hr>
<h3>Lightswind</h3>
<p><strong>Ссылка:</strong> <a href="https://lightswind.com/">https://lightswind.com/</a></p>
<p>Библиотека из 150+ анимированных React-компонентов на Tailwind CSS и Framer Motion. Отличается тем, что компоненты устанавливаются через собственный CLI — он сам определяет фреймворк (Next.js, Vite, React Router) и ставит только нужные зависимости, без лишнего. В наличии как стандартные UI-элементы (кнопки, карточки, формы), так и специфические: 3D-компоненты на React Three Fiber, графики, анимированные фоны и интерактивные эффекты вроде plasma globe или drag-order list.</p>
<p><strong>Для кого:</strong> React-разработчики, которым нужны готовые анимированные компоненты и не хочется тратить время на сборку стека вручную.</p>
<hr>
<h3>Nocta UI</h3>
<p><strong>Ссылка:</strong> <a href="https://www.nocta-ui.com/docs">https://www.nocta-ui.com/docs</a></p>
<p>Современная React-библиотека, построенная на принципе copy-paste — как shadcn/ui, но написанная с нуля под максимальную кастомизацию. В основе лежит Ariakit, что даёт хорошую доступность из коробки: keyboard navigation, screen reader support, WCAG 2.1 AA. Полная поддержка TypeScript, CLI для быстрой установки компонентов, несколько встроенных тем (Charcoal, Jade, Copper, Cobalt).</p>
<p><strong>Для кого:</strong> Разработчики, которым нужна альтернатива shadcn/ui с упором на accessibility и полным контролем над исходным кодом компонентов.</p>
<hr>
<h3>coss UI</h3>
<p><strong>Ссылка:</strong> <a href="https://coss.com/ui/docs">https://coss.com/ui/docs</a></p>
<p>Библиотека от команды Cal.com (бывший Origin UI), построенная поверх Base UI — а не Radix, как большинство аналогов. Философия та же: copy-paste, код живёт в твоём проекте, никаких чёрных ящиков. Компоненты разделены на три слоя: примитивы (базовые доступные элементы), particles (готовые паттерны вроде форм и таблиц) и atoms (умные компоненты с интеграцией API). Разрабатывается в открытую — это то, что сам Cal.com постепенно переводит под свои продукты.</p>
<p><strong>Для кого:</strong> Разработчики, которые хотят уйти от Radix/shadcn в сторону более современного и accessible фундамента, либо тем, кто ищет production-tested паттерны из реального продукта.</p>
<hr>
<h3>uilib.co</h3>
<p><strong>Ссылка:</strong> <a href="https://www.uilib.co/">https://www.uilib.co/</a></p>
<p>Коллекция из 100+ бесплатных copy-paste React-компонентов и Tailwind CSS блоков. Построена на shadcn/ui, Radix и Framer Motion. Всё open-source, можно использовать в коммерческих проектах.</p>
<p><strong>Для кого:</strong> Тем, кто работает в экосистеме shadcn и ищет дополнительные готовые блоки — секции лендингов, карточки, hero-блоки и прочее — без необходимости устанавливать отдельные пакеты.</p>
<hr>
<h3>Shadertoy</h3>
<p><strong>Ссылка:</strong> <a href="https://www.shadertoy.com/">https://www.shadertoy.com/</a></p>
<p>Онлайн-платформа и сообщество для написания, просмотра и шаринга GLSL-шейдеров прямо в браузере через WebGL. Здесь нет готовых React-компонентов — это инструмент другого уровня. Можно открыть любой публичный шейдер, посмотреть его исходный код и адаптировать под свой проект. Библиотека огромная: процедурные фоны, анимированные эффекты, фракталы, имитации жидкостей, огня, туманностей и многое другое. Многие шейдеры без проблем переносятся в Three.js или WebGL-проекты.</p>
<p><strong>Для кого:</strong> Разработчикам, которые хотят нестандартные визуальные эффекты для веба и не боятся разобраться с GLSL-кодом. Также отличный ресурс для тех, кто изучает шейдерное программирование — можно смотреть как это работает у других и тут же экспериментировать.</p>
<hr>
<h2>Но есть одно «но»</h2>
<p>Несмотря на то что многие сервисы предоставляют компоненты как open-source, у некоторых из них есть платные компоненты (что можно понять — таким образом авторы получают доход от сервиса). Однако есть один момент, из-за которого я в ближайшее время верну свою UI-библиотеку в интернет (она будет доступна по адресу <strong>ui.opensophy.com</strong>).</p>
<p>В чём проблема и зачем я хочу это сделать? В первую очередь это будет архив компонентов, который всегда будет открыт и бесплатен. Возможно, возникнет вопрос: зачем? Дело в том, что я начал замечать, как некоторые компоненты, которые раньше были бесплатными и считались open-source, теперь требуют либо регистрации в системе автора, либо покупки.</p>
<p>Поэтому иметь собственный реестр, где все эти компоненты будут сохранены и всегда доступны другим, кажется мне хорошей идеей — даже если эти компоненты уже где-то встречались.</p>
</article> </main> </noscript> <astro-island uid="vFm70" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/tools-and-services/vibecoders-and-web-developers-ui-components&quot;],&quot;title&quot;:[0,&quot;Вайбкодерам и веб-разработчикам: список сайтов с готовыми UI-компонентами&quot;],&quot;slug&quot;:[0,&quot;article/tools-and-services/vibecoders-and-web-developers-ui-components&quot;],&quot;description&quot;:[0,&quot;Практическая подборка сайтов и open-source ресурсов с готовыми UI-компонентами для веб-дизайна и frontend-разработки.&quot;],&quot;content&quot;:[0,&quot;&lt;p&gt;Во многих случаях при разработке веб-сервисов и сайтов возникает необходимость в поиске готовых UI-компонентов — как для вдохновения, так и для ускорения работы над интерфейсом. Подобные решения будут полезны всем, кто занимается веб-дизайном и веб-разработкой.&lt;/p&gt;\n&lt;p&gt;В статье представлена подборка ресурсов с качественными и интересными UI-компонентами. Список будет дополняться по мере появления действительно хороших библиотек.&lt;/p&gt;\n&lt;h2&gt;Сначала — любимые&lt;/h2&gt;\n&lt;h3&gt;1. 21st.dev&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://21st.dev/\&quot;&gt;https://21st.dev/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Реестр классных и популярных UI-компонентов в основном React с Tailwind CSS. Большинство публикуемых компонентов являются open-source. Здесь выкладывают свои работы как авторы-энтузиасты, так и создатели собственных библиотек (например, Magic UI). Поэтому помимо самого реестра можно познакомиться и с большим количеством других UI-библиотек.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Годно?&lt;/strong&gt; Да. Лично я нашёл здесь действительно классные компоненты, повторяющие дизайн различных веб-сайтов (например, часто встречаются компоненты в стиле Vercel).&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;2. UIverse&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://uiverse.io/\&quot;&gt;https://uiverse.io/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Open-source библиотека готовых UI-элементов для веб-разработки и дизайна интерфейсов. На сайте собрана большая коллекция компонентов, созданных сообществом, которые можно копировать и использовать в проектах в виде HTML/CSS, Tailwind CSS или React, а также вставлять в Figma для проектирования.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Годно?&lt;/strong&gt; По ситуации. Несмотря на большое количество компонентов, действительно ценных я нашёл только у 3–4 авторов (например, &lt;a href=\&quot;https://uiverse.io/profile/SelfMadeSystem\&quot;&gt;SelfMadeSystem&lt;/a&gt;, который хорошо повторил карточки с сайта Huly). Однако, если не учитывать мои достаточно жёсткие требования, библиотека действительно интересная, и, возможно, каждый найдёт для себя что-то полезное.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;3. React Bits&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://reactbits.dev/\&quot;&gt;https://reactbits.dev/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Один из моих любимых open-source React-авторов в области анимаций и фонов. Помимо этого, у него есть готовые компоненты для карточек, текста и других элементов. Однако приоритет здесь всё же отдан анимациям и фонам.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Годно?&lt;/strong&gt; Очень. Кстати, автор недавно обновил сайт и добавил фичу, похожую на ту, что есть в моей UI-библиотеке — background studio. Также стоит отметить, что для тех, кто работает с Vue, автор делает компоненты не только на React: &lt;a href=\&quot;https://vue-bits.dev/\&quot;&gt;https://vue-bits.dev/&lt;/a&gt;&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;4. Magic UI&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://magicui.design/\&quot;&gt;https://magicui.design/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Open-source библиотека UI-компонентов, ориентированная на frontend-разработку интерфейсов для React с Tailwind CSS и Framer Motion.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Годно?&lt;/strong&gt; По ситуации. Лично мне здесь в основном понравился раздел Special Effects и несколько других компонентов, например Dot Map.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;5. Spline&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt;  &lt;a href=\&quot;https://spline.design/\&quot;&gt;spline.design&lt;/a&gt; &lt;/p&gt;\n&lt;p&gt;это онлайн-платформа для создания интерактивного 3D-дизайна, которая позволяет дизайнерам (и не только) быстро и визуально создавать 3D-объекты, сцены, анимации и интерактивные элементы, а затем экспортировать их для использования в веб-проектах, мобильных приложениях и других продуктах.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Годно?&lt;/strong&gt; Очень. Не могу назвать сервис полностью бесплатным, но фишка в том, что там есть огромная библиотека уже готового бесплатного интерактивного 3D-дизайна от разных авторов, и их достаточно легко скопировать в проект. Единственный, пожалуй, недочёт — оптимизация: нужно постараться, чтобы компоненты (особенно 3D и тяжёлые сцены) корректно работали на мобильных устройствах, то есть чтобы при заходе пользователя с телефона сайт не зависал.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;6. Shaders Paper Design&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://shaders.paper.design/\&quot;&gt;shaders.paper.design&lt;/a&gt; &lt;/p&gt;\n&lt;p&gt;Open-source проект, представляющий легковесную библиотеку шейдеров для веба, которые можно использовать на сайтах и в интерфейсах для создания визуальных эффектов и динамичных фонов. Проект делает акцент на HTML Canvas / WebGL-шейдеры без зависимостей, которые можно установить через npm и использовать напрямую в коде.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Годно?&lt;/strong&gt; Да. Несмотря на то что шейдеров пока немного, очень порадовало, что они не имеют зависимостей и в первую очередь ориентированы на популярные визуальные эффекты.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Остальной список&lt;/h2&gt;\n&lt;h3&gt;Radix UI&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://www.radix-ui.com/\&quot;&gt;https://www.radix-ui.com/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Open-source библиотека UI-компонентов для веб-разработки, ориентированная прежде всего на React. Основная идея — предоставить базовые (примитивные) компоненты с полной логикой поведения.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;shadcn/ui&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылки:&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&quot;https://ui.shadcn.com/\&quot;&gt;https://ui.shadcn.com/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https://ui.shadcn.com/docs/directory\&quot;&gt;Registry Directory&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Open-source библиотека UI-компонентов и платформа для их распространения, ориентированная на React + Tailwind CSS и подход, при котором разработчик получает полный исходный код компонентов для гибкой интеграции и кастомизации.&lt;/p&gt;\n&lt;p&gt;В самом Registry Directory представлен огромный список других UI-библиотек, интегрированных в экосистему shadcn. Именно в этой экосистеме большая часть библиотек, на мой взгляд, действительно годная, особенно:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;tailark.com&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;ui.paceui&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;skiper-ui&lt;/strong&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;p&gt;&lt;a href=\&quot;https://react-aria.adobe.com/\&quot;&gt;react-aria.adobe.com&lt;/a&gt; — это &lt;strong&gt;библиотека компонентов и хуков от Adobe&lt;/strong&gt;, ориентированная на &lt;strong&gt;доступность (accessibility)&lt;/strong&gt; для React-приложений. React Aria предоставляет низкоуровневые, полностью управляемые и доступные API для создания собственных UI-компонентов, обеспечивая корректное поведение с клавиатуры, поддержку экранных читалок и другие ARIA-паттерны.&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://ui.devsloka.in/\&quot;&gt;devsloka.in&lt;/a&gt; — бесплатная библиотека UI-компонентов и блоков для веб-разработки, ориентированная в основном на React, Next.js, Remix и схожие фреймворки. В библиотеке представлены готовые секции и компоненты, особенно понравились карточки и фоны которых никогда не встречал(на заметку тем кто ищет новые компоненты)&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;Lightswind&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://lightswind.com/\&quot;&gt;https://lightswind.com/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Библиотека из 150+ анимированных React-компонентов на Tailwind CSS и Framer Motion. Отличается тем, что компоненты устанавливаются через собственный CLI — он сам определяет фреймворк (Next.js, Vite, React Router) и ставит только нужные зависимости, без лишнего. В наличии как стандартные UI-элементы (кнопки, карточки, формы), так и специфические: 3D-компоненты на React Three Fiber, графики, анимированные фоны и интерактивные эффекты вроде plasma globe или drag-order list.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Для кого:&lt;/strong&gt; React-разработчики, которым нужны готовые анимированные компоненты и не хочется тратить время на сборку стека вручную.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;Nocta UI&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://www.nocta-ui.com/docs\&quot;&gt;https://www.nocta-ui.com/docs&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Современная React-библиотека, построенная на принципе copy-paste — как shadcn/ui, но написанная с нуля под максимальную кастомизацию. В основе лежит Ariakit, что даёт хорошую доступность из коробки: keyboard navigation, screen reader support, WCAG 2.1 AA. Полная поддержка TypeScript, CLI для быстрой установки компонентов, несколько встроенных тем (Charcoal, Jade, Copper, Cobalt).&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Для кого:&lt;/strong&gt; Разработчики, которым нужна альтернатива shadcn/ui с упором на accessibility и полным контролем над исходным кодом компонентов.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;coss UI&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://coss.com/ui/docs\&quot;&gt;https://coss.com/ui/docs&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Библиотека от команды Cal.com (бывший Origin UI), построенная поверх Base UI — а не Radix, как большинство аналогов. Философия та же: copy-paste, код живёт в твоём проекте, никаких чёрных ящиков. Компоненты разделены на три слоя: примитивы (базовые доступные элементы), particles (готовые паттерны вроде форм и таблиц) и atoms (умные компоненты с интеграцией API). Разрабатывается в открытую — это то, что сам Cal.com постепенно переводит под свои продукты.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Для кого:&lt;/strong&gt; Разработчики, которые хотят уйти от Radix/shadcn в сторону более современного и accessible фундамента, либо тем, кто ищет production-tested паттерны из реального продукта.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;uilib.co&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://www.uilib.co/\&quot;&gt;https://www.uilib.co/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Коллекция из 100+ бесплатных copy-paste React-компонентов и Tailwind CSS блоков. Построена на shadcn/ui, Radix и Framer Motion. Всё open-source, можно использовать в коммерческих проектах.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Для кого:&lt;/strong&gt; Тем, кто работает в экосистеме shadcn и ищет дополнительные готовые блоки — секции лендингов, карточки, hero-блоки и прочее — без необходимости устанавливать отдельные пакеты.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3&gt;Shadertoy&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\&quot;https://www.shadertoy.com/\&quot;&gt;https://www.shadertoy.com/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Онлайн-платформа и сообщество для написания, просмотра и шаринга GLSL-шейдеров прямо в браузере через WebGL. Здесь нет готовых React-компонентов — это инструмент другого уровня. Можно открыть любой публичный шейдер, посмотреть его исходный код и адаптировать под свой проект. Библиотека огромная: процедурные фоны, анимированные эффекты, фракталы, имитации жидкостей, огня, туманностей и многое другое. Многие шейдеры без проблем переносятся в Three.js или WebGL-проекты.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Для кого:&lt;/strong&gt; Разработчикам, которые хотят нестандартные визуальные эффекты для веба и не боятся разобраться с GLSL-кодом. Также отличный ресурс для тех, кто изучает шейдерное программирование — можно смотреть как это работает у других и тут же экспериментировать.&lt;/p&gt;\n&lt;hr&gt;\n&lt;h2&gt;Но есть одно «но»&lt;/h2&gt;\n&lt;p&gt;Несмотря на то что многие сервисы предоставляют компоненты как open-source, у некоторых из них есть платные компоненты (что можно понять — таким образом авторы получают доход от сервиса). Однако есть один момент, из-за которого я в ближайшее время верну свою UI-библиотеку в интернет (она будет доступна по адресу &lt;strong&gt;ui.opensophy.com&lt;/strong&gt;).&lt;/p&gt;\n&lt;p&gt;В чём проблема и зачем я хочу это сделать? В первую очередь это будет архив компонентов, который всегда будет открыт и бесплатен. Возможно, возникнет вопрос: зачем? Дело в том, что я начал замечать, как некоторые компоненты, которые раньше были бесплатными и считались open-source, теперь требуют либо регистрации в системе автора, либо покупки.&lt;/p&gt;\n&lt;p&gt;Поэтому иметь собственный реестр, где все эти компоненты будут сохранены и всегда доступны другим, кажется мне хорошей идеей — даже если эти компоненты уже где-то встречались.&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Инструменты и Сервисы&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;tools-and-services&quot;],&quot;title&quot;:[0,&quot;Инструменты и Сервисы&quot;],&quot;icon&quot;:[0,&quot;signal&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-01-07&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;разработка&quot;],[0,&quot;инструменты&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;app-window&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Вайбкодерам и веб-разработчикам: список сайтов с готовыми UI-компонентами&quot;],&quot;description&quot;:[0,&quot;Практическая подборка сайтов и open-source ресурсов с готовыми UI-компонентами для веб-дизайна и frontend-разработки.&quot;],&quot;date&quot;:[0,&quot;2026-01-07&quot;],&quot;tags&quot;:[0,&quot;разработка, инструменты&quot;],&quot;icon&quot;:[0,&quot;app-window&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island> <!-- Re-apply theme after SPA navigation --> <script>
