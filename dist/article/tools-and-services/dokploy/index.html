<h2>1 Часть. Установка</h2>
<p><strong>Для установки понадобится ОС Linux</strong></p>
<p>We have tested on the following Linux Distros:</p>
<ul>
<li>Ubuntu 24.04 LTS</li>
<li>Ubuntu 23.10</li>
<li>Ubuntu 22.04 LTS</li>
<li>Ubuntu 20.04 LTS</li>
<li>Ubuntu 18.04 LTS</li>
<li>Debian 12</li>
<li>Debian 11</li>
<li>Debian 10</li>
<li>Fedora 40</li>
<li>Centos 9</li>
<li>Centos 8</li>
</ul>
<p>Источник: <a href="https://docs.dokploy.com/docs/core/installation">https://docs.dokploy.com/docs/core/installation</a></p>
<p><strong>Требования</strong></p>
<p>Для корректной работы Dokploy на вашем сервере должно быть минимум 2 ГБ оперативной памяти и 30 ГБ дискового пространства. Эти характеристики необходимы для обработки ресурсов, потребляемых Docker во время сборки, и предотвращения зависания системы.</p>
<p><strong>Требования к портам:</strong><br>Перед установкой Dokploy убедитесь, что на вашем сервере доступны следующие порты:</p>
<p>Порт 80: HTTP-трафик (используется Traefik)<br>Порт 443: HTTPS-трафик (используется Traefik)<br>Порт 3000: Веб-интерфейс Dokploy</p>
<p>Важно: Установка завершится ошибкой, если какой-либо из этих портов уже занят. Убедитесь, что остановили все сервисы, использующие эти порты, перед запуском установочного скрипта.</p>
<p>Существует 2 официальных варианта установок платформы. Первый это с помощью скрипта и второй вариант &quot;вручную&quot;. <strong>2 вариант установки можете посмотреть в официальной документации dokploy ( <a href="https://docs.dokploy.com/docs/core/manual-installation">https://docs.dokploy.com/docs/core/manual-installation</a> )</strong></p>
<p>1 вариант: <code>curl -sSL https://dokploy.com/install.sh | sh</code></p>
<p><img src="/assets/dokploy1.png" alt=""><br><em>Частая ошибка со скриптом.</em></p>
<p><img src="/assets/dokploy2.png" alt=""><br><em>Правильная установка если вы обычный пользователь вы сначала должны перейти в режим root, к примеру с помощью команды: <code>sudo -i</code></em></p>
<p><strong>Внутри скрипта</strong></p>
<pre><code># Detct version from environment variable or default to latest
# Usage with curl (export first): export DOKPLOY_VERSION=canary &amp;&amp; curl -sSL https://dokploy.com/install.sh | sh
# Usage with curl (export first): export DOKPLOY_VERSION=feature &amp;&amp; curl -sSL https://dokploy.com/install.sh | sh
# Usage with curl (bash -s): DOKPLOY_VERSION=canary bash -s &lt; &lt;(curl -sSL https://dokploy.com/install.sh)
# Usage with curl (default): curl -sSL https://dokploy.com/install.sh | sh (defaults to latest)
# Usage with bash: DOKPLOY_VERSION=canary bash install.sh
# Usage with bash: DOKPLOY_VERSION=feature bash install.sh
# Usage with bash: bash install.sh (defaults to latest)
detect_version() {
    local version=&quot;${DOKPLOY_VERSION:-latest}&quot;
    echo &quot;$version&quot;
}

# Function to detect if running in Proxmox LXC container
is_proxmox_lxc() {
    # Check for LXC in environment
    if [ -n &quot;$container&quot; ] &amp;&amp; [ &quot;$container&quot; = &quot;lxc&quot; ]; then
        return 0  # LXC container
    fi
    
    # Check for LXC in /proc/1/environ
    if grep -q &quot;container=lxc&quot; /proc/1/environ 2&gt;/dev/null; then
        return 0  # LXC container
    fi
    
    return 1  # Not LXC
}

install_dokploy() {
    # Detect version tag
    VERSION_TAG=$(detect_version)
    DOCKER_IMAGE=&quot;dokploy/dokploy:${VERSION_TAG}&quot;
    
    echo &quot;Installing Dokploy version: ${VERSION_TAG}&quot;
    if [ &quot;$(id -u)&quot; != &quot;0&quot; ]; then
        echo &quot;This script must be run as root&quot; &gt;&amp;2
        exit 1
    fi

    # check if is Mac OS
    if [ &quot;$(uname)&quot; = &quot;Darwin&quot; ]; then
        echo &quot;This script must be run on Linux&quot; &gt;&amp;2
        exit 1
    fi

    # check if is running inside a container
    if [ -f /.dockerenv ]; then
        echo &quot;This script must be run on Linux&quot; &gt;&amp;2
        exit 1
    fi

    # check if something is running on port 80
    if ss -tulnp | grep &#39;:80 &#39; &gt;/dev/null; then
        echo &quot;Error: something is already running on port 80&quot; &gt;&amp;2
        exit 1
    fi

    # check if something is running on port 443
    if ss -tulnp | grep &#39;:443 &#39; &gt;/dev/null; then
        echo &quot;Error: something is already running on port 443&quot; &gt;&amp;2
        exit 1
    fi

    # check if something is running on port 3000
    if ss -tulnp | grep &#39;:3000 &#39; &gt;/dev/null; then
        echo &quot;Error: something is already running on port 3000&quot; &gt;&amp;2
        echo &quot;Dokploy requires port 3000 to be available. Please stop any service using this port.&quot; &gt;&amp;2
        exit 1
    fi

    command_exists() {
      command -v &quot;$@&quot; &gt; /dev/null 2&gt;&amp;1
    }

    if command_exists docker; then
      echo &quot;Docker already installed&quot;
    else
      curl -sSL https://get.docker.com | sh -s -- --version 28.5.0
    fi

    # Check if running in Proxmox LXC container and set endpoint mode
    endpoint_mode=&quot;&quot;
    if is_proxmox_lxc; then
        echo &quot;⚠️ WARNING: Detected Proxmox LXC container environment!&quot;
        echo &quot;Adding --endpoint-mode dnsrr to Docker services for LXC compatibility.&quot;
        echo &quot;This may affect service discovery but is required for LXC containers.&quot;
        echo &quot;&quot;
        endpoint_mode=&quot;--endpoint-mode dnsrr&quot;
        echo &quot;Waiting for 5 seconds before continuing...&quot;
        sleep 5
    fi


    docker swarm leave --force 2&gt;/dev/null

    get_ip() {
        local ip=&quot;&quot;
        
        # Try IPv4 first
        # First attempt: ifconfig.io
        ip=$(curl -4s --connect-timeout 5 https://ifconfig.io 2&gt;/dev/null)
        
        # Second attempt: icanhazip.com
        if [ -z &quot;$ip&quot; ]; then
            ip=$(curl -4s --connect-timeout 5 https://icanhazip.com 2&gt;/dev/null)
        fi
        
        # Third attempt: ipecho.net
        if [ -z &quot;$ip&quot; ]; then
            ip=$(curl -4s --connect-timeout 5 https://ipecho.net/plain 2&gt;/dev/null)
        fi

        # If no IPv4, try IPv6
        if [ -z &quot;$ip&quot; ]; then
            # Try IPv6 with ifconfig.io
            ip=$(curl -6s --connect-timeout 5 https://ifconfig.io 2&gt;/dev/null)
            
            # Try IPv6 with icanhazip.com
            if [ -z &quot;$ip&quot; ]; then
                ip=$(curl -6s --connect-timeout 5 https://icanhazip.com 2&gt;/dev/null)
            fi
            
            # Try IPv6 with ipecho.net
            if [ -z &quot;$ip&quot; ]; then
                ip=$(curl -6s --connect-timeout 5 https://ipecho.net/plain 2&gt;/dev/null)
            fi
        fi

        if [ -z &quot;$ip&quot; ]; then
            echo &quot;Error: Could not determine server IP address automatically (neither IPv4 nor IPv6).&quot; &gt;&amp;2
            echo &quot;Please set the ADVERTISE_ADDR environment variable manually.&quot; &gt;&amp;2
            echo &quot;Example: export ADVERTISE_ADDR=&lt;your-server-ip&gt;&quot; &gt;&amp;2
            exit 1
        fi

        echo &quot;$ip&quot;
    }

    get_private_ip() {
        ip addr show | grep -E &quot;inet (192\.168\.|10\.|172\.1[6-9]\.|172\.2[0-9]\.|172\.3[0-1]\.)&quot; | head -n1 | awk &#39;{print $2}&#39; | cut -d/ -f1
    }

    advertise_addr=&quot;${ADVERTISE_ADDR:-$(get_private_ip)}&quot;

    if [ -z &quot;$advertise_addr&quot; ]; then
        echo &quot;ERROR: We couldn&#39;t find a private IP address.&quot;
        echo &quot;Please set the ADVERTISE_ADDR environment variable manually.&quot;
        echo &quot;Example: export ADVERTISE_ADDR=192.168.1.100&quot;
        exit 1
    fi
    echo &quot;Using advertise address: $advertise_addr&quot;

    # Allow custom Docker Swarm init arguments via DOCKER_SWARM_INIT_ARGS environment variable
    # Example: export DOCKER_SWARM_INIT_ARGS=&quot;--default-addr-pool 172.20.0.0/16 --default-addr-pool-mask-length 24&quot;
    # This is useful to avoid CIDR overlapping with cloud provider VPCs (e.g., AWS)
    swarm_init_args=&quot;${DOCKER_SWARM_INIT_ARGS:-}&quot;
    
    if [ -n &quot;$swarm_init_args&quot; ]; then
        echo &quot;Using custom swarm init arguments: $swarm_init_args&quot;
        docker swarm init --advertise-addr $advertise_addr $swarm_init_args
    else
        docker swarm init --advertise-addr $advertise_addr
    fi
    
     if [ $? -ne 0 ]; then
        echo &quot;Error: Failed to initialize Docker Swarm&quot; &gt;&amp;2
        exit 1
    fi

    echo &quot;Swarm initialized&quot;

    docker network rm -f dokploy-network 2&gt;/dev/null
    docker network create --driver overlay --attachable dokploy-network

    echo &quot;Network created&quot;

    mkdir -p /etc/dokploy

    chmod 777 /etc/dokploy

    docker service create \
    --name dokploy-postgres \
    --constraint &#39;node.role==manager&#39; \
    --network dokploy-network \
    --env POSTGRES_USER=dokploy \
    --env POSTGRES_DB=dokploy \
    --env POSTGRES_PASSWORD=amukds4wi9001583845717ad2 \
    --mount type=volume,source=dokploy-postgres,target=/var/lib/postgresql/data \
    $endpoint_mode \
    postgres:16

    docker service create \
    --name dokploy-redis \
    --constraint &#39;node.role==manager&#39; \
    --network dokploy-network \
    --mount type=volume,source=dokploy-redis,target=/data \
    $endpoint_mode \
    redis:7

    # Installation
    # Set RELEASE_TAG environment variable for canary/feature versions
    release_tag_env=&quot;&quot;
    if [ &quot;$VERSION_TAG&quot; != &quot;latest&quot; ]; then
        release_tag_env=&quot;-e RELEASE_TAG=$VERSION_TAG&quot;
    fi
    
    docker service create \
      --name dokploy \
      --replicas 1 \
      --network dokploy-network \
      --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock \
      --mount type=bind,source=/etc/dokploy,target=/etc/dokploy \
      --mount type=volume,source=dokploy,target=/root/.docker \
      --publish published=3000,target=3000,mode=host \
      --update-parallelism 1 \
      --update-order stop-first \
      --constraint &#39;node.role == manager&#39; \
      $endpoint_mode \
      $release_tag_env \
      -e ADVERTISE_ADDR=$advertise_addr \
      $DOCKER_IMAGE

    sleep 4

    docker run -d \
        --name dokploy-traefik \
        --restart always \
        -v /etc/dokploy/traefik/traefik.yml:/etc/traefik/traefik.yml \
        -v /etc/dokploy/traefik/dynamic:/etc/dokploy/traefik/dynamic \
        -v /var/run/docker.sock:/var/run/docker.sock:ro \
        -p 80:80/tcp \
        -p 443:443/tcp \
        -p 443:443/udp \
        traefik:v3.6.1
    
    docker network connect dokploy-network dokploy-traefik


    # Optional: Use docker service create instead of docker run
    #   docker service create \
    #     --name dokploy-traefik \
    #     --constraint &#39;node.role==manager&#39; \
    #     --network dokploy-network \
    #     --mount type=bind,source=/etc/dokploy/traefik/traefik.yml,target=/etc/traefik/traefik.yml \
    #     --mount type=bind,source=/etc/dokploy/traefik/dynamic,target=/etc/dokploy/traefik/dynamic \
    #     --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock \
    #     --publish mode=host,published=443,target=443 \
    #     --publish mode=host,published=80,target=80 \
    #     --publish mode=host,published=443,target=443,protocol=udp \
    #     traefik:v3.6.1

    GREEN=&quot;\033[0;32m&quot;
    YELLOW=&quot;\033[1;33m&quot;
    BLUE=&quot;\033[0;34m&quot;
    NC=&quot;\033[0m&quot; # No Color

    format_ip_for_url() {
        local ip=&quot;$1&quot;
        if echo &quot;$ip&quot; | grep -q &#39;:&#39;; then
            # IPv6
            echo &quot;[${ip}]&quot;
        else
            # IPv4
            echo &quot;${ip}&quot;
        fi
    }

    public_ip=&quot;${ADVERTISE_ADDR:-$(get_ip)}&quot;
    formatted_addr=$(format_ip_for_url &quot;$public_ip&quot;)
    echo &quot;&quot;
    printf &quot;${GREEN}Congratulations, Dokploy is installed!${NC}\n&quot;
    printf &quot;${BLUE}Wait 15 seconds for the server to start${NC}\n&quot;
    printf &quot;${YELLOW}Please go to http://${formatted\\_addr}:3000${NC}\n\n&quot;
}

update_dokploy() {
    # Detect version tag
    VERSION_TAG=$(detect_version)
    DOCKER_IMAGE=&quot;dokploy/dokploy:${VERSION_TAG}&quot;
    
    echo &quot;Updating Dokploy to version: ${VERSION_TAG}&quot;
    
    # Pull the image
    docker pull $DOCKER_IMAGE

    # Update the service
    docker service update --image $DOCKER_IMAGE dokploy

    echo &quot;Dokploy has been updated to version: ${VERSION_TAG}&quot;
}

# Main script execution
if [ &quot;$1&quot; = &quot;update&quot; ]; then
    update_dokploy
else
    install_dokploy
fi
</code></pre>
<p><strong>Что делает данный скрипт</strong></p>
<ul>
<li>Определение версии для установки</li>
</ul>
<p>Проверяет переменную окружения DOKPLOY_VERSION<br>Если не указана — использует latest<br>Поддерживает версии: latest, canary, feature</p>
<ul>
<li>Проверка среды выполнения</li>
</ul>
<p>Определяет, запущен ли скрипт в Proxmox LXC-контейнере<br> Проверяет, запущен ли от root (если нет — выход с ошибкой)<br> Проверяет, что это Linux (не macOS)<br> Проверяет, что скрипт не запущен внутри Docker-контейнера</p>
<ul>
<li>Проверка занятости портов</li>
</ul>
<p>Порт 80 — должен быть свободен<br>Порт 443 — должен быть свободен<br>Порт 3000 — должен быть свободен (для веб-интерфейса Dokploy)</p>
<p>Если хоть один порт занят — установка прерывается</p>
<ul>
<li>Установка Docker</li>
</ul>
<p>Проверяет, установлен ли Docker<br>Если нет — устанавливает Docker версии 28.5.0 через официальный скрипт</p>
<ul>
<li>Инициализация Docker Swarm</li>
</ul>
<p>Принудительно выходит из существующего Swarm (если был)<br>Определяет IP-адрес сервера (приватный или публичный)<br>Инициализирует новый Docker Swarm кластер<br>Для LXC добавляет флаг --endpoint-mode dnsrr (для совместимости)</p>
<ul>
<li>Создание сети</li>
</ul>
<p>Удаляет старую сеть dokploy-network (если была)<br>Создаёт новую overlay-сеть dokploy-network для связи контейнеров</p>
<ul>
<li>Создание директории конфигурации</li>
</ul>
<p>Создаёт /etc/dokploy<br>Устанавливает права 777 (полный доступ)</p>
<ul>
<li>Запуск PostgreSQL</li>
</ul>
<p>Создаёт Docker-сервис dokploy-postgres<br>База данных: dokploy<br>Пользователь: dokploy<br>Пароль: amukds4wi9001583845717ad2 (захардкожен)<br>Данные хранятся в volume dokploy-postgres</p>
<ul>
<li>Запуск Redis</li>
</ul>
<p>Создаёт Docker-сервис dokploy-redis<br>Используется для кеширования и очередей<br>Данные хранятся в volume dokploy-redis</p>
<ul>
<li>Запуск основного сервиса Dokploy</li>
</ul>
<p>Монтирует Docker socket (для управления контейнерами)<br>Монтирует /etc/dokploy для конфигурации<br>Публикует порт 3000 для веб-интерфейса<br>Использует образ согласно выбранной версии</p>
<ul>
<li>Запуск Traefik (reverse proxy)</li>
</ul>
<p>Запускает Traefik версии 3.6.1<br>Обрабатывает HTTP (порт 80) и HTTPS (порт 443)<br>Автоматически управляет маршрутизацией и SSL-сертификатами<br>Подключается к сети dokploy-network</p>
<ul>
<li>Завершение установки</li>
</ul>
<p>Определяет публичный IP-адрес сервера (IPv4 или IPv6)<br>Выводит сообщение об успешной установке<br>Показывает URL для доступа: http://[IP]:3000<br>Предупреждает подождать 15 секунд до запуска</p>
<p>Возможные ошибки при установке</p>
<p>bash: Cannot connect to the Docker daemon at unix:///var/run/docker.sock. Is the docker daemon running? Error: Failed to initialize Docker Swarm</p>
<p>Решается перезапуском Docker или перезагрузкой системы:</p>
<p><code>systemctl status docker</code> проверка статуса</p>
<p><code>systemctl start docker</code> запуск / перезапуск docker<br><img src="/assets/dokploy3.png" alt=""><br><em>как мы видим проблема исправилась.</em></p>
<p>теперь можем запустить снова скрипт и посмотреть docker ps чтобы посмотреть какие контейнеры работают, какие работают на 0.0.0.0 (мб многие пользователи не хотят чтобы они были на 0.0.0.0, через скрипт будет по стандарту работать на 0.0.0.0 dokploy и traefik)</p>

<h3>Эксперимент - пробуем поставить n8n.</h3>
<p>n8n (произносится «нэйтн») — это платформа с открытым исходным кодом для автоматизации рабочих процессов и интеграции разных приложений и сервисов без необходимости писать код (low-code/no-code). Она работает как визуальный конструктор, где вы соединяете блоки (узлы) для создания цепочек действий: когда что-то происходит в одном сервисе, n8n автоматически выполняет заданные задачи в других. Инструмент используется для автоматизации рутинных операций, создания сложных интеграций между CRM, мессенджерами, базами данных и другими системами, а также для внедрения ИИ-функций. </p>

      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${N8N_HOST}:${N8N_PORT}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
</code></pre>

<h2>4 Часть. Мнение и плюсы и минусы проекта.</h2>
<p>Сравнение с Coolify</p>
<p>По функциям Dokploy и Coolify практически не отличаются, разве что Dokploy больше ориентирован на команды, поэтому некоторые функции могут показаться избыточными для соло-энтузиастов. Ниже — официальное сравнение от Dokploy docs:</p>
<p><img src="/assets/dokploy29.png" alt=""></p>
<h2>Плюсы и минусы Dokploy</h2>
<p>Я пользовался платформой полгода-год, и вот что могу сказать:</p>
<p><strong>✅ Плюсы</strong></p>
<p><strong>Оптимизация ресурсов — главное преимущество</strong><br>Несмотря на мелкие недочёты (например, неполные переводы на некоторые языки), по сравнению с Coolify и другими аналогами Dokploy потребляет гораздо меньше ресурсов. Нет аномальных нагрузок, когда процессор нагружается на 100% в простое — такие моменты встречались у пользователей Coolify.</p>
<p><strong>Современный интерфейс</strong><br> Это субъективно, но проект использует shadcn/ui компоненты. Тем, кто не знаком, рекомендую посмотреть мою прошлую статью: &quot;Вайбкодерам и веб-разработчикам на заметку! Список сайтов с готовыми React UI-компонентами&quot;. (плюс ставится за выбор хорошей легкой библиотеки)</p>
<p><strong>Покрывает все потребности</strong><br> Я в основном работаю с Docker-контейнерами, сайтами и GitHub-проектами. Когда понадобилось быстро развернуть сайт локально, а затем выкатить в интернет — Dokploy справился на ура.</p>
<p><strong>❌ Минусы</strong></p>
<p><strong>&quot;Специфические&quot; интеграции</strong><br> Не рекомендую использовать Dokploy, если у вас другой reverse proxy (не Traefik). Часть функций просто не будет работать, и придётся писать собственные скрипты или compose-файлы под ваш прокси.</p>
<p>У меня был случай, когда понадобился модифицированный Nginx Proxy Manager, и после его установки пришлось делать много ручной работы.</p>
<p><strong>Что хотелось бы улучшить:</strong><br> Идеально было бы добавить в Dokploy возможность переключать reverse proxy по кнопке (Traefik, Nginx, Caddy и т.д.). Тогда это была бы лучшая платформа для деплоя, которую я когда-либо видел.</p>
<p><strong>Проблемы с шаблонами?</strong><br> Я бы не стал записывать это в минусы, так как это не проблема самого проекта.</p>
<p>Не особо критичные и мелкие ошибки по типу перевода платформы под свой язык.</p>
<p><strong>Итоговая оценка 8/10</strong></p>
<p>Проект очень классный и останется пока в моем топе-1 на данный момент как платформа для развертывания проектов.</p>
<p><strong>Рекомендация для читателей и тем кому нужно больше информации:</strong></p>

</article> </main> </noscript> <astro-island uid="Z2vW7Ak" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/tools-and-services/dokploy&quot;],&quot;title&quot;:[0,&quot;Обзор Dokploy: удобная платформа для деплоя Docker-контейнеров и GitHub-проектов&quot;],&quot;slug&quot;:[0,&quot;article/tools-and-services/dokploy&quot;],&quot;description&quot;:[0,&quot;В этой статье мы разберём Dokploy — open-source платформу для деплоя приложений. Узнаем, какие задачи она решает, какие функции предлагает и чем отличается от популярного конкурента Coolify.&quot;],&quot;content&quot;:[0,&quot;&lt;p&gt;В этой статье мы разберём Dokploy — open-source платформу для деплоя приложений. Узнаем, какие задачи она решает, какие функции предлагает и чем отличается от популярного конкурента Coolify. В конце вы поймёте, подходит ли Dokploy для ваших проектов.&lt;/p&gt;\n&lt;h2&gt;1 Часть. Установка&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Для установки понадобится ОС Linux&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;We have tested on the following Linux Distros:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Ubuntu 24.04 LTS&lt;/li&gt;\n&lt;li&gt;Ubuntu 23.10&lt;/li&gt;\n&lt;li&gt;Ubuntu 22.04 LTS&lt;/li&gt;\n&lt;li&gt;Ubuntu 20.04 LTS&lt;/li&gt;\n&lt;li&gt;Ubuntu 18.04 LTS&lt;/li&gt;\n&lt;li&gt;Debian 12&lt;/li&gt;\n&lt;li&gt;Debian 11&lt;/li&gt;\n&lt;li&gt;Debian 10&lt;/li&gt;\n&lt;li&gt;Fedora 40&lt;/li&gt;\n&lt;li&gt;Centos 9&lt;/li&gt;\n&lt;li&gt;Centos 8&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Источник: &lt;a href=\&quot;https://docs.dokploy.com/docs/core/installation\&quot;&gt;https://docs.dokploy.com/docs/core/installation&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Требования&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Для корректной работы Dokploy на вашем сервере должно быть минимум 2 ГБ оперативной памяти и 30 ГБ дискового пространства. Эти характеристики необходимы для обработки ресурсов, потребляемых Docker во время сборки, и предотвращения зависания системы.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Требования к портам:&lt;/strong&gt;&lt;br&gt;Перед установкой Dokploy убедитесь, что на вашем сервере доступны следующие порты:&lt;/p&gt;\n&lt;p&gt;Порт 80: HTTP-трафик (используется Traefik)&lt;br&gt;Порт 443: HTTPS-трафик (используется Traefik)&lt;br&gt;Порт 3000: Веб-интерфейс Dokploy&lt;/p&gt;\n&lt;p&gt;Важно: Установка завершится ошибкой, если какой-либо из этих портов уже занят. Убедитесь, что остановили все сервисы, использующие эти порты, перед запуском установочного скрипта.&lt;/p&gt;\n&lt;p&gt;Существует 2 официальных варианта установок платформы. Первый это с помощью скрипта и второй вариант &amp;quot;вручную&amp;quot;. &lt;strong&gt;2 вариант установки можете посмотреть в официальной документации dokploy ( &lt;a href=\&quot;https://docs.dokploy.com/docs/core/manual-installation\&quot;&gt;https://docs.dokploy.com/docs/core/manual-installation&lt;/a&gt; )&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;1 вариант: &lt;code&gt;curl -sSL https://dokploy.com/install.sh | sh&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy1.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Частая ошибка со скриптом.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy2.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Правильная установка если вы обычный пользователь вы сначала должны перейти в режим root, к примеру с помощью команды: &lt;code&gt;sudo -i&lt;/code&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Внутри скрипта&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;# Detct version from environment variable or default to latest\n# Usage with curl (export first): export DOKPLOY_VERSION=canary &amp;amp;&amp;amp; curl -sSL https://dokploy.com/install.sh | sh\n# Usage with curl (export first): export DOKPLOY_VERSION=feature &amp;amp;&amp;amp; curl -sSL https://dokploy.com/install.sh | sh\n# Usage with curl (bash -s): DOKPLOY_VERSION=canary bash -s &amp;lt; &amp;lt;(curl -sSL https://dokploy.com/install.sh)\n# Usage with curl (default): curl -sSL https://dokploy.com/install.sh | sh (defaults to latest)\n# Usage with bash: DOKPLOY_VERSION=canary bash install.sh\n# Usage with bash: DOKPLOY_VERSION=feature bash install.sh\n# Usage with bash: bash install.sh (defaults to latest)\ndetect_version() {\n    local version=&amp;quot;${DOKPLOY_VERSION:-latest}&amp;quot;\n    echo &amp;quot;$version&amp;quot;\n}\n\n# Function to detect if running in Proxmox LXC container\nis_proxmox_lxc() {\n    # Check for LXC in environment\n    if [ -n &amp;quot;$container&amp;quot; ] &amp;amp;&amp;amp; [ &amp;quot;$container&amp;quot; = &amp;quot;lxc&amp;quot; ]; then\n        return 0  # LXC container\n    fi\n    \n    # Check for LXC in /proc/1/environ\n    if grep -q &amp;quot;container=lxc&amp;quot; /proc/1/environ 2&amp;gt;/dev/null; then\n        return 0  # LXC container\n    fi\n    \n    return 1  # Not LXC\n}\n\ninstall_dokploy() {\n    # Detect version tag\n    VERSION_TAG=$(detect_version)\n    DOCKER_IMAGE=&amp;quot;dokploy/dokploy:${VERSION_TAG}&amp;quot;\n    \n    echo &amp;quot;Installing Dokploy version: ${VERSION_TAG}&amp;quot;\n    if [ &amp;quot;$(id -u)&amp;quot; != &amp;quot;0&amp;quot; ]; then\n        echo &amp;quot;This script must be run as root&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    # check if is Mac OS\n    if [ &amp;quot;$(uname)&amp;quot; = &amp;quot;Darwin&amp;quot; ]; then\n        echo &amp;quot;This script must be run on Linux&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    # check if is running inside a container\n    if [ -f /.dockerenv ]; then\n        echo &amp;quot;This script must be run on Linux&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    # check if something is running on port 80\n    if ss -tulnp | grep &amp;#39;:80 &amp;#39; &amp;gt;/dev/null; then\n        echo &amp;quot;Error: something is already running on port 80&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    # check if something is running on port 443\n    if ss -tulnp | grep &amp;#39;:443 &amp;#39; &amp;gt;/dev/null; then\n        echo &amp;quot;Error: something is already running on port 443&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    # check if something is running on port 3000\n    if ss -tulnp | grep &amp;#39;:3000 &amp;#39; &amp;gt;/dev/null; then\n        echo &amp;quot;Error: something is already running on port 3000&amp;quot; &amp;gt;&amp;amp;2\n        echo &amp;quot;Dokploy requires port 3000 to be available. Please stop any service using this port.&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    command_exists() {\n      command -v &amp;quot;$@&amp;quot; &amp;gt; /dev/null 2&amp;gt;&amp;amp;1\n    }\n\n    if command_exists docker; then\n      echo &amp;quot;Docker already installed&amp;quot;\n    else\n      curl -sSL https://get.docker.com | sh -s -- --version 28.5.0\n    fi\n\n    # Check if running in Proxmox LXC container and set endpoint mode\n    endpoint_mode=&amp;quot;&amp;quot;\n    if is_proxmox_lxc; then\n        echo &amp;quot;⚠️ WARNING: Detected Proxmox LXC container environment!&amp;quot;\n        echo &amp;quot;Adding --endpoint-mode dnsrr to Docker services for LXC compatibility.&amp;quot;\n        echo &amp;quot;This may affect service discovery but is required for LXC containers.&amp;quot;\n        echo &amp;quot;&amp;quot;\n        endpoint_mode=&amp;quot;--endpoint-mode dnsrr&amp;quot;\n        echo &amp;quot;Waiting for 5 seconds before continuing...&amp;quot;\n        sleep 5\n    fi\n\n\n    docker swarm leave --force 2&amp;gt;/dev/null\n\n    get_ip() {\n        local ip=&amp;quot;&amp;quot;\n        \n        # Try IPv4 first\n        # First attempt: ifconfig.io\n        ip=$(curl -4s --connect-timeout 5 https://ifconfig.io 2&amp;gt;/dev/null)\n        \n        # Second attempt: icanhazip.com\n        if [ -z &amp;quot;$ip&amp;quot; ]; then\n            ip=$(curl -4s --connect-timeout 5 https://icanhazip.com 2&amp;gt;/dev/null)\n        fi\n        \n        # Third attempt: ipecho.net\n        if [ -z &amp;quot;$ip&amp;quot; ]; then\n            ip=$(curl -4s --connect-timeout 5 https://ipecho.net/plain 2&amp;gt;/dev/null)\n        fi\n\n        # If no IPv4, try IPv6\n        if [ -z &amp;quot;$ip&amp;quot; ]; then\n            # Try IPv6 with ifconfig.io\n            ip=$(curl -6s --connect-timeout 5 https://ifconfig.io 2&amp;gt;/dev/null)\n            \n            # Try IPv6 with icanhazip.com\n            if [ -z &amp;quot;$ip&amp;quot; ]; then\n                ip=$(curl -6s --connect-timeout 5 https://icanhazip.com 2&amp;gt;/dev/null)\n            fi\n            \n            # Try IPv6 with ipecho.net\n            if [ -z &amp;quot;$ip&amp;quot; ]; then\n                ip=$(curl -6s --connect-timeout 5 https://ipecho.net/plain 2&amp;gt;/dev/null)\n            fi\n        fi\n\n        if [ -z &amp;quot;$ip&amp;quot; ]; then\n            echo &amp;quot;Error: Could not determine server IP address automatically (neither IPv4 nor IPv6).&amp;quot; &amp;gt;&amp;amp;2\n            echo &amp;quot;Please set the ADVERTISE_ADDR environment variable manually.&amp;quot; &amp;gt;&amp;amp;2\n            echo &amp;quot;Example: export ADVERTISE_ADDR=&amp;lt;your-server-ip&amp;gt;&amp;quot; &amp;gt;&amp;amp;2\n            exit 1\n        fi\n\n        echo &amp;quot;$ip&amp;quot;\n    }\n\n    get_private_ip() {\n        ip addr show | grep -E &amp;quot;inet (192\\.168\\.|10\\.|172\\.1[6-9]\\.|172\\.2[0-9]\\.|172\\.3[0-1]\\.)&amp;quot; | head -n1 | awk &amp;#39;{print $2}&amp;#39; | cut -d/ -f1\n    }\n\n    advertise_addr=&amp;quot;${ADVERTISE_ADDR:-$(get_private_ip)}&amp;quot;\n\n    if [ -z &amp;quot;$advertise_addr&amp;quot; ]; then\n        echo &amp;quot;ERROR: We couldn&amp;#39;t find a private IP address.&amp;quot;\n        echo &amp;quot;Please set the ADVERTISE_ADDR environment variable manually.&amp;quot;\n        echo &amp;quot;Example: export ADVERTISE_ADDR=192.168.1.100&amp;quot;\n        exit 1\n    fi\n    echo &amp;quot;Using advertise address: $advertise_addr&amp;quot;\n\n    # Allow custom Docker Swarm init arguments via DOCKER_SWARM_INIT_ARGS environment variable\n    # Example: export DOCKER_SWARM_INIT_ARGS=&amp;quot;--default-addr-pool 172.20.0.0/16 --default-addr-pool-mask-length 24&amp;quot;\n    # This is useful to avoid CIDR overlapping with cloud provider VPCs (e.g., AWS)\n    swarm_init_args=&amp;quot;${DOCKER_SWARM_INIT_ARGS:-}&amp;quot;\n    \n    if [ -n &amp;quot;$swarm_init_args&amp;quot; ]; then\n        echo &amp;quot;Using custom swarm init arguments: $swarm_init_args&amp;quot;\n        docker swarm init --advertise-addr $advertise_addr $swarm_init_args\n    else\n        docker swarm init --advertise-addr $advertise_addr\n    fi\n    \n     if [ $? -ne 0 ]; then\n        echo &amp;quot;Error: Failed to initialize Docker Swarm&amp;quot; &amp;gt;&amp;amp;2\n        exit 1\n    fi\n\n    echo &amp;quot;Swarm initialized&amp;quot;\n\n    docker network rm -f dokploy-network 2&amp;gt;/dev/null\n    docker network create --driver overlay --attachable dokploy-network\n\n    echo &amp;quot;Network created&amp;quot;\n\n    mkdir -p /etc/dokploy\n\n    chmod 777 /etc/dokploy\n\n    docker service create \\\n    --name dokploy-postgres \\\n    --constraint &amp;#39;node.role==manager&amp;#39; \\\n    --network dokploy-network \\\n    --env POSTGRES_USER=dokploy \\\n    --env POSTGRES_DB=dokploy \\\n    --env POSTGRES_PASSWORD=amukds4wi9001583845717ad2 \\\n    --mount type=volume,source=dokploy-postgres,target=/var/lib/postgresql/data \\\n    $endpoint_mode \\\n    postgres:16\n\n    docker service create \\\n    --name dokploy-redis \\\n    --constraint &amp;#39;node.role==manager&amp;#39; \\\n    --network dokploy-network \\\n    --mount type=volume,source=dokploy-redis,target=/data \\\n    $endpoint_mode \\\n    redis:7\n\n    # Installation\n    # Set RELEASE_TAG environment variable for canary/feature versions\n    release_tag_env=&amp;quot;&amp;quot;\n    if [ &amp;quot;$VERSION_TAG&amp;quot; != &amp;quot;latest&amp;quot; ]; then\n        release_tag_env=&amp;quot;-e RELEASE_TAG=$VERSION_TAG&amp;quot;\n    fi\n    \n    docker service create \\\n      --name dokploy \\\n      --replicas 1 \\\n      --network dokploy-network \\\n      --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock \\\n      --mount type=bind,source=/etc/dokploy,target=/etc/dokploy \\\n      --mount type=volume,source=dokploy,target=/root/.docker \\\n      --publish published=3000,target=3000,mode=host \\\n      --update-parallelism 1 \\\n      --update-order stop-first \\\n      --constraint &amp;#39;node.role == manager&amp;#39; \\\n      $endpoint_mode \\\n      $release_tag_env \\\n      -e ADVERTISE_ADDR=$advertise_addr \\\n      $DOCKER_IMAGE\n\n    sleep 4\n\n    docker run -d \\\n        --name dokploy-traefik \\\n        --restart always \\\n        -v /etc/dokploy/traefik/traefik.yml:/etc/traefik/traefik.yml \\\n        -v /etc/dokploy/traefik/dynamic:/etc/dokploy/traefik/dynamic \\\n        -v /var/run/docker.sock:/var/run/docker.sock:ro \\\n        -p 80:80/tcp \\\n        -p 443:443/tcp \\\n        -p 443:443/udp \\\n        traefik:v3.6.1\n    \n    docker network connect dokploy-network dokploy-traefik\n\n\n    # Optional: Use docker service create instead of docker run\n    #   docker service create \\\n    #     --name dokploy-traefik \\\n    #     --constraint &amp;#39;node.role==manager&amp;#39; \\\n    #     --network dokploy-network \\\n    #     --mount type=bind,source=/etc/dokploy/traefik/traefik.yml,target=/etc/traefik/traefik.yml \\\n    #     --mount type=bind,source=/etc/dokploy/traefik/dynamic,target=/etc/dokploy/traefik/dynamic \\\n    #     --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock \\\n    #     --publish mode=host,published=443,target=443 \\\n    #     --publish mode=host,published=80,target=80 \\\n    #     --publish mode=host,published=443,target=443,protocol=udp \\\n    #     traefik:v3.6.1\n\n    GREEN=&amp;quot;\\033[0;32m&amp;quot;\n    YELLOW=&amp;quot;\\033[1;33m&amp;quot;\n    BLUE=&amp;quot;\\033[0;34m&amp;quot;\n    NC=&amp;quot;\\033[0m&amp;quot; # No Color\n\n    format_ip_for_url() {\n        local ip=&amp;quot;$1&amp;quot;\n        if echo &amp;quot;$ip&amp;quot; | grep -q &amp;#39;:&amp;#39;; then\n            # IPv6\n            echo &amp;quot;[${ip}]&amp;quot;\n        else\n            # IPv4\n            echo &amp;quot;${ip}&amp;quot;\n        fi\n    }\n\n    public_ip=&amp;quot;${ADVERTISE_ADDR:-$(get_ip)}&amp;quot;\n    formatted_addr=$(format_ip_for_url &amp;quot;$public_ip&amp;quot;)\n    echo &amp;quot;&amp;quot;\n    printf &amp;quot;${GREEN}Congratulations, Dokploy is installed!${NC}\\n&amp;quot;\n    printf &amp;quot;${BLUE}Wait 15 seconds for the server to start${NC}\\n&amp;quot;\n    printf &amp;quot;${YELLOW}Please go to http://${formatted\\\\_addr}:3000${NC}\\n\\n&amp;quot;\n}\n\nupdate_dokploy() {\n    # Detect version tag\n    VERSION_TAG=$(detect_version)\n    DOCKER_IMAGE=&amp;quot;dokploy/dokploy:${VERSION_TAG}&amp;quot;\n    \n    echo &amp;quot;Updating Dokploy to version: ${VERSION_TAG}&amp;quot;\n    \n    # Pull the image\n    docker pull $DOCKER_IMAGE\n\n    # Update the service\n    docker service update --image $DOCKER_IMAGE dokploy\n\n    echo &amp;quot;Dokploy has been updated to version: ${VERSION_TAG}&amp;quot;\n}\n\n# Main script execution\nif [ &amp;quot;$1&amp;quot; = &amp;quot;update&amp;quot; ]; then\n    update_dokploy\nelse\n    install_dokploy\nfi\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;Что делает данный скрипт&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Определение версии для установки&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Проверяет переменную окружения DOKPLOY_VERSION&lt;br&gt;Если не указана — использует latest&lt;br&gt;Поддерживает версии: latest, canary, feature&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Проверка среды выполнения&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Определяет, запущен ли скрипт в Proxmox LXC-контейнере&lt;br&gt; Проверяет, запущен ли от root (если нет — выход с ошибкой)&lt;br&gt; Проверяет, что это Linux (не macOS)&lt;br&gt; Проверяет, что скрипт не запущен внутри Docker-контейнера&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Проверка занятости портов&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Порт 80 — должен быть свободен&lt;br&gt;Порт 443 — должен быть свободен&lt;br&gt;Порт 3000 — должен быть свободен (для веб-интерфейса Dokploy)&lt;/p&gt;\n&lt;p&gt;Если хоть один порт занят — установка прерывается&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Установка Docker&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Проверяет, установлен ли Docker&lt;br&gt;Если нет — устанавливает Docker версии 28.5.0 через официальный скрипт&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Инициализация Docker Swarm&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Принудительно выходит из существующего Swarm (если был)&lt;br&gt;Определяет IP-адрес сервера (приватный или публичный)&lt;br&gt;Инициализирует новый Docker Swarm кластер&lt;br&gt;Для LXC добавляет флаг --endpoint-mode dnsrr (для совместимости)&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Создание сети&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Удаляет старую сеть dokploy-network (если была)&lt;br&gt;Создаёт новую overlay-сеть dokploy-network для связи контейнеров&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Создание директории конфигурации&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Создаёт /etc/dokploy&lt;br&gt;Устанавливает права 777 (полный доступ)&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Запуск PostgreSQL&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Создаёт Docker-сервис dokploy-postgres&lt;br&gt;База данных: dokploy&lt;br&gt;Пользователь: dokploy&lt;br&gt;Пароль: amukds4wi9001583845717ad2 (захардкожен)&lt;br&gt;Данные хранятся в volume dokploy-postgres&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Запуск Redis&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Создаёт Docker-сервис dokploy-redis&lt;br&gt;Используется для кеширования и очередей&lt;br&gt;Данные хранятся в volume dokploy-redis&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Запуск основного сервиса Dokploy&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Монтирует Docker socket (для управления контейнерами)&lt;br&gt;Монтирует /etc/dokploy для конфигурации&lt;br&gt;Публикует порт 3000 для веб-интерфейса&lt;br&gt;Использует образ согласно выбранной версии&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Запуск Traefik (reverse proxy)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Запускает Traefik версии 3.6.1&lt;br&gt;Обрабатывает HTTP (порт 80) и HTTPS (порт 443)&lt;br&gt;Автоматически управляет маршрутизацией и SSL-сертификатами&lt;br&gt;Подключается к сети dokploy-network&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Завершение установки&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Определяет публичный IP-адрес сервера (IPv4 или IPv6)&lt;br&gt;Выводит сообщение об успешной установке&lt;br&gt;Показывает URL для доступа: http://[IP]:3000&lt;br&gt;Предупреждает подождать 15 секунд до запуска&lt;/p&gt;\n&lt;p&gt;Возможные ошибки при установке&lt;/p&gt;\n&lt;p&gt;bash: Cannot connect to the Docker daemon at unix:///var/run/docker.sock. Is the docker daemon running? Error: Failed to initialize Docker Swarm&lt;/p&gt;\n&lt;p&gt;Решается перезапуском Docker или перезагрузкой системы:&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;systemctl status docker&lt;/code&gt; проверка статуса&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;systemctl start docker&lt;/code&gt; запуск / перезапуск docker&lt;br&gt;&lt;img src=\&quot;/assets/dokploy3.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;как мы видим проблема исправилась.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;теперь можем запустить снова скрипт и посмотреть docker ps чтобы посмотреть какие контейнеры работают, какие работают на 0.0.0.0 (мб многие пользователи не хотят чтобы они были на 0.0.0.0, через скрипт будет по стандарту работать на 0.0.0.0 dokploy и traefik)&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy4.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;h2&gt;2 Часть. Обзор интерфейса и основных возможностей&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Сразу скажу что в статье рассмотрим только основные функции которые в большинстве случаев используется.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy5.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Впервые при заходе в Dokploy вы устанавливаете вход: Setup the server&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy6.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;После setup&amp;#39;а вы попадаете в сам уже dokploy&lt;/em&gt;&lt;/p&gt;\n&lt;h3&gt;Кастомизация&lt;/h3&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy7.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;p&gt;смена темы&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;язык dokploy GUI (Не все будут нормально сделаны. т.е тот же Русский вариант частично есть, где-то английский в основном где-то на Русском.)&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy8.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Можно изменить фавикон, имя организации и добавить новую организацию / сервер.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy9.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Web Server&lt;/em&gt;&lt;/p&gt;\n&lt;h3&gt;Раздел Web Server в Dokploy&lt;/h3&gt;\n&lt;p&gt;На странице &lt;strong&gt;Web Server&lt;/strong&gt; в настройках Dokploy можно управлять основными параметрами сервера и системой. Рассмотрим доступные функции:&lt;/p&gt;\n&lt;h1&gt;1. Домен сервера&lt;/h1&gt;\n&lt;p&gt;Здесь настраивается домен для панели управления Dokploy:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Домен&lt;/strong&gt; — указываете доменное имя (например, &lt;code&gt;dokploy.com&lt;/code&gt;)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Email для Let&amp;#39;s Encrypt&lt;/strong&gt; — email для автоматического получения SSL-сертификатов&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;HTTPS&lt;/strong&gt; — переключатель для автоматической выдачи SSL-сертификата через Let&amp;#39;s Encrypt&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;После настройки нажмите &lt;strong&gt;&amp;quot;Сохранить&amp;quot;&lt;/strong&gt;, и панель будет доступна по вашему домену с HTTPS.&lt;/p&gt;\n&lt;h1&gt;2. Веб-сервер (Server)&lt;/h1&gt;\n&lt;p&gt;В этом блоке показана информация о сервере и доступны действия по управлению:&lt;/p&gt;\n&lt;h1&gt;Информация о сервере:&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Server IP&lt;/strong&gt; — IP-адрес вашего сервера&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Version&lt;/strong&gt; — текущая версия Dokploy (например, v0.26.3)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Daily Docker Cleanup&lt;/strong&gt; — автоматическая ежедневная очистка неиспользуемых Docker-ресурсов&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Действия с сервером:&lt;/h1&gt;\n&lt;p&gt;&lt;strong&gt;Меню &amp;quot;Сервер&amp;quot;:&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Перезагрузить&lt;/strong&gt; — перезапуск сервера Dokploy&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Открыть терминал&lt;/strong&gt; — доступ к консоли сервера прямо из веб-интерфейса&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Просмотр логов&lt;/strong&gt; — просмотр логов работы Dokploy&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;GPU Setup&lt;/strong&gt; — настройка GPU (если используете машинное обучение или рендеринг)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Изменить IP адрес&lt;/strong&gt; — смена IP-адреса сервера&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Clean Redis&lt;/strong&gt; — очистка кеша Redis&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Reload Redis&lt;/strong&gt; — перезагрузка Redis&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Дисковое пространство:&lt;/h1&gt;\n&lt;p&gt;&lt;strong&gt;Действия:&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Очистить неиспользуемые образы&lt;/strong&gt; — удаление Docker-образов, которые больше не используются&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Очистить неиспользуемые тома&lt;/strong&gt; — удаление Docker volumes без привязки к контейнерам&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Очистить остановленные контейнеры&lt;/strong&gt; — удаление всех остановленных контейнеров&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Очистить Docker Builder и систему&lt;/strong&gt; — глубокая очистка системы сборки Docker&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Очистить мониторинг&lt;/strong&gt; — удаление данных мониторинга&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Очистить всё&lt;/strong&gt; — полная очистка всех неиспользуемых ресурсов&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2&gt;3. Traefik (Reverse Proxy)&lt;/h2&gt;\n&lt;p&gt;Traefik — это reverse proxy, который автоматически управляет маршрутизацией трафика к вашим приложениям.&lt;/p&gt;\n&lt;h1&gt;Действия:&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Перезагрузить&lt;/strong&gt; — перезапуск Traefik&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Просмотр логов&lt;/strong&gt; — логи работы Traefik (полезно для диагностики проблем с доменами)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Изменить переменные окружения&lt;/strong&gt; — настройка дополнительных параметров Traefik&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Enable Dashboard&lt;/strong&gt; — включение веб-панели Traefik для мониторинга маршрутов&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Назначение портов&lt;/strong&gt; — управление портами для HTTP/HTTPS&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Кнопка &amp;quot;Check for updates&amp;quot;:&lt;/h1&gt;\n&lt;p&gt;Проверка доступных обновлений для Traefik.&lt;/p&gt;\n&lt;h1&gt;4. Backups&lt;/h1&gt;\n&lt;p&gt;Блок для настройки резервного копирования базы данных Dokploy на внешние хранилища (S3, Google Cloud, и т.д.).&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy10.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Profile&lt;/em&gt;&lt;/p&gt;\n&lt;h3&gt;Раздел Profile в Dokploy&lt;/h3&gt;\n&lt;p&gt;На странице &lt;strong&gt;Profile&lt;/strong&gt; настраивается профиль пользователя и управление API-ключами для доступа к Dokploy через API/CLI.&lt;/p&gt;\n&lt;h1&gt;1. Аккаунт&lt;/h1&gt;\n&lt;p&gt;Здесь можно изменить данные профиля администратора:&lt;/p&gt;\n&lt;h1&gt;Поля для заполнения:&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;First Name&lt;/strong&gt; — Имя пользователя&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Last Name&lt;/strong&gt; — Фамилия пользователя&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Email&lt;/strong&gt; — Email-адрес аккаунта&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Current Password&lt;/strong&gt; — Текущий пароль (для подтверждения изменений)&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Пароль&lt;/strong&gt; — Новый пароль (если хотите изменить)&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Аватар:&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;Можно выбрать аватар из предустановленных изображений&lt;/li&gt;\n&lt;li&gt;Кнопка &lt;strong&gt;&amp;quot;+&amp;quot;&lt;/strong&gt; позволяет загрузить собственное изображение&lt;/li&gt;\n&lt;li&gt;Первая иконка с буквами (TT) — это аватар по умолчанию с инициалами&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Двухфакторная аутентификация:&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;Кнопка &lt;strong&gt;&amp;quot;Enable 2FA&amp;quot;&lt;/strong&gt; — включение двухфакторной аутентификации для дополнительной защиты аккаунта&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;После внесения изменений нажмите &lt;strong&gt;&amp;quot;Сохранить&amp;quot;&lt;/strong&gt;.&lt;/p&gt;\n&lt;h1&gt;2. API/CLI Keys&lt;/h1&gt;\n&lt;p&gt;Этот раздел позволяет создавать и управлять API-ключами для доступа к Dokploy через API или командную строку (CLI).&lt;/p&gt;\n&lt;h1&gt;Что это даёт?&lt;/h1&gt;\n&lt;p&gt;API-ключи используются для:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Автоматизации деплоя через CI/CD (GitHub Actions, GitLab CI и т.д.)&lt;/li&gt;\n&lt;li&gt;Управления проектами через терминал&lt;/li&gt;\n&lt;li&gt;Интеграции Dokploy с другими сервисами&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Интерфейс:&lt;/h1&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Swagger API: View&lt;/strong&gt; — ссылка на документацию API (Swagger UI), где можно посмотреть все доступные эндпоинты и протестировать запросы&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;No API keys found&lt;/strong&gt; — пока API-ключей нет&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Generate New Key&lt;/strong&gt; — кнопка для создания нового API-ключа&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Как использовать:&lt;/h1&gt;\n&lt;ol&gt;\n&lt;li&gt;Нажмите &lt;strong&gt;&amp;quot;Generate New Key&amp;quot;&lt;/strong&gt;&lt;/li&gt;\n&lt;li&gt;Скопируйте созданный ключ (он будет показан только один раз!)&lt;/li&gt;\n&lt;li&gt;Используйте ключ в запросах к API или в настройках CLI&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy11.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;h3&gt;Раздел Git в Dokploy&lt;/h3&gt;\n&lt;p&gt;На странице &lt;strong&gt;Git&lt;/strong&gt; настраивается интеграция с Git-провайдерами для автоматического деплоя приложений из репозиториев.&lt;/p&gt;\n&lt;h1&gt;Git Providers&lt;/h1&gt;\n&lt;p&gt;&lt;strong&gt;Описание:&lt;/strong&gt; &amp;quot;Connect your Git provider for authentication&amp;quot; — подключите ваш Git-провайдер для аутентификации и автоматического деплоя проектов.&lt;/p&gt;\n&lt;h1&gt;Поддерживаемые Git-провайдеры:&lt;/h1&gt;\n&lt;p&gt;Dokploy поддерживает интеграцию с четырьмя основными платформами:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;GitHub&lt;/strong&gt; (чёрная кнопка)&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Самый популярный Git-хостинг&lt;/li&gt;\n&lt;li&gt;Позволяет деплоить проекты прямо из GitHub-репозиториев&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;GitLab&lt;/strong&gt; (фиолетовая кнопка)&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Альтернатива GitHub с встроенным CI/CD&lt;/li&gt;\n&lt;li&gt;Поддержка как публичных, так и self-hosted инстансов&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;Bitbucket&lt;/strong&gt; (синяя кнопка)&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Git-платформа от Atlassian&lt;/li&gt;\n&lt;li&gt;Популярна в корпоративной среде&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;p&gt;&lt;strong&gt;Gitea&lt;/strong&gt; (зелёная кнопка)&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Легковесный self-hosted Git-сервис&lt;/li&gt;\n&lt;li&gt;Идеален для приватных серверов&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h1&gt;Как это работает?&lt;/h1&gt;\n&lt;p&gt;После подключения Git-провайдера:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Автоматическая авторизация&lt;/strong&gt; — Dokploy получает доступ к вашим репозиториям&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Выбор репозитория&lt;/strong&gt; — при создании проекта вы сможете выбрать репозиторий из списка&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Автодеплой&lt;/strong&gt; — при каждом push в выбранную ветку Dokploy автоматически пересобирает и деплоит приложение&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Webhook-интеграция&lt;/strong&gt; — Dokploy создаёт webhook для отслеживания изменений в репозитории&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h1&gt;Зачем это нужно?&lt;/h1&gt;\n&lt;p&gt;Интеграция с Git-провайдерами позволяет:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Деплоить приложения одним кликом из интерфейса&lt;/li&gt;\n&lt;li&gt;Настроить CI/CD без дополнительных инструментов&lt;/li&gt;\n&lt;li&gt;Автоматически обновлять приложение при изменениях в коде&lt;/li&gt;\n&lt;li&gt;Управлять версиями через Git-теги и ветки&lt;/li&gt;\n&lt;li&gt;Откатываться на предыдущие версии через интерфейс&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h1&gt;Как подключить?&lt;/h1&gt;\n&lt;ol&gt;\n&lt;li&gt;Нажмите на кнопку нужного провайдера (например, &lt;strong&gt;GitHub&lt;/strong&gt;)&lt;/li&gt;\n&lt;li&gt;Авторизуйтесь через OAuth (вас перенаправит на страницу авторизации)&lt;/li&gt;\n&lt;li&gt;Разрешите Dokploy доступ к репозиториям&lt;/li&gt;\n&lt;li&gt;После подключения провайдер появится в списке на этой странице&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;strong&gt;И МНОГО ЧЕГО ПОЛЕЗНОГО!&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy12.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Мониторинг (Redis)&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;Дальше рекомендую изучить остальные функции самостоятельно а мы переходим к самому необходимому - &lt;strong&gt;к деплою.&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy13.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;h2&gt;3 Часть. Деплой приложений. Какие можно?&lt;/h2&gt;\n&lt;p&gt;в основном в работе я использовал его как деплой docker контейнеров, но по вашему усмотрению вы можете задеплоить и github проекты( к примеру какой нибудь сайт ваш). &lt;/p&gt;\n&lt;p&gt;чтобы что то создать: Для этого вы нажимаете Create Project в секции Projects&lt;br&gt;&lt;img src=\&quot;/assets/dokploy14.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy15.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;пишите имя и описание(необязательно) и нажимаете Create&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy16.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;результат&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;Далее в зависимости от необходимости вы можете настроить &lt;strong&gt;Environments&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Рассмотрим создание сервиса.&lt;/strong&gt;&lt;br&gt;&lt;img src=\&quot;/assets/dokploy17.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Application - ваши приложения ( к примеру из гитхаб сайт ) &lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy18.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;Application - обзор функций и варианты сборок видны на скриншоте&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;Templates - готовые конфиги докер для быстрого развертывания сервисов.&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy19.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;выбор шаблонов докер&lt;/em&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;ВНИМАНИЕ: Не так давно шаблоны перестали работать по неизвестной причине(возможная причина это блокировки тк с впн у меня все ок работает.) Решение: &lt;a href=\&quot;https://templates.dokploy.com/\&quot;&gt;https://templates.dokploy.com/&lt;/a&gt; - это теже шаблоны просто в онлайн версии.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy20.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;ошибка с загрузкой шаблонов&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;Database - создаются БД под ваши настройки.&lt;br&gt;&lt;img src=\&quot;/assets/dokploy21.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;h3&gt;Эксперимент - пробуем поставить n8n.&lt;/h3&gt;\n&lt;p&gt;n8n (произносится «нэйтн») — это платформа с открытым исходным кодом для автоматизации рабочих процессов и интеграции разных приложений и сервисов без необходимости писать код (low-code/no-code). Она работает как визуальный конструктор, где вы соединяете блоки (узлы) для создания цепочек действий: когда что-то происходит в одном сервисе, n8n автоматически выполняет заданные задачи в других. Инструмент используется для автоматизации рутинных операций, создания сложных интеграций между CRM, мессенджерами, базами данных и другими системами, а также для внедрения ИИ-функций. &lt;/p&gt;\n&lt;p&gt;Выбираем Compose&lt;br&gt;&lt;img src=\&quot;/assets/dokploy22.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;создаем композ&lt;br&gt;&lt;img src=\&quot;/assets/dokploy23.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;После создания, заходим в созданный раздел и выбираем raw.&lt;br&gt;&lt;img src=\&quot;/assets/dokploy24.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Переходим на сайт (либо в шаблоны быстрое разворачиваем) и выбираем нужный стек с n8n, мне он нужен без БД поэтому я выбираю первый.&lt;br&gt;&lt;img src=\&quot;/assets/dokploy25.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;копируем конфиг и вставляем его в raw и нажимаем на save&lt;br&gt;&lt;img src=\&quot;/assets/dokploy26.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;p&gt;Переходим в Environment Settings и добавляем &lt;/p&gt;\n&lt;p&gt;N8N_HOST=your-domain.com  &lt;em&gt;или просто IP, если нет домена:&lt;/em&gt;&lt;br&gt;N8N_PORT=5678&lt;br&gt;GENERIC_TIMEZONE=Europe/Moscow&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy27.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;возвращаемся в General и нажимаем Deploy&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy28.png\&quot; alt=\&quot;\&quot;&gt;&lt;br&gt;&lt;em&gt;логи n8n установки&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;вас потом перекинет возможно в логи - там вы смотрите успешно ли все запустилось или нет.&lt;/p&gt;\n&lt;p&gt;После успешной установки можем проверить и зайти что n8n работает: &lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;я менял немного под себя композ тк хотел поставить локально, если кому надо вот:&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;pre&gt;&lt;code&gt;services:\n  n8n:\n    image: docker.n8n.io/n8nio/n8n:1.104.0\n    restart: always\n    ports:\n      - &amp;quot;${N8N_PORT}:5678&amp;quot;\n    environment:\n      - N8N_HOST=${N8N_HOST}\n      - N8N_PORT=5678\n      - N8N_PROTOCOL=http\n      - NODE_ENV=production\n      - WEBHOOK_URL=http://${N8N_HOST}:${N8N_PORT}/\n      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}\n      - N8N_SECURE_COOKIE=false\n    volumes:\n      - n8n_data:/home/node/.n8n\n\nvolumes:\n  n8n_data:\n&lt;/code&gt;&lt;/pre&gt;\n&lt;pre&gt;&lt;code&gt;N8N_HOST=localhost\nN8N_PORT=5678\nGENERIC_TIMEZONE=Europe/Moscow\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2&gt;4 Часть. Мнение и плюсы и минусы проекта.&lt;/h2&gt;\n&lt;p&gt;Сравнение с Coolify&lt;/p&gt;\n&lt;p&gt;По функциям Dokploy и Coolify практически не отличаются, разве что Dokploy больше ориентирован на команды, поэтому некоторые функции могут показаться избыточными для соло-энтузиастов. Ниже — официальное сравнение от Dokploy docs:&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&quot;/assets/dokploy29.png\&quot; alt=\&quot;\&quot;&gt;&lt;/p&gt;\n&lt;h2&gt;Плюсы и минусы Dokploy&lt;/h2&gt;\n&lt;p&gt;Я пользовался платформой полгода-год, и вот что могу сказать:&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;✅ Плюсы&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Оптимизация ресурсов — главное преимущество&lt;/strong&gt;&lt;br&gt;Несмотря на мелкие недочёты (например, неполные переводы на некоторые языки), по сравнению с Coolify и другими аналогами Dokploy потребляет гораздо меньше ресурсов. Нет аномальных нагрузок, когда процессор нагружается на 100% в простое — такие моменты встречались у пользователей Coolify.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Современный интерфейс&lt;/strong&gt;&lt;br&gt; Это субъективно, но проект использует shadcn/ui компоненты. Тем, кто не знаком, рекомендую посмотреть мою прошлую статью: &amp;quot;Вайбкодерам и веб-разработчикам на заметку! Список сайтов с готовыми React UI-компонентами&amp;quot;. (плюс ставится за выбор хорошей легкой библиотеки)&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Покрывает все потребности&lt;/strong&gt;&lt;br&gt; Я в основном работаю с Docker-контейнерами, сайтами и GitHub-проектами. Когда понадобилось быстро развернуть сайт локально, а затем выкатить в интернет — Dokploy справился на ура.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;❌ Минусы&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;&amp;quot;Специфические&amp;quot; интеграции&lt;/strong&gt;&lt;br&gt; Не рекомендую использовать Dokploy, если у вас другой reverse proxy (не Traefik). Часть функций просто не будет работать, и придётся писать собственные скрипты или compose-файлы под ваш прокси.&lt;/p&gt;\n&lt;p&gt;У меня был случай, когда понадобился модифицированный Nginx Proxy Manager, и после его установки пришлось делать много ручной работы.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Что хотелось бы улучшить:&lt;/strong&gt;&lt;br&gt; Идеально было бы добавить в Dokploy возможность переключать reverse proxy по кнопке (Traefik, Nginx, Caddy и т.д.). Тогда это была бы лучшая платформа для деплоя, которую я когда-либо видел.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Проблемы с шаблонами?&lt;/strong&gt;&lt;br&gt; Я бы не стал записывать это в минусы, так как это не проблема самого проекта.&lt;/p&gt;\n&lt;p&gt;Не особо критичные и мелкие ошибки по типу перевода платформы под свой язык.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Итоговая оценка 8/10&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Проект очень классный и останется пока в моем топе-1 на данный момент как платформа для развертывания проектов.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Рекомендация для читателей и тем кому нужно больше информации:&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://github.com/Dokploy/dokploy\&quot;&gt;https://github.com/Dokploy/dokploy&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://docs.dokploy.com/\&quot;&gt;https://docs.dokploy.com/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://templates.dokploy.com/\&quot;&gt;https://templates.dokploy.com/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https://dokploy.com/\&quot;&gt;https://dokploy.com/&lt;/a&gt;&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Инструменты и Сервисы&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;tools-and-services&quot;],&quot;title&quot;:[0,&quot;Инструменты и Сервисы&quot;],&quot;icon&quot;:[0,&quot;signal&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-01-13&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;docker&quot;],[0,&quot;инструменты&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;dokploy, docker деплой, self-hosted платформа, альтернатива heroku, coolify vs dokploy, автоматический деплой, traefik, docker swarm&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;container&quot;],&quot;priority&quot;:[0,999],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Обзор Dokploy: удобная платформа для деплоя Docker-контейнеров и GitHub-проектов&quot;],&quot;description&quot;:[0,&quot;В этой статье мы разберём Dokploy — open-source платформу для деплоя приложений. Узнаем, какие задачи она решает, какие функции предлагает и чем отличается от популярного конкурента Coolify.&quot;],&quot;date&quot;:[0,&quot;2026-01-13&quot;],&quot;tags&quot;:[0,&quot;docker, инструменты&quot;],&quot;keywords&quot;:[0,&quot;dokploy, docker деплой, self-hosted платформа, альтернатива heroku, coolify vs dokploy, автоматический деплой, traefik, docker swarm&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;lang&quot;:[0,&quot;ru&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island> <!-- Re-apply theme after SPA navigation --> <script>
