<p>Продолжаем серию о Linux. В прошлой части разбирали права доступа и теперь переходим к одной из самых важных тем в Linux — процессам. Любая программа в системе в конечном итоге существует как процесс: nginx, postgres, docker, sshd, systemd, ваш shell и даже потоки ядра. Понимание того, как процессы создаются, живут, взаимодействуют с ядром и завершаются это база для понимания и диагностики Linux-систем. Цель этой статьи, рассказать кратко и на простом языке всю нужную информацию для начинающих так и для опытных пользователей и админов освежить их знания. Важно: для практики если обучаетесь то лучше всего использовать виртуалку с Linux.</p>
<blockquote>
<p>Серия в основном под Ubuntu/Debian.</p>
</blockquote>
<h2>2. Что такое процесс и поток</h2>
<p><strong>Процесс</strong> — это запущенная программа. Когда вы запускаете контейнер <code>nginx</code> или <code>python app.py</code> или браузер, ядро Linux создаёт процесс: выделяет ему память, даёт номер (PID), и начинает его выполнять. Пока программа не запущена это программный файл, отличается он только наличием доступа x (т. е. возможности исполнения), но как только вы его запускаете, он становится процессом, под управлением ядра Linux. Про <strong>поток (thread)</strong> достаточно запомнить что это задача внутри процесса, разделяющая с ним адресное пространство и файловые дескрипторы. В ядре представлен той же <code>task_struct</code>, что и процесс, но с флагами CLONE_VM / CLONE_FILES / CLONE_SIGHAND. В утилитах (ps, htop) отображаются как LWP (Light Weight Process) с общим PID и уникальным TID. Сбой в одном потоке затрагивает весь процесс.</p>
<p>У каждого процесса есть своё окружение — набор ресурсов и атрибутов, которые ядро выделяет при создании:</p>
<ol>
<li>Виртуальная память, где у процесса своё адресное пространство. Он не видит и не может напрямую изменить память другого процесса. </li>
<li>Таблица открытых файлов, через неё процесс работает с файлами, сокетами, пайпами и др. По умолчанию открыты 3 дескриптора (stdin), 1 (stdout), 2 (stderr). В остальном процесс открывается сам по ситуации.</li>
<li>Каталог (cwd), директория, в которой процесс сейчас находится, от неё отсчитываются все относительные пути.</li>
<li>Переменные окружения, набор пар ключей (или по-другому KEY=VALUE), которые процесс получил от родителя. Через них передают конфиги: PATH, HOME, LANG и другие (к примеру иногда чувств. данные (токены, пароли). Меняются до запуска процесса, внутри только если процесс сам их перезапишет.</li>
<li>UID / GID, идентификаторы пользователя и группы, от имени которых запущен процесс. По ним идет проверка прав: может ли процесс прочитать файл, открыть порт, выполнить какую-то операцию и т. д.</li>
<li>Код возврата, целое число 0–255, которое процесс возвращает при завершении: 0 = успех, 1–255 = ошибка. Сохраняется в ядре до тех пор, пока родитель не считает его через команду <code>wait()</code> / <code>waitpid()</code>. Если родитель не забирает код = процесс остаётся зомби до очистки</li>
</ol>
<h2>3. Жизненный цикл: рождение и смерть</h2>
<p>Как рождается процесс: в Linux новый процесс создаётся клонированием существующего через команды fork() и exec(). fork() создаёт точную копию родителя с новым PID, а exec() заменяет её память на код новой программы, сохраняя PID и наследуя ресурсы.</p>
<p>Что наследует дочерний процесс: открытые файловые дескрипторы, переменные окружения, текущий каталог, UID/GID, обработчики сигналов.<br>Не наследует: PID, очередь сигналов и статистику выполнения.</p>
<p>Как умирает процесс: процесс вызывает exit() (т. е. мы сообщаем ядру информацию о том что программа внутри процесса завершила все свои действия), ну и соответственно освобождаются ресурсы (файлы/память/сокеты), процесс переходит в состояние зомби (Z), ядро отправляет родителю сигнал (SIGCHLD), родитель вызывает wait() и забирает код возврата = зомби удаляется. Если родитель завершается раньше, то дочерний процесс усыновляется systemd (PID 1), который сам выполнит wait() при его завершении.</p>
<p>Когда зомби становится проблемным: по ситуации, несколько зомби, к примеру, это норма, если они живут миллисекунды пока родитель не вызовет wait(). Проблема основная возникает когда он его не вызывает никогда, из-за чего будет накопление зомби, pid-пространство и т. д. — система в итоге перестаёт создавать новые процессы.</p>
<p>В качестве примеров команды: </p>
<pre><code class="language-bash"># Найти зомби
ps aux | awk &#39;$8 == &quot;Z&quot;&#39;

# Найти родителя зомби и «напомнить» ему убраться
kill -CHLD &lt;PPID зомби&gt;

# Если родитель мёртво завис — убить его (дети усыновятся systemd)
kill -TERM &lt;PPID&gt;
</code></pre>
<h2>4. Состояния процесса</h2>
<p>Каждый процесс находится в одном из состояний, отображаемых в колонке <code>STAT</code> (<code>ps aux</code>).</p>
<p><strong>Основные состояния:</strong></p>
<table>
<thead>
<tr>
<th>Символ</th>
<th>Название</th>
<th>Описание</th>
</tr>
</thead>
<tbody><tr>
<td>R</td>
<td>Running</td>
<td>Выполняется или в очереди на CPU.</td>
</tr>
<tr>
<td>S</td>
<td>Sleeping</td>
<td>Прерываемое ожидание (ввод, сеть, таймер). Реагирует на сигналы.</td>
</tr>
<tr>
<td>D</td>
<td>Uninterruptible sleep</td>
<td>Ожидание I/O, который не прерывается сигналами.</td>
</tr>
<tr>
<td>T</td>
<td>Stopped</td>
<td>Процесс приостановлен сигналом SIGSTOP или SIGTSTP (Ctrl+Z). Не выполняется и не потребляет CPU. Можно возобновить через SIGCONT.</td>
</tr>
<tr>
<td>Z</td>
<td>Zombie</td>
<td>Завершён, но родитель не забрал код возврата через wait()</td>
</tr>
<tr>
<td>I</td>
<td>Idle</td>
<td>Неактивный поток ядра</td>
</tr>
</tbody></table>
<p><strong>Модификаторы состояния:</strong> </p>
<ol>
<li><code>&lt;</code> — высокий приоритет</li>
<li><code>N</code> — низкий приоритет</li>
<li><code>s</code> — лидер сессии</li>
<li><code>l</code> — многопоточный</li>
<li><code>+</code> — на переднем плане</li>
</ol>
<p>Пример: <code>Ssl</code> — спит, лидер сессии, многопоточный.</p>
<h2>5. Идентификаторы: PID, PPID, UID и другие</h2>
<p>PID (Process ID) — уникальный номер процесса, который назначает ядро. Не повторяется, пока не исчерпается диапазон.</p>
<p>PPID (Parent PID) — PID процесса, который создал данный. Каждый процесс (кроме systemd) имеет ровно 1 родителя. При завершении родителя его дочерние процессы переходят под управление systemd (PID 1).</p>
<pre><code class="language-bash"># Посмотреть PID/PPID/Имя процесса
ps -ef | head -10

# Дерево процессов (наглядная иерархия. Рекомедую посмотреть данный пример)
pstree -p

# Максимальный PID в системе 
cat /proc/sys/kernel/pid_max
</code></pre>
<p><strong>Особые процессы:</strong> PID 1 и PID 2, эти процессы создаются ядром сразу после загрузки. Они не запускаются пользователем и не появляются через команды как обычные программы. Про PID 1 уже несколько раз упомянули, но всё же стоит отдельно вынести в терминологию.</p>
<p>PID 1 (systemd) — 1-ый процесс в пользовательском пространстве. От него ведут начало все остальные процессы от сессий до демонов, если процесс теряет родителя — PID 1 его усыновляет, забирая коды возврата завершившихся процессов, предотвращая накопление зомби. Убить их нельзя, в основном можно завершить/убить их через перезагрузку системы.</p>
<p>PID 2 (kthreadd) — прародитель всех потоков ядра. От него создаются системные воркеры (к примеру kworker). В ps и htop их видно по квадратным скобкам [kworker/0:0]. Эти процессы работают в пространстве ядра и отвечают за фоновые задачи, такие как обработку прерываний, работу с диском итд.</p>
<pre><code class="language-bash"># Увидеть иерархию от systemd
pstree -p | head -20

# Посмотреть потоки ядра (в квадратных скобках)
ps -eo pid,comm | grep &#39;\[&#39;

# Проверить родителя у любого процесса
ps -o pid,ppid,comm -p &lt;PID&gt;
</code></pre>
<h2>6. Сигналы</h2>
<p>Сигнал — это асинхронное уведомление процессу от ядра или другого процесса. Процесс может поймать сигнал, проигнорировать его или выполнить действие по умолчанию.</p>
<h3>Главные сигналы</h3>
<table>
<thead>
<tr>
<th>Сигнал</th>
<th>Номер</th>
<th>По умолчанию</th>
<th>Когда использовать</th>
</tr>
</thead>
<tbody><tr>
<td>SIGTERM</td>
<td>15</td>
<td>Завершить</td>
<td>Первый выбор для остановки, процесс может перехватить и завершиться корректно: сохранить данные, закрыть соединения.</td>
</tr>
<tr>
<td>SIGKILL</td>
<td>9</td>
<td>Убить</td>
<td>Крайняя мера. Процесс не успевает сохранить состояние</td>
</tr>
<tr>
<td>SIGHUP</td>
<td>1</td>
<td>Завершить</td>
<td>Для демонов (перечитывать к примеру конфиг nginx без перезапуска)</td>
</tr>
<tr>
<td>SIGINT</td>
<td>2</td>
<td>Завершить</td>
<td>Прерывание (Ctrl+C)</td>
</tr>
<tr>
<td>SIGCONT</td>
<td>18</td>
<td>Приостановить/Продолжить</td>
<td>Возобновить приостановленный процесс</td>
</tr>
<tr>
<td>SIGCHLD</td>
<td>17</td>
<td>Игнорировать</td>
<td>Уведомление родителю о завершении дочернего процесса</td>
</tr>
<tr>
<td>SIGSTOP</td>
<td>19</td>
<td>Остановить</td>
<td>Приостановить процесс</td>
</tr>
</tbody></table>
<p>Наверное появится вопрос &quot;почему SIGKILL это крайняя мера?&quot; Потому что процесс не успеет сделать свои нужды.(сохранить данные/записать файлы итд). Поэтому сначала пробуйте SIGTERM.</p>
<p><strong>Что процесс может сделать с сигналом?</strong> Поймать, игнорировать, принять действие по умолчанию. Это означает следующие:</p>
<ol>
<li>Поймать, значит выполнить свой обработчик (например, nginx перечитывает конфиг на SIGHUP)</li>
<li>Игнорировать (ну тут и так понятно)</li>
<li>Принять действие по умолчанию, обычное завершение.</li>
</ol>
<p>Стоит ещё отметить что поймать или проигнорировать SIGKILL и SIGSTOP нельзя, т. к. они всегда обрабатываются ядром.</p>
<p>Примеры как отправить сигнал и завершить процесс.</p>
<pre><code class="language-bash"># По PID
kill -TERM 1234
kill -9 1234           # то же что kill -KILL

# По имени процесса
pkill -TERM nginx
pkill -HUP sshd        # перечитать конфиг

# По полной командной строке
pkill -f &quot;python app.py&quot;

# Всей группе процессов (минус перед номером)
kill -TERM -&lt;PGID&gt;

# Проверить, жив ли процесс (без отправки сигнала)
kill -0 1234 &amp;&amp; echo &quot;жив&quot; || echo &quot;мёртв&quot;
</code></pre>
<pre><code class="language-bash">PID=1234
TIMEOUT=30

# Шаг 1: попросить завершиться
kill -TERM &quot;$PID&quot;

# Шаг 2: подождать
for i in $(seq 1 $TIMEOUT); do
    kill -0 &quot;$PID&quot; 2&gt;/dev/null || { echo &quot;завершился за ${i}с&quot;; exit 0; }
    sleep 1
done

# Шаг 3: если не вышел — убиваем
echo &quot;не завершился за ${TIMEOUT}с, применяем SIGKILL&quot;
kill -KILL &quot;$PID&quot;
</code></pre>
<h2>7. /proc — заглянуть внутрь любого процесса</h2>
<p>Виртуальная файловая система (/proc) — это интерфейс, через который ядро отдаёт информацию о процессах и системе. Файлы здесь не занимают место на диске: когда делаем, к примеру, cat /proc/1234/status, ядро прямо в этот момент формирует текстовый ответ и отдаёт его вам. Здесь лежат данные обо всём: какие процессы запущены, сколько памяти используется и т. д.</p>
<p><strong>Главные файлы /proc/&lt;PID&gt; и другие примеры</strong></p>
<pre><code class="language-bash"># 1. cmdline: командная строка запуска
cat /proc/1/cmdline | tr &#39;\0&#39; &#39; &#39;

# 2. exe: показывает, какой файл запущен. Если обновили пакет, а процесс не перезагрузили — будет (deleted, означает что этот процесс был запущен, которого больше нет на диске.) 
ls -la /proc/1/exe

# 3. cwd: текущий рабочий каталог процесса.
ls -la /proc/1/cwd

# 4. environ: переменные окружения
tr &#39;\0&#39; &#39;\n&#39; &lt;/proc/1/environ

# 5. status: состояние/память/UID/сигналы.
cat /proc/1/status 
# или с выбором нужных строк
cat /proc/1/status | grep -E &quot;Name|State|Uid|VmRSS|Threads&quot;

# 6. wchan: на каком системном вызове процесс ждёт / завис
cat /proc/1/wchan

# 7. stack: стек ядра (требует рут)
sudo cat /proc/1/stack
</code></pre>
<p><strong>Файловые дескрипторы</strong></p>
<pre><code class="language-bash"># 1. список открытых дескрипторов
ls -la /proc/1/fd/

# 2. сколько открыто
ls /proc/1/fd | wc -l

# 3. сравнить с лимитом
cat /proc/1/limits | grep &quot;open files&quot;
</code></pre>
<blockquote>
<p>если числов fd близко к лимиту, возможно утечка. Частая причина: too many open files</p>
</blockquote>
<p><strong>Память и I/O</strong></p>
<pre><code class="language-bash"># 1. Потребление памяти
cat /proc/1/status | grep -E &quot;VmRSS|VmSize|VmSwap&quot;

#2. Статистика ввода-вывода
cat /proc/1/io
</code></pre>
<blockquote>
<p>VmRSS (Resident Set Size) показатель реального потребления памяти. Разница между <code>rchar</code> и <code>read_bytes</code> показывает насколько эффективен page cache для этого процесса.</p>
</blockquote>
<h2>8. Планировщик и приоритеты</h2>
<p>Linux делит время CPU между процессами через планировщик CFS (Completely Fair Scheduler). Планировщик решает кто получает ресурсы и на сколько.</p>
<p><strong>Nice: что это и как работает?</strong></p>
<p>Nice — это атрибут процесса, и утилита для его изменения.</p>
<p><strong>Как атрибут:</strong> число от -20 до +19, которое хранится в ядре для каждого процесса. По умолчанию стоит 0, но чем меньше значение — тем выше приоритет.<br><strong>Как утилита:</strong> nice запускает команду с заданным приоритетом, renice меняет приоритет уже работающего процесса.</p>
<h3>Правила Nice и Политика Планировщика</h3>
<p>Правила Nice основные довольно простые, уменьшать nice (что означает повышать приоритет) может только root, обычный пользователь может только увеличивать (т. е. снижать приоритет): с 0 до 10 = можно, с 0 до -5 = нельзя. Отмечу что nice влияет только на распределение процессорного времени. Он не даёт гарантий, не резервирует CPU и не работает для real-time задач.</p>
<p><strong>Примеры использования nice</strong></p>
<pre><code class="language-bash"># 1. Запуск команды с низким приоритетом (не будет мешать другим)
nice -n 15 rsync -av /data /backup

# 2. Запустить с высоким приоритетом (root)
sudo nice -n -10 ./service

# 3. Просмотр nice всех процессов (колонка NI)
ps -eo pid,ni,comm | sort -k2 -n | head -20
</code></pre>
<p><strong>Теперь про политику планировщика.</strong> Если сравнивать, то nice — это мягкое влияние, для более жёсткого контроля есть политики планировщика. Они определяют, как именно процесс конкурирует за CPU.</p>
<p><strong>chrt</strong> — утилита для управления политиками планировщика.</p>
<table>
<thead>
<tr>
<th>Политика</th>
<th>Описание</th>
<th>Когда использовать</th>
</tr>
</thead>
<tbody><tr>
<td>SCHED_OTHER</td>
<td>Стандартная, на основе nice. Процессы вытесняют друг друга.</td>
<td>Обычные приложения, демоны, пользовательские задачи.</td>
</tr>
<tr>
<td>SCHED_BATCH</td>
<td>Как OTHER, но оптимизирована для пакетной обработки: не мешает интерактивным задачам.</td>
<td>Фоновые расчёты, бэкапы, конвертация видео.</td>
</tr>
<tr>
<td>SCHED_IDLE</td>
<td>Самый низкий приоритет. Процесс получает CPU только когда система полностью свободна.</td>
<td>Очень фоновые задачи, которые не должны влиять ни на что.</td>
</tr>
<tr>
<td>SCHED_FIFO</td>
<td>Real-time. Процесс выполняется, пока сам не уступит или не завершится. Не вытесняется другими.</td>
<td>Аудио/видео обработка, промышленная автоматизация.</td>
</tr>
<tr>
<td>SCHED_RR</td>
<td>Real-time с квантами времени. Процесс выполняется фиксированными отрезками, затем уступает очередь.</td>
<td>Задачи с жёсткими временными рамками, но без риска «зависнуть навсегда».</td>
</tr>
</tbody></table>
<p>Приоритет: для real-time политик (FIFO, RR) — число от 1 до 99. Для остальных политик приоритет игнорируется. Будьте осторожны, real-time политики могут повесить систему, если процесс войдёт в бесконечный цикл и не будет уступать CPU (Тестировать и практиковаться рекомендуется через виртуальную машину!)</p>
<p><strong>Примеры использования chrt</strong></p>
<pre><code class="language-bash"># 1. Посмотреть политику и приоритет процесса
chrt -p 1234

# 2. Изменить политику работающего процесса
sudo chrt -f -p 50 1234

# 1234 это пример pid
</code></pre>
<p><strong>ionice</strong> — утилита для управления приоритетом доступа процесса к диску.</p>
<p>Классы.</p>
<ul>
<li>1 (real-time): первый в очереди диска. Опасно: может заблокировать систему.</li>
<li>2 (best-effort): по умолчанию. Приоритет 0–7 внутри класса (0 = высший)</li>
<li>3 (idle): работает только когда никто другой не запрашивает диск.</li>
</ul>
<p><strong>Примеры использования ionice</strong></p>
<pre><code class="language-bash"># 1. Запуск с минимальным i/o-приоритетом.
ionice -c 3 rsync -av /data /backup

# 2. посмотреть i/o-приоритет процесса
ionice -p 1234
</code></pre>
<p><strong>taskset</strong> — утилита для просмотра и установки привязки процесса к конкретным ядрам процессора. Зачем он нужен? к примеру изолировать критичный сервис от других процессов, которые потребляют много ресурсов.</p>
<p><strong>Примеры использования taskset</strong></p>
<pre><code class="language-bash"># 1. Запуск процесс только на ядрах 0 и 1
taskset -c 0,1 ./myapp

# 2. Запустить на ядрах 2-4 (диапазон)
taskset -c 2-4 ./worker

# 3. Привязка рабочего процесса к ядрам 0,2,4
taskset -cp 0,2,4 1234

# 4. Посмотреть текущую привязку.
taskset -cp 1234
</code></pre>
<h2>9. OOM Killer — кто умрёт первым</h2>
<p>Когда памяти не хватает — ядро убивает кого-то, жертву выбирает OOM Killer по очкам (oom_score), чем больше жрёт памяти, тем ближе к смерти. Примеры и частые практики для чего нужно знать OOM Killer.</p>
<pre><code class="language-bash"># Кто сейчас под угрозой
for pid in /proc/[0-9]*/oom_score; do
    score=$(cat $pid 2&gt;/dev/null)
    [ &quot;${score:-0}&quot; -gt 100 ] 2&gt;/dev/null || continue
    comm=$(cat ${pid%/oom_score}/comm 2&gt;/dev/null)
    echo &quot;$score $comm&quot;
done | sort -rn | head -10

# Проверить, был ли кто убит
dmesg | grep -i oom
journalctl -k | grep &quot;killed process&quot;

# Защитить какой-то процесс от убийства
echo -500 | sudo tee /proc/$(pgrep postgres | head -1)/oom_score_adj
# Проверить, был ли кто убит
sudo dmesg | grep -i oom

# Защитить процесс от убийства
echo -500 | sudo tee /proc/$(pgrep postgres | head -1)/oom_score_adj

# Сделать процесс главной мишенью
echo 1000 | sudo tee /proc/1234/oom_score_adj
</code></pre>
<p><strong>Кратко ещё стоит добавить про ulimit и cgroups — ограничение ресурсов</strong></p>
<p>ulimit задаёт ограничения для <strong>процессов в текущей сессии шелла и их потомков</strong>: сколько файлов можно открыть, сколько памяти занять, сколько процессов родить и т. д., но закрыв терминал — всё сбросится, если не прописали постоянно это в limits.conf. ( путь: /etc/security/limits.conf ), пропишите в конфиге все нужные вам ограничения чтобы изменения пережили перезапуск. Проверить текущие ограничения можно примерно так: <code>systemctl show myapp.service | grep -E &quot;Memory|CPU|Tasks|IO&quot;</code></p>
<p>cgroups более низкоуровневый механизм ядра, который ограничивает ресурсы для произвольной группы процессов независимо от сессий. systemd автоматически создаёт cgroups для каждого сервиса, поэтому это рекомендуемый (моя рекомендация) способ ограничения ресурсов: прописал условный MemoryMax в unit-файлах и всё, ядро следит за лимитами даже если сервис форкает сотню таких процессов/дочерних процессов.</p>
<p>Но вот вопрос, когда что использовать?</p>
<p>Давайте как пример пару ситуаций:</p>
<ol>
<li>Лимит для пользователя или сессии: достаточно ulimit и настройка конфига.</li>
<li>Лимит для systemd-сервиса: systemd + cgroups</li>
<li>Лимит для контейнера, к примеру в Docker это можно сделать через yaml (docker compose) у них под капотом cgroups.</li>
</ol>
<p><strong>Примеры команд</strong></p>
<pre><code class="language-bash"># посмотреть все лимиты
ulimit -a

# макс. открытых файлов
ulimit -n

# макс. процессов
ulimit -u

# макс. виртуальной памяти
ulimit -v

# макс. cpu 
ulimit -t

# поднять лимит файлов прямо сейчас
ulimit -n 65536

# лимиты конкретного процесса
cat /proc/1/limits

# иерархия cgroups
systemd-cgls

# посмотреть потребление ресурсов по сервисам в реальном времени
systemd-cgtop

# найти в какой cgroup сидит процесс
cat /proc/1/cgroup
</code></pre>
<h2>10. Мониторинг: top, htop и другие.</h2>
<p>top — инструмент, показывающий процессы, нагрузку на процессор, память и среднюю загрузку системы. Можно запустить <code>top</code> сразу, а можно и написать флаги, к примеру обновление каждую секунду <code>top -d 1</code> или следить за конкретным процессом <code>top -p 1234</code> (несколь процессов через запятую писать). </p>
<p><strong>Возможно есть ещё флаги, но полезные флаги я выделю вот такие:</strong></p>
<p>Для запуска и отображения:</p>
<p><code>-d &lt;секунды&gt;</code> — интервал обновления. По умолчанию 3 секунды. <code>-n &lt;число&gt;</code> — завершить после N обновлений. Полезно в скриптах. <code>-b</code> — пакетный режим, выводит результат в stdout без интерактива. Используется вместе с <code>-n</code>,<code>-1</code> — показать каждое ядро процессора отдельно. </p>
<p>Для фильтрации:</p>
<p><code>-p &lt;PID&gt;</code> — следить только за указанным процессами, до 20 через запятую. <code>-u &lt;пользователь&gt;</code> — показывать только процессы конкретного пользователя. <code>-U &lt;пользователь&gt;</code> — то же, но включает процессы где пользователь указан в любом из полей.</p>
<p>Прочее:</p>
<p><code>-H</code> — показывать потоки вместо процессов. Каждый поток отображается отдельной строкой.<br><code>-c</code> — показывать полную командую строку вместо короткого имени процесса.<br><code>-i</code> — скрыть простаивающие процессы, показывать только активные.<br><code>-s</code> — безопасный режим, отключает опасные команды (к примеру r и k). </p>
<h2>Заключение</h2>
<p>Мы разобрали базу процессов (за рамками остались межпроцессное взаимодействие, strace и т. д.) они войдут в следующие части серии. Самая лучшая практика для вас (если вы обучаетесь к примеру) рекомендую запустить виртуалку и попробуйте создать сценарии используя команды и знания из статьи. Удачи вам!</p>
</article> </main> </noscript> <astro-island uid="2tCeCx" component-url="/assets/DocContent.CoKfap2Q.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{&quot;doc&quot;:[0,{&quot;id&quot;:[0,&quot;article/linux/linux-processes&quot;],&quot;title&quot;:[0,&quot;Linux: Процессы&quot;],&quot;slug&quot;:[0,&quot;article/linux/linux-processes&quot;],&quot;description&quot;:[0,&quot;Четвёртая часть серии о Linux для DevOps и DevSecOps — разбираем процессы глубоко: жизненный цикл, состояния, /proc, сигналы, планировщик, ограничения, отладка и диагностика в production.&quot;],&quot;content&quot;:[0,&quot;&lt;h2&gt;1. Введение&lt;/h2&gt;\n&lt;p&gt;Продолжаем серию о Linux. В прошлой части разбирали права доступа и теперь переходим к одной из самых важных тем в Linux — процессам. Любая программа в системе в конечном итоге существует как процесс: nginx, postgres, docker, sshd, systemd, ваш shell и даже потоки ядра. Понимание того, как процессы создаются, живут, взаимодействуют с ядром и завершаются это база для понимания и диагностики Linux-систем. Цель этой статьи, рассказать кратко и на простом языке всю нужную информацию для начинающих так и для опытных пользователей и админов освежить их знания. Важно: для практики если обучаетесь то лучше всего использовать виртуалку с Linux.&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Серия в основном под Ubuntu/Debian.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2&gt;2. Что такое процесс и поток&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;Процесс&lt;/strong&gt; — это запущенная программа. Когда вы запускаете контейнер &lt;code&gt;nginx&lt;/code&gt; или &lt;code&gt;python app.py&lt;/code&gt; или браузер, ядро Linux создаёт процесс: выделяет ему память, даёт номер (PID), и начинает его выполнять. Пока программа не запущена это программный файл, отличается он только наличием доступа x (т. е. возможности исполнения), но как только вы его запускаете, он становится процессом, под управлением ядра Linux. Про &lt;strong&gt;поток (thread)&lt;/strong&gt; достаточно запомнить что это задача внутри процесса, разделяющая с ним адресное пространство и файловые дескрипторы. В ядре представлен той же &lt;code&gt;task_struct&lt;/code&gt;, что и процесс, но с флагами CLONE_VM / CLONE_FILES / CLONE_SIGHAND. В утилитах (ps, htop) отображаются как LWP (Light Weight Process) с общим PID и уникальным TID. Сбой в одном потоке затрагивает весь процесс.&lt;/p&gt;\n&lt;p&gt;У каждого процесса есть своё окружение — набор ресурсов и атрибутов, которые ядро выделяет при создании:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Виртуальная память, где у процесса своё адресное пространство. Он не видит и не может напрямую изменить память другого процесса. &lt;/li&gt;\n&lt;li&gt;Таблица открытых файлов, через неё процесс работает с файлами, сокетами, пайпами и др. По умолчанию открыты 3 дескриптора (stdin), 1 (stdout), 2 (stderr). В остальном процесс открывается сам по ситуации.&lt;/li&gt;\n&lt;li&gt;Каталог (cwd), директория, в которой процесс сейчас находится, от неё отсчитываются все относительные пути.&lt;/li&gt;\n&lt;li&gt;Переменные окружения, набор пар ключей (или по-другому KEY=VALUE), которые процесс получил от родителя. Через них передают конфиги: PATH, HOME, LANG и другие (к примеру иногда чувств. данные (токены, пароли). Меняются до запуска процесса, внутри только если процесс сам их перезапишет.&lt;/li&gt;\n&lt;li&gt;UID / GID, идентификаторы пользователя и группы, от имени которых запущен процесс. По ним идет проверка прав: может ли процесс прочитать файл, открыть порт, выполнить какую-то операцию и т. д.&lt;/li&gt;\n&lt;li&gt;Код возврата, целое число 0–255, которое процесс возвращает при завершении: 0 = успех, 1–255 = ошибка. Сохраняется в ядре до тех пор, пока родитель не считает его через команду &lt;code&gt;wait()&lt;/code&gt; / &lt;code&gt;waitpid()&lt;/code&gt;. Если родитель не забирает код = процесс остаётся зомби до очистки&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2&gt;3. Жизненный цикл: рождение и смерть&lt;/h2&gt;\n&lt;p&gt;Как рождается процесс: в Linux новый процесс создаётся клонированием существующего через команды fork() и exec(). fork() создаёт точную копию родителя с новым PID, а exec() заменяет её память на код новой программы, сохраняя PID и наследуя ресурсы.&lt;/p&gt;\n&lt;p&gt;Что наследует дочерний процесс: открытые файловые дескрипторы, переменные окружения, текущий каталог, UID/GID, обработчики сигналов.&lt;br&gt;Не наследует: PID, очередь сигналов и статистику выполнения.&lt;/p&gt;\n&lt;p&gt;Как умирает процесс: процесс вызывает exit() (т. е. мы сообщаем ядру информацию о том что программа внутри процесса завершила все свои действия), ну и соответственно освобождаются ресурсы (файлы/память/сокеты), процесс переходит в состояние зомби (Z), ядро отправляет родителю сигнал (SIGCHLD), родитель вызывает wait() и забирает код возврата = зомби удаляется. Если родитель завершается раньше, то дочерний процесс усыновляется systemd (PID 1), который сам выполнит wait() при его завершении.&lt;/p&gt;\n&lt;p&gt;Когда зомби становится проблемным: по ситуации, несколько зомби, к примеру, это норма, если они живут миллисекунды пока родитель не вызовет wait(). Проблема основная возникает когда он его не вызывает никогда, из-за чего будет накопление зомби, pid-пространство и т. д. — система в итоге перестаёт создавать новые процессы.&lt;/p&gt;\n&lt;p&gt;В качестве примеров команды: &lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# Найти зомби\nps aux | awk &amp;#39;$8 == &amp;quot;Z&amp;quot;&amp;#39;\n\n# Найти родителя зомби и «напомнить» ему убраться\nkill -CHLD &amp;lt;PPID зомби&amp;gt;\n\n# Если родитель мёртво завис — убить его (дети усыновятся systemd)\nkill -TERM &amp;lt;PPID&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2&gt;4. Состояния процесса&lt;/h2&gt;\n&lt;p&gt;Каждый процесс находится в одном из состояний, отображаемых в колонке &lt;code&gt;STAT&lt;/code&gt; (&lt;code&gt;ps aux&lt;/code&gt;).&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Основные состояния:&lt;/strong&gt;&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Символ&lt;/th&gt;\n&lt;th&gt;Название&lt;/th&gt;\n&lt;th&gt;Описание&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;R&lt;/td&gt;\n&lt;td&gt;Running&lt;/td&gt;\n&lt;td&gt;Выполняется или в очереди на CPU.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;S&lt;/td&gt;\n&lt;td&gt;Sleeping&lt;/td&gt;\n&lt;td&gt;Прерываемое ожидание (ввод, сеть, таймер). Реагирует на сигналы.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;D&lt;/td&gt;\n&lt;td&gt;Uninterruptible sleep&lt;/td&gt;\n&lt;td&gt;Ожидание I/O, который не прерывается сигналами.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;T&lt;/td&gt;\n&lt;td&gt;Stopped&lt;/td&gt;\n&lt;td&gt;Процесс приостановлен сигналом SIGSTOP или SIGTSTP (Ctrl+Z). Не выполняется и не потребляет CPU. Можно возобновить через SIGCONT.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Z&lt;/td&gt;\n&lt;td&gt;Zombie&lt;/td&gt;\n&lt;td&gt;Завершён, но родитель не забрал код возврата через wait()&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;I&lt;/td&gt;\n&lt;td&gt;Idle&lt;/td&gt;\n&lt;td&gt;Неактивный поток ядра&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;&lt;strong&gt;Модификаторы состояния:&lt;/strong&gt; &lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;code&gt;&amp;lt;&lt;/code&gt; — высокий приоритет&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;N&lt;/code&gt; — низкий приоритет&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;s&lt;/code&gt; — лидер сессии&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;l&lt;/code&gt; — многопоточный&lt;/li&gt;\n&lt;li&gt;&lt;code&gt;+&lt;/code&gt; — на переднем плане&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Пример: &lt;code&gt;Ssl&lt;/code&gt; — спит, лидер сессии, многопоточный.&lt;/p&gt;\n&lt;h2&gt;5. Идентификаторы: PID, PPID, UID и другие&lt;/h2&gt;\n&lt;p&gt;PID (Process ID) — уникальный номер процесса, который назначает ядро. Не повторяется, пока не исчерпается диапазон.&lt;/p&gt;\n&lt;p&gt;PPID (Parent PID) — PID процесса, который создал данный. Каждый процесс (кроме systemd) имеет ровно 1 родителя. При завершении родителя его дочерние процессы переходят под управление systemd (PID 1).&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# Посмотреть PID/PPID/Имя процесса\nps -ef | head -10\n\n# Дерево процессов (наглядная иерархия. Рекомедую посмотреть данный пример)\npstree -p\n\n# Максимальный PID в системе \ncat /proc/sys/kernel/pid_max\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;Особые процессы:&lt;/strong&gt; PID 1 и PID 2, эти процессы создаются ядром сразу после загрузки. Они не запускаются пользователем и не появляются через команды как обычные программы. Про PID 1 уже несколько раз упомянули, но всё же стоит отдельно вынести в терминологию.&lt;/p&gt;\n&lt;p&gt;PID 1 (systemd) — 1-ый процесс в пользовательском пространстве. От него ведут начало все остальные процессы от сессий до демонов, если процесс теряет родителя — PID 1 его усыновляет, забирая коды возврата завершившихся процессов, предотвращая накопление зомби. Убить их нельзя, в основном можно завершить/убить их через перезагрузку системы.&lt;/p&gt;\n&lt;p&gt;PID 2 (kthreadd) — прародитель всех потоков ядра. От него создаются системные воркеры (к примеру kworker). В ps и htop их видно по квадратным скобкам [kworker/0:0]. Эти процессы работают в пространстве ядра и отвечают за фоновые задачи, такие как обработку прерываний, работу с диском итд.&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# Увидеть иерархию от systemd\npstree -p | head -20\n\n# Посмотреть потоки ядра (в квадратных скобках)\nps -eo pid,comm | grep &amp;#39;\\[&amp;#39;\n\n# Проверить родителя у любого процесса\nps -o pid,ppid,comm -p &amp;lt;PID&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2&gt;6. Сигналы&lt;/h2&gt;\n&lt;p&gt;Сигнал — это асинхронное уведомление процессу от ядра или другого процесса. Процесс может поймать сигнал, проигнорировать его или выполнить действие по умолчанию.&lt;/p&gt;\n&lt;h3&gt;Главные сигналы&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Сигнал&lt;/th&gt;\n&lt;th&gt;Номер&lt;/th&gt;\n&lt;th&gt;По умолчанию&lt;/th&gt;\n&lt;th&gt;Когда использовать&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;SIGTERM&lt;/td&gt;\n&lt;td&gt;15&lt;/td&gt;\n&lt;td&gt;Завершить&lt;/td&gt;\n&lt;td&gt;Первый выбор для остановки, процесс может перехватить и завершиться корректно: сохранить данные, закрыть соединения.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SIGKILL&lt;/td&gt;\n&lt;td&gt;9&lt;/td&gt;\n&lt;td&gt;Убить&lt;/td&gt;\n&lt;td&gt;Крайняя мера. Процесс не успевает сохранить состояние&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SIGHUP&lt;/td&gt;\n&lt;td&gt;1&lt;/td&gt;\n&lt;td&gt;Завершить&lt;/td&gt;\n&lt;td&gt;Для демонов (перечитывать к примеру конфиг nginx без перезапуска)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SIGINT&lt;/td&gt;\n&lt;td&gt;2&lt;/td&gt;\n&lt;td&gt;Завершить&lt;/td&gt;\n&lt;td&gt;Прерывание (Ctrl+C)&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SIGCONT&lt;/td&gt;\n&lt;td&gt;18&lt;/td&gt;\n&lt;td&gt;Приостановить/Продолжить&lt;/td&gt;\n&lt;td&gt;Возобновить приостановленный процесс&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SIGCHLD&lt;/td&gt;\n&lt;td&gt;17&lt;/td&gt;\n&lt;td&gt;Игнорировать&lt;/td&gt;\n&lt;td&gt;Уведомление родителю о завершении дочернего процесса&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SIGSTOP&lt;/td&gt;\n&lt;td&gt;19&lt;/td&gt;\n&lt;td&gt;Остановить&lt;/td&gt;\n&lt;td&gt;Приостановить процесс&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;Наверное появится вопрос &amp;quot;почему SIGKILL это крайняя мера?&amp;quot; Потому что процесс не успеет сделать свои нужды.(сохранить данные/записать файлы итд). Поэтому сначала пробуйте SIGTERM.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Что процесс может сделать с сигналом?&lt;/strong&gt; Поймать, игнорировать, принять действие по умолчанию. Это означает следующие:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Поймать, значит выполнить свой обработчик (например, nginx перечитывает конфиг на SIGHUP)&lt;/li&gt;\n&lt;li&gt;Игнорировать (ну тут и так понятно)&lt;/li&gt;\n&lt;li&gt;Принять действие по умолчанию, обычное завершение.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Стоит ещё отметить что поймать или проигнорировать SIGKILL и SIGSTOP нельзя, т. к. они всегда обрабатываются ядром.&lt;/p&gt;\n&lt;p&gt;Примеры как отправить сигнал и завершить процесс.&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# По PID\nkill -TERM 1234\nkill -9 1234           # то же что kill -KILL\n\n# По имени процесса\npkill -TERM nginx\npkill -HUP sshd        # перечитать конфиг\n\n# По полной командной строке\npkill -f &amp;quot;python app.py&amp;quot;\n\n# Всей группе процессов (минус перед номером)\nkill -TERM -&amp;lt;PGID&amp;gt;\n\n# Проверить, жив ли процесс (без отправки сигнала)\nkill -0 1234 &amp;amp;&amp;amp; echo &amp;quot;жив&amp;quot; || echo &amp;quot;мёртв&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;PID=1234\nTIMEOUT=30\n\n# Шаг 1: попросить завершиться\nkill -TERM &amp;quot;$PID&amp;quot;\n\n# Шаг 2: подождать\nfor i in $(seq 1 $TIMEOUT); do\n    kill -0 &amp;quot;$PID&amp;quot; 2&amp;gt;/dev/null || { echo &amp;quot;завершился за ${i}с&amp;quot;; exit 0; }\n    sleep 1\ndone\n\n# Шаг 3: если не вышел — убиваем\necho &amp;quot;не завершился за ${TIMEOUT}с, применяем SIGKILL&amp;quot;\nkill -KILL &amp;quot;$PID&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2&gt;7. /proc — заглянуть внутрь любого процесса&lt;/h2&gt;\n&lt;p&gt;Виртуальная файловая система (/proc) — это интерфейс, через который ядро отдаёт информацию о процессах и системе. Файлы здесь не занимают место на диске: когда делаем, к примеру, cat /proc/1234/status, ядро прямо в этот момент формирует текстовый ответ и отдаёт его вам. Здесь лежат данные обо всём: какие процессы запущены, сколько памяти используется и т. д.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Главные файлы /proc/&amp;lt;PID&amp;gt; и другие примеры&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. cmdline: командная строка запуска\ncat /proc/1/cmdline | tr &amp;#39;\\0&amp;#39; &amp;#39; &amp;#39;\n\n# 2. exe: показывает, какой файл запущен. Если обновили пакет, а процесс не перезагрузили — будет (deleted, означает что этот процесс был запущен, которого больше нет на диске.) \nls -la /proc/1/exe\n\n# 3. cwd: текущий рабочий каталог процесса.\nls -la /proc/1/cwd\n\n# 4. environ: переменные окружения\ntr &amp;#39;\\0&amp;#39; &amp;#39;\\n&amp;#39; &amp;lt;/proc/1/environ\n\n# 5. status: состояние/память/UID/сигналы.\ncat /proc/1/status \n# или с выбором нужных строк\ncat /proc/1/status | grep -E &amp;quot;Name|State|Uid|VmRSS|Threads&amp;quot;\n\n# 6. wchan: на каком системном вызове процесс ждёт / завис\ncat /proc/1/wchan\n\n# 7. stack: стек ядра (требует рут)\nsudo cat /proc/1/stack\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;Файловые дескрипторы&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. список открытых дескрипторов\nls -la /proc/1/fd/\n\n# 2. сколько открыто\nls /proc/1/fd | wc -l\n\n# 3. сравнить с лимитом\ncat /proc/1/limits | grep &amp;quot;open files&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;если числов fd близко к лимиту, возможно утечка. Частая причина: too many open files&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Память и I/O&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. Потребление памяти\ncat /proc/1/status | grep -E &amp;quot;VmRSS|VmSize|VmSwap&amp;quot;\n\n#2. Статистика ввода-вывода\ncat /proc/1/io\n&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;VmRSS (Resident Set Size) показатель реального потребления памяти. Разница между &lt;code&gt;rchar&lt;/code&gt; и &lt;code&gt;read_bytes&lt;/code&gt; показывает насколько эффективен page cache для этого процесса.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2&gt;8. Планировщик и приоритеты&lt;/h2&gt;\n&lt;p&gt;Linux делит время CPU между процессами через планировщик CFS (Completely Fair Scheduler). Планировщик решает кто получает ресурсы и на сколько.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Nice: что это и как работает?&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Nice — это атрибут процесса, и утилита для его изменения.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Как атрибут:&lt;/strong&gt; число от -20 до +19, которое хранится в ядре для каждого процесса. По умолчанию стоит 0, но чем меньше значение — тем выше приоритет.&lt;br&gt;&lt;strong&gt;Как утилита:&lt;/strong&gt; nice запускает команду с заданным приоритетом, renice меняет приоритет уже работающего процесса.&lt;/p&gt;\n&lt;h3&gt;Правила Nice и Политика Планировщика&lt;/h3&gt;\n&lt;p&gt;Правила Nice основные довольно простые, уменьшать nice (что означает повышать приоритет) может только root, обычный пользователь может только увеличивать (т. е. снижать приоритет): с 0 до 10 = можно, с 0 до -5 = нельзя. Отмечу что nice влияет только на распределение процессорного времени. Он не даёт гарантий, не резервирует CPU и не работает для real-time задач.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Примеры использования nice&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. Запуск команды с низким приоритетом (не будет мешать другим)\nnice -n 15 rsync -av /data /backup\n\n# 2. Запустить с высоким приоритетом (root)\nsudo nice -n -10 ./service\n\n# 3. Просмотр nice всех процессов (колонка NI)\nps -eo pid,ni,comm | sort -k2 -n | head -20\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;Теперь про политику планировщика.&lt;/strong&gt; Если сравнивать, то nice — это мягкое влияние, для более жёсткого контроля есть политики планировщика. Они определяют, как именно процесс конкурирует за CPU.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;chrt&lt;/strong&gt; — утилита для управления политиками планировщика.&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Политика&lt;/th&gt;\n&lt;th&gt;Описание&lt;/th&gt;\n&lt;th&gt;Когда использовать&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;&lt;tr&gt;\n&lt;td&gt;SCHED_OTHER&lt;/td&gt;\n&lt;td&gt;Стандартная, на основе nice. Процессы вытесняют друг друга.&lt;/td&gt;\n&lt;td&gt;Обычные приложения, демоны, пользовательские задачи.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SCHED_BATCH&lt;/td&gt;\n&lt;td&gt;Как OTHER, но оптимизирована для пакетной обработки: не мешает интерактивным задачам.&lt;/td&gt;\n&lt;td&gt;Фоновые расчёты, бэкапы, конвертация видео.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SCHED_IDLE&lt;/td&gt;\n&lt;td&gt;Самый низкий приоритет. Процесс получает CPU только когда система полностью свободна.&lt;/td&gt;\n&lt;td&gt;Очень фоновые задачи, которые не должны влиять ни на что.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SCHED_FIFO&lt;/td&gt;\n&lt;td&gt;Real-time. Процесс выполняется, пока сам не уступит или не завершится. Не вытесняется другими.&lt;/td&gt;\n&lt;td&gt;Аудио/видео обработка, промышленная автоматизация.&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;SCHED_RR&lt;/td&gt;\n&lt;td&gt;Real-time с квантами времени. Процесс выполняется фиксированными отрезками, затем уступает очередь.&lt;/td&gt;\n&lt;td&gt;Задачи с жёсткими временными рамками, но без риска «зависнуть навсегда».&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;&lt;/table&gt;\n&lt;p&gt;Приоритет: для real-time политик (FIFO, RR) — число от 1 до 99. Для остальных политик приоритет игнорируется. Будьте осторожны, real-time политики могут повесить систему, если процесс войдёт в бесконечный цикл и не будет уступать CPU (Тестировать и практиковаться рекомендуется через виртуальную машину!)&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Примеры использования chrt&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. Посмотреть политику и приоритет процесса\nchrt -p 1234\n\n# 2. Изменить политику работающего процесса\nsudo chrt -f -p 50 1234\n\n# 1234 это пример pid\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;ionice&lt;/strong&gt; — утилита для управления приоритетом доступа процесса к диску.&lt;/p&gt;\n&lt;p&gt;Классы.&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;1 (real-time): первый в очереди диска. Опасно: может заблокировать систему.&lt;/li&gt;\n&lt;li&gt;2 (best-effort): по умолчанию. Приоритет 0–7 внутри класса (0 = высший)&lt;/li&gt;\n&lt;li&gt;3 (idle): работает только когда никто другой не запрашивает диск.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;strong&gt;Примеры использования ionice&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. Запуск с минимальным i/o-приоритетом.\nionice -c 3 rsync -av /data /backup\n\n# 2. посмотреть i/o-приоритет процесса\nionice -p 1234\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;taskset&lt;/strong&gt; — утилита для просмотра и установки привязки процесса к конкретным ядрам процессора. Зачем он нужен? к примеру изолировать критичный сервис от других процессов, которые потребляют много ресурсов.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Примеры использования taskset&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# 1. Запуск процесс только на ядрах 0 и 1\ntaskset -c 0,1 ./myapp\n\n# 2. Запустить на ядрах 2-4 (диапазон)\ntaskset -c 2-4 ./worker\n\n# 3. Привязка рабочего процесса к ядрам 0,2,4\ntaskset -cp 0,2,4 1234\n\n# 4. Посмотреть текущую привязку.\ntaskset -cp 1234\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2&gt;9. OOM Killer — кто умрёт первым&lt;/h2&gt;\n&lt;p&gt;Когда памяти не хватает — ядро убивает кого-то, жертву выбирает OOM Killer по очкам (oom_score), чем больше жрёт памяти, тем ближе к смерти. Примеры и частые практики для чего нужно знать OOM Killer.&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# Кто сейчас под угрозой\nfor pid in /proc/[0-9]*/oom_score; do\n    score=$(cat $pid 2&amp;gt;/dev/null)\n    [ &amp;quot;${score:-0}&amp;quot; -gt 100 ] 2&amp;gt;/dev/null || continue\n    comm=$(cat ${pid%/oom_score}/comm 2&amp;gt;/dev/null)\n    echo &amp;quot;$score $comm&amp;quot;\ndone | sort -rn | head -10\n\n# Проверить, был ли кто убит\ndmesg | grep -i oom\njournalctl -k | grep &amp;quot;killed process&amp;quot;\n\n# Защитить какой-то процесс от убийства\necho -500 | sudo tee /proc/$(pgrep postgres | head -1)/oom_score_adj\n# Проверить, был ли кто убит\nsudo dmesg | grep -i oom\n\n# Защитить процесс от убийства\necho -500 | sudo tee /proc/$(pgrep postgres | head -1)/oom_score_adj\n\n# Сделать процесс главной мишенью\necho 1000 | sudo tee /proc/1234/oom_score_adj\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;Кратко ещё стоит добавить про ulimit и cgroups — ограничение ресурсов&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;ulimit задаёт ограничения для &lt;strong&gt;процессов в текущей сессии шелла и их потомков&lt;/strong&gt;: сколько файлов можно открыть, сколько памяти занять, сколько процессов родить и т. д., но закрыв терминал — всё сбросится, если не прописали постоянно это в limits.conf. ( путь: /etc/security/limits.conf ), пропишите в конфиге все нужные вам ограничения чтобы изменения пережили перезапуск. Проверить текущие ограничения можно примерно так: &lt;code&gt;systemctl show myapp.service | grep -E &amp;quot;Memory|CPU|Tasks|IO&amp;quot;&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;cgroups более низкоуровневый механизм ядра, который ограничивает ресурсы для произвольной группы процессов независимо от сессий. systemd автоматически создаёт cgroups для каждого сервиса, поэтому это рекомендуемый (моя рекомендация) способ ограничения ресурсов: прописал условный MemoryMax в unit-файлах и всё, ядро следит за лимитами даже если сервис форкает сотню таких процессов/дочерних процессов.&lt;/p&gt;\n&lt;p&gt;Но вот вопрос, когда что использовать?&lt;/p&gt;\n&lt;p&gt;Давайте как пример пару ситуаций:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Лимит для пользователя или сессии: достаточно ulimit и настройка конфига.&lt;/li&gt;\n&lt;li&gt;Лимит для systemd-сервиса: systemd + cgroups&lt;/li&gt;\n&lt;li&gt;Лимит для контейнера, к примеру в Docker это можно сделать через yaml (docker compose) у них под капотом cgroups.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;strong&gt;Примеры команд&lt;/strong&gt;&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-bash\&quot;&gt;# посмотреть все лимиты\nulimit -a\n\n# макс. открытых файлов\nulimit -n\n\n# макс. процессов\nulimit -u\n\n# макс. виртуальной памяти\nulimit -v\n\n# макс. cpu \nulimit -t\n\n# поднять лимит файлов прямо сейчас\nulimit -n 65536\n\n# лимиты конкретного процесса\ncat /proc/1/limits\n\n# иерархия cgroups\nsystemd-cgls\n\n# посмотреть потребление ресурсов по сервисам в реальном времени\nsystemd-cgtop\n\n# найти в какой cgroup сидит процесс\ncat /proc/1/cgroup\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2&gt;10. Мониторинг: top, htop и другие.&lt;/h2&gt;\n&lt;p&gt;top — инструмент, показывающий процессы, нагрузку на процессор, память и среднюю загрузку системы. Можно запустить &lt;code&gt;top&lt;/code&gt; сразу, а можно и написать флаги, к примеру обновление каждую секунду &lt;code&gt;top -d 1&lt;/code&gt; или следить за конкретным процессом &lt;code&gt;top -p 1234&lt;/code&gt; (несколь процессов через запятую писать). &lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Возможно есть ещё флаги, но полезные флаги я выделю вот такие:&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Для запуска и отображения:&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;-d &amp;lt;секунды&amp;gt;&lt;/code&gt; — интервал обновления. По умолчанию 3 секунды. &lt;code&gt;-n &amp;lt;число&amp;gt;&lt;/code&gt; — завершить после N обновлений. Полезно в скриптах. &lt;code&gt;-b&lt;/code&gt; — пакетный режим, выводит результат в stdout без интерактива. Используется вместе с &lt;code&gt;-n&lt;/code&gt;,&lt;code&gt;-1&lt;/code&gt; — показать каждое ядро процессора отдельно. &lt;/p&gt;\n&lt;p&gt;Для фильтрации:&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;-p &amp;lt;PID&amp;gt;&lt;/code&gt; — следить только за указанным процессами, до 20 через запятую. &lt;code&gt;-u &amp;lt;пользователь&amp;gt;&lt;/code&gt; — показывать только процессы конкретного пользователя. &lt;code&gt;-U &amp;lt;пользователь&amp;gt;&lt;/code&gt; — то же, но включает процессы где пользователь указан в любом из полей.&lt;/p&gt;\n&lt;p&gt;Прочее:&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;-H&lt;/code&gt; — показывать потоки вместо процессов. Каждый поток отображается отдельной строкой.&lt;br&gt;&lt;code&gt;-c&lt;/code&gt; — показывать полную командую строку вместо короткого имени процесса.&lt;br&gt;&lt;code&gt;-i&lt;/code&gt; — скрыть простаивающие процессы, показывать только активные.&lt;br&gt;&lt;code&gt;-s&lt;/code&gt; — безопасный режим, отключает опасные команды (к примеру r и k). &lt;/p&gt;\n&lt;h2&gt;Заключение&lt;/h2&gt;\n&lt;p&gt;Мы разобрали базу процессов (за рамками остались межпроцессное взаимодействие, strace и т. д.) они войдут в следующие части серии. Самая лучшая практика для вас (если вы обучаетесь к примеру) рекомендую запустить виртуалку и попробуйте создать сценарии используя команды и знания из статьи. Удачи вам!&lt;/p&gt;\n&quot;],&quot;typename&quot;:[0,&quot;Линукс&quot;],&quot;categoryPath&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;linux&quot;],&quot;title&quot;:[0,&quot;Линукс&quot;],&quot;icon&quot;:[0,&quot;folder-tree&quot;]}]]],&quot;navSlug&quot;:[0,&quot;article&quot;],&quot;navTitle&quot;:[0,&quot;Статьи opensophy&quot;],&quot;navIcon&quot;:[0,&quot;brain&quot;],&quot;author&quot;:[0,&quot;&quot;],&quot;date&quot;:[0,&quot;2026-06-02&quot;],&quot;updated&quot;:[0,&quot;&quot;],&quot;tags&quot;:[1,[[0,&quot;linux&quot;],[0,&quot;devsecops&quot;]]],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;keywords&quot;:[0,&quot;&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;icon&quot;:[0,&quot;settings&quot;],&quot;priority&quot;:[0,3],&quot;custom&quot;:[0,&quot;&quot;],&quot;frontmatter&quot;:[0,{&quot;title&quot;:[0,&quot;Linux: Процессы&quot;],&quot;description&quot;:[0,&quot;Четвёртая часть серии о Linux для DevOps и DevSecOps — разбираем процессы глубоко: жизненный цикл, состояния, /proc, сигналы, планировщик, ограничения, отладка и диагностика в production.&quot;],&quot;date&quot;:[0,&quot;2026-06-02&quot;],&quot;tags&quot;:[0,&quot;linux, devsecops&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;priority&quot;:[0,&quot;3&quot;]}]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>   <astro-island uid="Z1Ix9sf" component-url="/assets/DevPanelLoader.6ELCzLIu.js" component-export="default" renderer-url="/assets/client.B5AwLhz3.js" props="{}" ssr client="only" opts="{&quot;name&quot;:&quot;DevPanelLoader&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island> <!-- Re-apply theme after SPA navigation --> <script>
