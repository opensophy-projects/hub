      (function() {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme ? theme === 'dark' : prefersDark;
        
        const html = document.documentElement;
        
        if (isDark) {
          html.classList.add('dark');
          html.style.backgroundColor = '#0a0a0a';
          html.style.color = '#ffffff';
          html.style.colorScheme = 'dark';
        } else {
          html.classList.remove('dark');
          html.style.backgroundColor = '#E8E7E3';
          html.style.color = '#000000';
          html.style.colorScheme = 'light';
        }
      })();

 параграф текста. Текст автоматически переносится на новую строку, если достигнут край контейнера. Между параграфами автоматически добавляется отступ.\n\nВы можете использовать **жирный текст** для выделения важной информации.\n\nТакже доступен *курсивный текст* для акцентирования.\n\nМожно комбинировать: ***жирный курсив*** для особого выделения.\n\nДля зачёркнутого текста используйте ~~такой синтаксис~~.\n\n---\n\n## Списки\n\n### Маркированный список\n\n- Первый элемент списка\n- Второй элемент списка\n- Третий элемент списка\n  - Вложенный элемент 1\n  - Вложенный элемент 2\n    - Ещё более глубокая вложенность\n- Четвёртый элемент списка\n\n### Нумерованный список\n\n1. Первый пункт\n2. Второй пункт\n3. Третий пункт\n   1. Вложенный пункт 3.1\n   2. Вложенный пункт 3.2\n4. Четвёртый пункт\n\n### Смешанный список\n\n1. Первый основной пункт\n   - Подпункт с маркером\n   - Ещё один подпункт\n2. Второй основной пункт\n   - Маркированный элемент\n   - Ещё элемент\n\n---\n\n## Ссылки\n\nВы можете создавать [обычные ссылки](https://hub.opensophy.com) на внешние ресурсы.\n\nТакже работают [ссылки с title атрибутом](https://github.com \&quot;GitHub Homepage\&quot;) - наведите на ссылку, чтобы увидеть подсказку.\n\nСсылки на другие статьи в Hub: [Руководство по карьере](/blog/career-tutorial)\n\n---\n\n## Изображения\n\nИзображения автоматически оптимизируются и поддерживают lazy loading:\n\n!![](/assets/dokploy1.png)(dokploy1.png \&quot;Пример скриншота интерфейса Dokploy\&quot;)\n\nИзображения с подписью отображаются в элементе figure с caption:\n\n!![](/assets/dokploy5.png)(dokploy5.png \&quot;Интерфейс создания проекта в Dokploy\&quot;)\n\n---\n\n## Код\n\n### Встроенный код\n\nИспользуйте `inline code` для выделения команд, переменных или коротких фрагментов кода прямо в тексте.\n\nПримеры: `npm install`, `const variable = &#39;value&#39;`, `127.0.0.1`\n\n### Блоки кода\n\nБлоки кода поддерживают подсветку синтаксиса, копирование и полноэкранный режим:\n\n&lt;code section&gt;\njavascript\n// Пример JavaScript кода\nfunction greet(name) {\n  console.log(`Привет, ${name}!`);\n  return true;\n}\n\nconst user = &#39;World&#39;;\ngreet(user);\n&lt;/code section&gt;\n\n&lt;code section&gt;\npython\n# Пример Python кода\ndef calculate_sum(numbers):\n    \&quot;\&quot;\&quot;Вычисляет сумму списка чисел\&quot;\&quot;\&quot;\n    total = 0\n    for num in numbers:\n        total += num\n    return total\n\nnumbers = [1, 2, 3, 4, 5]\nresult = calculate_sum(numbers)\nprint(f\&quot;Сумма: {result}\&quot;)\n&lt;/code section&gt;\n\n&lt;code section&gt;\nbash\n# Пример Bash скрипта\n#!/bin/bash\n\necho \&quot;Начало установки...\&quot;\n\nsudo apt update\nsudo apt install -y docker.io\n\ndocker --version\n\necho \&quot;Установка завершена!\&quot;\n&lt;/code section&gt;\n\n&lt;code section&gt;\ntypescript\n// Пример TypeScript кода\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  isActive: boolean;\n}\n\nclass UserService {\n  private users: User[] = [];\n\n  addUser(user: User): void {\n    this.users.push(user);\n  }\n\n  findUserById(id: number): User | undefined {\n    return this.users.find(u =&gt; u.id === id);\n  }\n}\n\nconst service = new UserService();\n&lt;/code section&gt;\n\n&lt;code section&gt;\nsql\n-- Пример SQL запроса\nCREATE TABLE users (\n  id SERIAL PRIMARY KEY,\n  username VARCHAR(50) UNIQUE NOT NULL,\n  email VARCHAR(100) UNIQUE NOT NULL,\n  created_at TIMESTAMP DEFAULT NOW()\n);\n\nINSERT INTO users (username, email)\nVALUES (&#39;opensophy&#39;, &#39;opensophy@gmail.com&#39;);\n\nSELECT * FROM users WHERE username = &#39;opensophy&#39;;\n&lt;/code section&gt;\n\n---\n\n## Цитаты\n\nИспользуйте цитаты для выделения важной информации или цитирования источников:\n\n&gt; Это простая цитата. Она выделяется визуально и привлекает внимание читателя.\n\n&gt; Цитата может быть многострочной.\n&gt; Каждая новая строка начинается с символа &gt;.\n&gt; Это позволяет создавать длинные цитаты.\n\nВложенные цитаты:\n\n&gt; Основная цитата\n&gt;\n&gt; &gt; Вложенная цитата первого уровня\n&gt; &gt;\n&gt; &gt; &gt; Вложенная цитата второго уровня\n\n---\n\n## Горизонтальные линии\n\nГоризонтальные линии помогают визуально разделить секции документа:\n\n---\n\nВыше и ниже этого текста находятся горизонтальные разделители.\n\n---\n\n## Таблицы\n\nТаблицы поддерживают полноэкранный режим для удобного просмотра больших данных:\n\n### Простая таблица\n\n| Название | Описание | Статус |\n| :--- | :--- | :---: |\n| Проект A | Описание проекта A | Активен |\n| Проект B | Описание проекта B | В разработке |\n| Проект C | Описание проекта C | Завершён |\n\n### Таблица с выравниванием\n\n| Слева | По центру | Справа |\n| :--- | :---: | ---: |\n| Текст | Текст | 100 |\n| Ещё текст | Центр | 250 |\n| Последний | Середина | 999 |\n\n### Сложная таблица\n\n| Протокол | Уровень OSI | Порт | Назначение |\n| :--- | :---: | :---: | :--- |\n| HTTP | 7 (Прикладной) | 80 | Передача гипертекста |\n| HTTPS | 7 (Прикладной) | 443 | Защищённая передача данных |\n| SSH | 7 (Прикладной) | 22 | Безопасный удалённый доступ |\n| FTP | 7 (Прикладной) | 21 | Передача файлов |\n| DNS | 7 (Прикладной) | 53 | Преобразование доменных имён |\n| SMTP | 7 (Прикладной) | 25 | Отправка электронной почты |\n\n### Очень широкая таблица\n\nДля просмотра широких таблиц используйте кнопку полноэкранного режима в правом верхнем углу:\n\n| Столбец 1 | Столбец 2 | Столбец 3 | Столбец 4 | Столбец 5 | Столбец 6 | Столбец 7 | Столбец 8 |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| Данные 1.1 | Данные 1.2 | Данные 1.3 | Данные 1.4 | Данные 1.5 | Данные 1.6 | Данные 1.7 | Данные 1.8 |\n| Данные 2.1 | Данные 2.2 | Данные 2.3 | Данные 2.4 | Данные 2.5 | Данные 2.6 | Данные 2.7 | Данные 2.8 |\n| Данные 3.1 | Данные 3.2 | Данные 3.3 | Данные 3.4 | Данные 3.5 | Данные 3.6 | Данные 3.7 | Данные 3.8 |\n\n---\n\n## Комбинированный контент\n\nВы можете комбинировать различные элементы форматирования:\n\n### Список с кодом\n\n1. Установите зависимости:\n   &lt;code section&gt;\n   bash\n   npm install react react-dom\n   &lt;/code section&gt;\n\n2. Создайте компонент:\n   &lt;code section&gt;\n   javascript\n   function App() {\n     return &lt;h1&gt;Hello World&lt;/h1&gt;;\n   }\n   &lt;/code section&gt;\n\n3. Запустите приложение:\n   ```bash\n   npm start\n   ```\n\n### Таблица с форматированием\n\n| Элемент | Синтаксис | Результат |\n| :--- | :--- | :--- |\n| Жирный | `**текст**` | **текст** |\n| Курсив | `*текст*` | *текст* |\n| Код | `` `код` `` | `код` |\n| Ссылка | `[текст](url)` | [пример](/) |\n\n---\n\n## Специальные возможности\n\n### Оглавление\n\nHub автоматически генерирует оглавление на основе заголовков H2 и H3. Оно отображается в боковой панели на десктопе и доступно через кнопку в мобильной навигации.\n\n### Баннеры статей\n\nКаждая статья имеет настраиваемый баннер. Цвет и текст баннера задаются в frontmatter:\n\n- `bannercolor`: HEX-цвет баннера\n- `bannertext`: Текст, отображаемый на баннере\n\n### Метаданные\n\nHub поддерживает полный набор SEO-метаданных:\n\n- `title`: Заголовок статьи\n- `description`: Описание для поисковых систем\n- `keywords`: Ключевые слова\n- `author`: Автор статьи\n- `date`: Дата публикации\n- `tags`: Теги для категоризации\n- `robots`: Правила индексации\n\n---\n\n## Рекомендации по написанию статей\n\n### Структура\n\n1. Используйте только один заголовок H1 в начале (он берётся из frontmatter)\n2. Организуйте контент с помощью H2 для основных разделов\n3. Используйте H3-H4 для подразделов\n4. Добавляйте горизонтальные линии между крупными секциями\n\n### Читабельность\n\n- Разбивайте длинные параграфы на короткие (3-5 предложений)\n- Используйте списки для перечислений\n- Выделяйте ключевые термины жирным шрифтом\n- Добавляйте примеры кода там, где это уместно\n\n### Изображения\n\n- Размещайте изображения в папке `public/assets/`\n- Используйте осмысленные имена файлов\n- Всегда добавляйте alt-текст для доступности\n- Используйте title для подписей к изображениям\n\n### Код\n\n- Всегда указывайте язык программирования для блоков кода\n- Добавляйте комментарии в сложных примерах\n- Используйте inline-код для команд и переменных в тексте\n- Проверяйте работоспособность примеров кода\n\n---\n\n## Заключение\n\nТеперь вы знаете все возможности форматирования в Hub. Используйте это руководство как шпаргалку при создании собственных статей.\n\nДля создания новой статьи:\n\n1. Создайте файл `.md` в папке `Docs/`\n2. Добавьте frontmatter с метаданными\n3. Напишите контент, используя Markdown\n4. Запустите `npm run generate:docs` для индексации\n5. Статья автоматически появится на главной странице\n\nУдачи в написании статей!\n&quot;]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>  </div> <script type="module">function o(t){const e=document.documentElement;t?(e.classList.add("dark"),e.style.backgroundColor="#0a0a0a",e.style.color="#ffffff",e.style.colorScheme="dark"):(e.classList.remove("dark"),e.style.backgroundColor="#E8E7E3",e.style.color="#000000",e.style.colorScheme="light")}window.addEventListener("storage",t=>{if(t.key==="theme"){const e=t.newValue==="dark";o(e)}});window.addEventListener("themechange",()=>{const t=localStorage.getItem("theme"),e=window.matchMedia("(prefers-color-scheme: dark)").matches;o(t?t==="dark":e)});</script> </body> </html>
