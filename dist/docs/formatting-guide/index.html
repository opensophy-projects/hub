        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        const html = document.documentElement;

          html.style.backgroundColor = '#0a0a0a';
          html.style.color = '#ffffff';
          html.style.colorScheme = 'dark';
        } else {

      })();

t;formatting-guide&quot;],&quot;description&quot;:[0,&quot;Полное руководство по использованию Markdown для создания статей в Opensophy Hub.&quot;],&quot;type&quot;:[0,&quot;docs&quot;],&quot;category&quot;:[0,&quot;Прочие&quot;],&quot;bannercolor&quot;:[0,&quot;#3b82f6&quot;],&quot;bannertext&quot;:[0,&quot;formatting-guide&quot;],&quot;author&quot;:[0,&quot;VeilStack&quot;],&quot;date&quot;:[0,&quot;2026-01-20&quot;],&quot;tags&quot;:[1,[]],&quot;keywords&quot;:[0,&quot;&quot;],&quot;canonical&quot;:[0,null],&quot;robots&quot;:[0,&quot;index, follow&quot;],&quot;lang&quot;:[0,&quot;ru&quot;],&quot;content&quot;:[0,&quot;# Руководство по форматированию: все возможности Markdown в Hub\n\nПолное руководство по использованию Markdown для создания статей в Opensophy Hub.\n\n---\n\n## 📋 Содержание\n\n1. [Frontmatter — метаданные статьи](#frontmatter--метаданные-статьи)\n2. [Заголовки](#заголовки)\n3. [Форматирование текста](#форматирование-текста)\n4. [Списки](#списки)\n5. [Ссылки](#ссылки)\n6. [Изображения](#изображения)\n7. [Цитаты](#цитаты)\n8. [Код](#код)\n9. [Таблицы](#таблицы)\n10. [Разделители](#разделители)\n11. [HTML в Markdown](#html-в-markdown)\n12. [Специальные символы](#специальные-символы)\n13. [Чеклисты](#чеклисты)\n14. [Эмодзи](#эмодзи)\n15. [Лучшие практики](#лучшие-практики)\n\n---\n\n## Frontmatter — метаданные статьи\n\nКаждая статья в Hub **обязательно** должна начинаться с блока метаданных в формате YAML, заключенного в тройные дефисы:\n\n```yaml\n---\ntitle: \&quot;Название статьи\&quot;\ndescription: Краткое описание статьи для SEO и превью\ntype: docs # или blog, news\ncategory: Категория\nauthor: Ваше имя\ndate: 2025-01-17\ntags: тег1, тег2, тег3\nkeywords: ключевые, слова, для, SEO\nbannercolor: #3b82f6\nbannertext: Текст на баннере\nrobots: index, follow\nlang: ru\n---\n```\n\n### Обязательные поля\n\n| Поле | Описание | Пример |\n|------|----------|--------|\n| `title` | Название статьи (отображается как H1) | `\&quot;Деплой приложений с Dokploy\&quot;` |\n| `description` | Краткое описание для SEO и карточек | `\&quot;Полное руководство по установке и настройке Dokploy\&quot;` |\n| `type` | Тип контента | `docs`, `blog`, `news` |\n| `category` | Основная категория | `DevOps`, `Security`, `Career` |\n| `author` | Имя автора | `Opensophy Team` |\n| `date` | Дата публикации | `2025-01-17` |\n\n### Опциональные поля\n\n| Поле | Описание | Пример |\n|------|----------|--------|\n| `tags` | Теги через запятую | `docker, deployment, vps` |\n| `keywords` | SEO ключевые слова | `dokploy, паас, деплой` |\n| `bannercolor` | Цвет баннера в HEX | `#3b82f6` |\n| `bannertext` | Текст на баннере | `DevOps Guide` |\n| `robots` | Инструкции для поисковиков | `index, follow` |\n| `lang` | Язык статьи | `ru`, `en` |\n\n---\n\n## Заголовки\n\nHub поддерживает 6 уровней заголовков. **Важно:** H1 (`#`) автоматически генерируется из `title` в frontmatter, поэтому в теле статьи используйте заголовки начиная с H2.\n\n### Синтаксис\n\n```markdown\n## Заголовок 2 уровня (H2)\n### Заголовок 3 уровня (H3)\n#### Заголовок 4 уровня (H4)\n##### Заголовок 5 уровня (H5)\n###### Заголовок 6 уровня (H6)\n```\n\n### Результат\n\n## Заголовок 2 уровня (H2)\n### Заголовок 3 уровня (H3)\n#### Заголовок 4 уровня (H4)\n##### Заголовок 5 уровня (H5)\n###### Заголовок 6 уровня (H6)\n\n### Автоматическое оглавление\n\nHub автоматически генерирует оглавление (Table of Contents) на основе заголовков H2 и H3 в статье. Заголовки появляются в боковой панели для быстрой навигации.\n\n**Рекомендации:**\n- Используйте логическую иерархию заголовков\n- Не пропускайте уровни (после H2 не ставьте сразу H4)\n- Делайте заголовки информативными и краткими\n- Используйте H2 для основных разделов, H3 для подразделов\n\n---\n\n## Форматирование текста\n\n### Курсив (Italic)\n\n```markdown\nТекст с *курсивом* или _курсивом_\n```\n\nТекст с *курсивом* или _курсивом_\n\n### Жирный (Bold)\n\n```markdown\nТекст с **жирным шрифтом** или __жирным шрифтом__\n```\n\nТекст с **жирным шрифтом** или __жирным шрифтом__\n\n### Жирный курсив\n\n```markdown\n***Жирный и курсивный текст*** или ___жирный и курсивный___\n```\n\n***Жирный и курсивный текст*** или ___жирный и курсивный___\n\n### Зачеркнутый (Strikethrough)\n\n```markdown\n~~Зачеркнутый текст~~\n```\n\n~~Зачеркнутый текст~~\n\n### Подчеркнутый (через HTML)\n\n```markdown\n&lt;u&gt;Подчеркнутый текст&lt;/u&gt;\n```\n\n&lt;u&gt;Подчеркнутый текст&lt;/u&gt;\n\n### Комбинации\n\n```markdown\n**Жирный текст с _курсивом_ внутри**\n*Курсив с **жирным** внутри*\n~~Зачеркнутый **жирный** текст~~\n```\n\n**Жирный текст с _курсивом_ внутри**\n*Курсив с **жирным** внутри*\n~~Зачеркнутый **жирный** текст~~\n\n---\n\n## Списки\n\n### Маркированный список (Unordered List)\n\n```markdown\n- Первый пункт\n- Второй пункт\n- Третий пункт\n  - Вложенный пункт 1\n  - Вложенный пункт 2\n    - Вложенный пункт 3 уровня\n- Четвертый пункт\n```\n\n- Первый пункт\n- Второй пункт\n- Третий пункт\n  - Вложенный пункт 1\n  - Вложенный пункт 2\n    - Вложенный пункт 3 уровня\n- Четвертый пункт\n\nМожно также использовать `*` или `+`:\n\n```markdown\n* Пункт с звездочкой\n+ Пункт с плюсом\n- Пункт с дефисом\n```\n\n### Нумерованный список (Ordered List)\n\n```markdown\n1. Первый пункт\n2. Второй пункт\n3. Третий пункт\n   1. Вложенный нумерованный\n   2. Еще один вложенный\n4. Четвертый пункт\n```\n\n1. Первый пункт\n2. Второй пункт\n3. Третий пункт\n   1. Вложенный нумерованный\n   2. Еще один вложенный\n4. Четвертый пункт\n\n**Важно:** Для вложенных списков используйте отступ в 3 пробела или 1 таб.\n\n### Смешанные списки\n\n```markdown\n1. Основной пункт\n   - Маркированный подпункт\n   - Еще один подпункт\n2. Второй основной\n   1. Нумерованный подпункт\n   2. Еще нумерованный\n```\n\n1. Основной пункт\n   - Маркированный подпункт\n   - Еще один подпункт\n2. Второй основной\n   1. Нумерованный подпункт\n   2. Еще нумерованный\n\n---\n\n## Ссылки\n\n### Inline-ссылки\n\n```markdown\n[Текст ссылки](https://example.com)\n[Ссылка с подсказкой](https://example.com \&quot;Текст подсказки при наведении\&quot;)\n```\n\n[Текст ссылки](https://example.com)\n[Ссылка с подсказкой](https://example.com \&quot;Текст подсказки при наведении\&quot;)\n\n### Reference-style ссылки\n\n```markdown\nТекст со [ссылкой][1] и еще одной [ссылкой][link-name].\n\n[1]: https://example.com\n[link-name]: https://another.com \&quot;Опциональная подсказка\&quot;\n```\n\n### Автоматические ссылки\n\n```markdown\n&lt;https://example.com&gt;\n&lt;email@example.com&gt;\n```\n\n&lt;https://example.com&gt;\n&lt;email@example.com&gt;\n\n### Якорные ссылки (anchor links)\n\n```markdown\n[Перейти к разделу Код](#код)\n```\n\n[Перейти к разделу Код](#код)\n\n**Правила для якорей:**\n- Все буквы в нижнем регистре\n- Пробелы заменяются дефисами\n- Специальные символы удаляются\n- Для кириллицы используется транслитерация\n\n---\n\n## Изображения\n\n### Базовый синтаксис\n\n```markdown\n![Альтернативный текст](путь/к/изображению.jpg)\n![Изображение с подсказкой](путь/к/изображению.jpg \&quot;Текст подсказки\&quot;)\n```\n\n![Альтернативный текст](путь/к/изображению.jpg)\n\n### Изображение как ссылка\n\n```markdown\n[![Альтернативный текст](путь/к/изображению.jpg)](https://example.com)\n```\n\n### Размещение изображений\n\nИзображения для статей размещаются в папке `/public/images/`:\n\n```markdown\n![Скриншот интерфейса](/images/dokploy-dashboard.png)\n```\n\n### HTML для дополнительного контроля\n\n```markdown\n&lt;img src=\&quot;/images/example.png\&quot; alt=\&quot;Описание\&quot; width=\&quot;600\&quot; height=\&quot;400\&quot;&gt;\n\n&lt;img src=\&quot;/images/example.png\&quot; alt=\&quot;Описание\&quot; style=\&quot;border-radius: 8px;\&quot;&gt;\n```\n\n---\n\n## Цитаты\n\n### Простая цитата\n\n```markdown\n&gt; Это цитата.\n&gt; Она может занимать несколько строк.\n```\n\n&gt; Это цитата.\n&gt; Она может занимать несколько строк.\n\n### Многострочная цитата\n\n```markdown\n&gt; Первая строка цитаты.\n&gt;\n&gt; Новый параграф внутри цитаты.\n```\n\n&gt; Первая строка цитаты.\n&gt;\n&gt; Новый параграф внутри цитаты.\n\n### Вложенные цитаты\n\n```markdown\n&gt; Первый уровень цитаты\n&gt;\n&gt; &gt; Второй уровень цитаты\n&gt; &gt;\n&gt; &gt; &gt; Третий уровень цитаты\n```\n\n&gt; Первый уровень цитаты\n&gt;\n&gt; &gt; Второй уровень цитаты\n&gt; &gt;\n&gt; &gt; &gt; Третий уровень цитаты\n\n### Цитаты с форматированием\n\n```markdown\n&gt; **Важное замечание**\n&gt;\n&gt; Текст с *курсивом* и `кодом`\n&gt;\n&gt; - Пункт 1\n&gt; - Пункт 2\n```\n\n&gt; **Важное замечание**\n&gt;\n&gt; Текст с *курсивом* и `кодом`\n&gt;\n&gt; - Пункт 1\n&gt; - Пункт 2\n\n---\n\n## Код\n\n### Инлайн-код\n\n```markdown\nИспользуйте команду `npm install` для установки пакетов.\nПеременная `const API_KEY` содержит ключ.\n```\n\nИспользуйте команду `npm install` для установки пакетов.\n\n### Блоки кода с подсветкой синтаксиса\n\nИспользуйте тройные обратные кавычки с указанием языка:\n\n````markdown\n```javascript\nfunction greet(name) {\n  console.log(`Hello, ${name}!`);\n}\n\ngreet(&#39;World&#39;);\n```\n````\n\n```javascript\nfunction greet(name) {\n  console.log(`Hello, ${name}!`);\n}\n\ngreet(&#39;World&#39;);\n```\n\n### Поддерживаемые языки\n\nHub поддерживает подсветку синтаксиса для множества языков:\n\n- `javascript`, `js`\n- `typescript`, `ts`\n- `python`, `py`\n- `bash`, `sh`, `shell`\n- `yaml`, `yml`\n- `json`\n- `html`\n- `css`, `scss`\n- `sql`\n- `php`\n- `java`\n- `c`, `cpp`, `c++`\n- `go`\n- `rust`\n- `dockerfile`\n- `markdown`, `md`\n- и многие другие\n\nПримеры:\n\n````markdown\n```bash\n#!/bin/bash\necho \&quot;Hello World\&quot;\ndocker ps -a\n```\n````\n\n```bash\n#!/bin/bash\necho \&quot;Hello World\&quot;\ndocker ps -a\n```\n\n````markdown\n```python\ndef fibonacci(n):\n    if n &lt;= 1:\n        return n\n    return fibonacci(n-1) + fibonacci(n-2)\n\nprint(fibonacci(10))\n```\n````\n\n```python\ndef fibonacci(n):\n    if n &lt;= 1:\n        return n\n    return fibonacci(n-1) + fibonacci(n-2)\n\nprint(fibonacci(10))\n```\n\n````markdown\n```yaml\nversion: &#39;3.8&#39;\nservices:\n  web:\n    image: nginx:latest\n    ports:\n      - \&quot;80:80\&quot;\n```\n````\n\n```yaml\nversion: &#39;3.8&#39;\nservices:\n  web:\n    image: nginx:latest\n    ports:\n      - \&quot;80:80\&quot;\n```\n\n### Блок кода с названием файла\n\nИспользуйте комментарий в первой строке:\n\n````markdown\n```javascript\n// config.js\nconst config = {\n  apiUrl: &#39;https://api.example.com&#39;,\n  timeout: 5000\n};\n```\n````\n\n### Код без подсветки\n\nПросто не указывайте язык:\n\n````markdown\n```\nПростой текст без подсветки\nМожет содержать любые символы\n```\n````\n\n---\n\n## Таблицы\n\n### Базовая таблица\n\n```markdown\n| Заголовок 1 | Заголовок 2 | Заголовок 3 |\n|-------------|-------------|-------------|\n| Ячейка 1    | Ячейка 2    | Ячейка 3    |\n| Ячейка 4    | Ячейка 5    | Ячейка 6    |\n```\n\n| Заголовок 1 | Заголовок 2 | Заголовок 3 |\n|-------------|-------------|-------------|\n| Ячейка 1    | Ячейка 2    | Ячейка 3    |\n| Ячейка 4    | Ячейка 5    | Ячейка 6    |\n\n### Выравнивание в таблицах\n\n```markdown\n| По левому краю | По центру | По правому краю |\n|:---------------|:---------:|----------------:|\n| Текст слева    | Центр     | Текст справа    |\n| Еще текст      | Еще центр | Еще справа      |\n```\n\n| По левому краю | По центру | По правому краю |\n|:---------------|:---------:|----------------:|\n| Текст слева    | Центр     | Текст справа    |\n| Еще текст      | Еще центр | Еще справа      |\n\n**Синтаксис выравнивания:**\n- `:---` — по левому краю (по умолчанию)\n- `:---:` — по центру\n- `---:` — по правому краю\n\n### Форматирование внутри таблиц\n\n```markdown\n| Имя | Описание | Статус |\n|-----|----------|--------|\n| **Docker** | Контейнеризация приложений | ✅ Активен |\n| *Kubernetes* | Оркестрация контейнеров | ⚠️ В разработке |\n| `Terraform` | Infrastructure as Code | ~~Устарел~~ |\n```\n\n| Имя | Описание | Статус |\n|-----|----------|--------|\n| **Docker** | Контейнеризация приложений | ✅ Активен |\n| *Kubernetes* | Оркестрация контейнеров | ⚠️ В разработке |\n| `Terraform` | Infrastructure as Code | ~~Устарел~~ |\n\n### Ссылки в таблицах\n\n```markdown\n| Инструмент | Документация |\n|------------|--------------|\n| Docker | [Docs](https://docs.docker.com) |\n| Nginx | [Docs](https://nginx.org/en/docs/) |\n```\n\n### Полноэкранный режим таблиц\n\nHub автоматически добавляет кнопку полноэкранного просмотра для больших таблиц.\n\n---\n\n## Разделители\n\nГоризонтальная линия создается тремя или более дефисами, звездочками или подчеркиваниями:\n\n```markdown\n---\n\n***\n\n___\n```\n\nВсе три варианта создают одинаковый результат:\n\n---\n\n**Использование:**\n```markdown\n## Раздел 1\n\nКонтент раздела 1.\n\n---\n\n## Раздел 2\n\nКонтент раздела 2.\n```\n\n---\n\n## HTML в Markdown\n\nHub поддерживает встраивание HTML для дополнительного контроля над форматированием.\n\n### Базовые HTML теги\n\n```markdown\n&lt;div class=\&quot;custom-block\&quot;&gt;\n  &lt;h4&gt;Заголовок блока&lt;/h4&gt;\n  &lt;p&gt;Текст внутри блока с &lt;strong&gt;HTML&lt;/strong&gt; форматированием.&lt;/p&gt;\n&lt;/div&gt;\n```\n\n### Полезные HTML элементы\n\n#### Details/Summary (раскрывающийся блок)\n\n```markdown\n&lt;details&gt;\n&lt;summary&gt;Нажмите, чтобы развернуть&lt;/summary&gt;\n\nЭто скрытый контент, который отображается при клике.\n\nМожет содержать:\n- Списки\n- **Форматирование**\n- `Код`\n\n&lt;/details&gt;\n```\n\n&lt;details&gt;\n&lt;summary&gt;Нажмите, чтобы развернуть&lt;/summary&gt;\n\nЭто скрытый контент, который отображается при клике.\n\n&lt;/details&gt;\n\n#### Кастомные стили\n\n```markdown\n&lt;div style=\&quot;background-color: #f0f8ff; padding: 15px; border-radius: 5px;\&quot;&gt;\n  💡 &lt;strong&gt;Совет:&lt;/strong&gt; Используйте HTML для создания кастомных блоков.\n&lt;/div&gt;\n```\n\n#### Центрирование\n\n```markdown\n&lt;p align=\&quot;center\&quot;&gt;\n  &lt;img src=\&quot;/images/logo.png\&quot; alt=\&quot;Logo\&quot; width=\&quot;200\&quot;&gt;\n&lt;/p&gt;\n```\n\n---\n\n## Специальные символы\n\n### Экранирование символов\n\nДля отображения специальных символов Markdown используйте обратный слэш `\\`:\n\n```markdown\n\\* Звездочка без курсива\n\\_ Подчеркивание без курсива\n\\# Решетка без заголовка\n\\[ Квадратная скобка\n\\\\ Обратный слэш\n\\` Обратная кавычка\n```\n\n\\* Звездочка без курсива\n\\_ Подчеркивание без курсива\n\\# Решетка без заголовка\n\n### HTML entities\n\n```markdown\n&amp;copy; 2025 Opensophy\n&amp;trade; Trademark\n&amp;reg; Registered\n&amp;nbsp; Неразрывный пробел\n&amp;mdash; Длинное тире\n```\n\n© 2025 Opensophy\n™ Trademark\n® Registered\n\n---\n\n## Чеклисты\n\nHub поддерживает интерактивные чеклисты (task lists):\n\n```markdown\n- [x] Завершенная задача\n- [x] Еще одна завершенная\n- [ ] Незавершенная задача\n- [ ] Еще незавершенная\n  - [x] Вложенная завершенная\n  - [ ] Вложенная незавершенная\n```\n\n- [x] Завершенная задача\n- [x] Еще одна завершенная\n- [ ] Незавершенная задача\n- [ ] Еще незавершенная\n  - [x] Вложенная завершенная\n  - [ ] Вложенная незавершенная\n\n**Использование:**\n- `[x]` — отмеченный чекбокс\n- `[ ]` — пустой чекбокс\n- Пробел между скобками обязателен\n\n---\n\n## Эмодзи\n\nHub поддерживает Unicode эмодзи:\n\n```markdown\n🎉 🚀 💡 ⚠️ ✅ ❌ 📝 🔒 🌐 💻\n👍 ⭐ 🔥 📊 🎨 🛠️ 📚 🎯 ⚡ 🌟\n```\n\n🎉 🚀 💡 ⚠️ ✅ ❌ 📝 🔒 🌐 💻\n👍 ⭐ 🔥 📊 🎨 🛠️ 📚 🎯 ⚡ 🌟\n\n**Полезные эмодзи для технических статей:**\n\n| Категория | Эмодзи |\n|-----------|--------|\n| Статус | ✅ ❌ ⚠️ 🔄 ⏳ |\n| Действия | 🚀 🔧 🛠️ ⚙️ 📝 |\n| Информация | 💡 📌 📋 📊 📈 |\n| Безопасность | 🔒 🔐 🛡️ 🔑 🚨 |\n| Технологии | 💻 🌐 ⚡ 🔥 ⭐ |\n\n---\n\n## Лучшие практики\n\n### Структура статьи\n\n**Рекомендуемая структура:**\n\n1. **Frontmatter** с полными метаданными\n2. **Введение** — краткое описание темы\n3. **Основной контент** — разделен на логические секции с H2/H3\n4. **Практические примеры** — код, команды, скриншоты\n5. **Заключение** — итоги, ссылки на дополнительные ресурсы\n\n### Форматирование кода\n\n- ✅ Всегда указывайте язык для блоков кода\n- ✅ Используйте информативные комментарии\n- ✅ Добавляйте вывод команд, где это уместно\n- ✅ Указывайте имена файлов в комментариях\n\n```bash\n# Установка зависимостей\nnpm install\n\n# Запуск в dev-режиме\nnpm run dev\n\n# Результат:\n# &gt; dev\n# &gt; astro dev\n# 🚀 astro v4.0.0 started in 245ms\n```\n\n### Изображения и скриншоты\n\n- ✅ Используйте осмысленные альтернативные тексты\n- ✅ Оптимизируйте размер изображений (до 1MB)\n- ✅ Используйте форматы WebP или PNG\n- ✅ Добавляйте подписи к важным изображениям\n\n### Таблицы\n\n- ✅ Используйте таблицы для сравнений и структурированных данных\n- ✅ Не перегружайте таблицы — максимум 5-6 столбцов\n- ✅ Используйте выравнивание для улучшения читаемости\n- ✅ Добавляйте заголовки для всех столбцов\n\n### Ссылки\n\n- ✅ Используйте описательный текст ссылок (не \&quot;нажмите здесь\&quot;)\n- ✅ Проверяйте работоспособность внешних ссылок\n- ✅ Используйте относительные пути для внутренних ссылок\n- ❌ Избегайте голых URL в тексте\n\n**Хорошо:**\n```markdown\nПодробнее читайте в [официальной документации Docker](https://docs.docker.com).\n```\n\n**Плохо:**\n```markdown\nЧитайте здесь: https://docs.docker.com\n```\n\n### Списки\n\n- ✅ Используйте списки для перечислений (3+ элемента)\n- ✅ Нумерованные списки — для последовательных действий\n- ✅ Маркированные списки — для неупорядоченных элементов\n- ✅ Вложенные списки — для иерархии\n\n### Заголовки\n\n- ✅ Используйте иерархию: H2 → H3 → H4\n- ✅ Делайте заголовки краткими (3-8 слов)\n- ✅ Избегайте точек в конце заголовков\n- ❌ Не используйте только цифры или символы\n\n### Цитаты\n\nИспользуйте цитаты для:\n- 💬 Выделения важной информации\n- ⚠️ Предупреждений и замечаний\n- 📌 Ключевых выводов\n- 💡 Советов и рекомендаций\n\n### Читаемость\n\n- ✅ Разбивайте длинный текст на параграфы (3-5 предложений)\n- ✅ Используйте пустые строки между блоками\n- ✅ Добавляйте горизонтальные разделители между крупными секциями\n- ✅ Выделяйте ключевые термины жирным или курсивом\n\n---\n\n## Пример полной статьи\n\n```markdown\n---\ntitle: \&quot;Полное руководство по Docker Compose\&quot;\ndescription: Изучите Docker Compose от основ до продвинутых техник деплоя\ntype: docs\ncategory: DevOps\nauthor: Opensophy Team\ndate: 2025-01-20\ntags: docker, docker-compose, контейнеризация, devops\nkeywords: docker compose, docker-compose.yml, контейнеры\nbannercolor: #2496ed\nbannertext: Docker Guide\nrobots: index, follow\nlang: ru\n---\n\n## Введение\n\nDocker Compose — это инструмент для определения и запуска многоконтейнерных Docker приложений. В этом руководстве мы рассмотрим все аспекты работы с Docker Compose.\n\n## Установка\n\n### Linux\n\n```bash\n# Скачивание последней версии\nsudo curl -L \&quot;https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)\&quot; -o /usr/local/bin/docker-compose\n\n# Установка прав на выполнение\nsudo chmod +x /usr/local/bin/docker-compose\n\n# Проверка установки\ndocker-compose --version\n```\n\n## Базовая конфигурация\n\nСоздайте файл `docker-compose.yml`:\n\n```yaml\nversion: &#39;3.8&#39;\n\nservices:\n  web:\n    image: nginx:latest\n    ports:\n      - \&quot;80:80\&quot;\n    volumes:\n      - ./html:/usr/share/nginx/html\n    \n  db:\n    image: postgres:15\n    environment:\n      POSTGRES_PASSWORD: secret\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n\nvolumes:\n  pgdata:\n```\n\n## Основные команды\n\n| Команда | Описание |\n|---------|----------|\n| `docker-compose up` | Запуск всех сервисов |\n| `docker-compose up -d` | Запуск в фоновом режиме |\n| `docker-compose down` | Остановка и удаление контейнеров |\n| `docker-compose ps` | Список запущенных сервисов |\n| `docker-compose logs` | Просмотр логов |\n\n---\n\n## Заключение\n\nDocker Compose упрощает работу с многоконтейнерными приложениями. Используйте это руководство как справочник для ваших проектов.\n\n**Полезные ссылки:**\n- [Официальная документация](https://docs.docker.com/compose/)\n- [Примеры конфигураций](https://github.com/docker/awesome-compose)\n```\n\n---\n\n## Заключение\n\nЭто руководство охватывает все возможности Markdown, доступные в Opensophy Hub. Используйте его как справочник при создании статей.\n\n**Помните:**\n- 📝 Всегда заполняйте frontmatter\n- 🎨 Используйте форматирование для улучшения читаемости\n- 💻 Добавляйте примеры кода с подсветкой синтаксиса\n- 🖼️ Используйте изображения и таблицы где уместно\n- ✅ Следуйте лучшим практикам\n\n**Нужна помощь?**&quot;]}]}" ssr client="only" opts="{&quot;name&quot;:&quot;DocContent&quot;,&quot;value&quot;:&quot;react&quot;}"></astro-island>  </div> <script type="module">function o(t){const e=document.documentElement;t?(e.classList.add("dark"),e.style.backgroundColor="#0a0a0a",e.style.color="#ffffff",e.style.colorScheme="dark"):(e.classList.remove("dark"),e.style.backgroundColor="#E8E7E3",e.style.color="#000000",e.style.colorScheme="light")}window.addEventListener("storage",t=>{if(t.key==="theme"){const e=t.newValue==="dark";o(e)}});window.addEventListener("themechange",()=>{const t=localStorage.getItem("theme"),e=window.matchMedia("(prefers-color-scheme: dark)").matches;o(t?t==="dark":e)});</script> </body> </html>
